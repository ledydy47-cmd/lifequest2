<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ЛайфКвест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── ПЕРЕМЕННЫЕ ─────────────────────────── */
:root{
  --bg:#f0f2fa;
  --surface:#ffffff;
  --surface2:#f4f5fb;
  --border:#e8eaf4;
  --text:#1c1c3a;
  --text2:#9295b8;
  --text3:#b8bcd8;
  --accent:#7b68ee;
  --accent2:#9d8ff5;
  --grad1:linear-gradient(135deg,#7b68ee,#9d8ff5);
  --grad-orange:linear-gradient(135deg,#ff8c42,#ffb347);
  --grad-green:linear-gradient(135deg,#43d9a2,#5ee7d0);
  --grad-blue:linear-gradient(135deg,#5b9cf6,#7eb8ff);
  --grad-pink:linear-gradient(135deg,#f77fbe,#ffadd6);
  --grad-yellow:linear-gradient(135deg,#ffd55a,#ffe89a);
  --grad-violet:linear-gradient(135deg,#a78bfa,#c4b5fd);
  --shadow:0 4px 20px rgba(123,104,238,0.10);
  --shadow-sm:0 2px 10px rgba(0,0,0,0.06);
  --r:18px; --r-sm:12px;
  --nav-h:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;}

/* ── SHELL ──────────────────────────────── */
#shell{display:flex;flex-direction:column;height:100%;overflow:hidden;}
#hdr{flex-shrink:0;padding:14px 18px 12px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;min-height:100%;padding:16px 16px calc(var(--nav-h)+28px);}
.page.active{display:block;}

/* ── HEADER ─────────────────────────────── */
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.hdr-ava{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--accent);overflow:hidden;flex-shrink:0;cursor:pointer;background:var(--surface2);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(123,104,238,0.12);}
.hdr-ava img{width:100%;height:100%;object-fit:cover;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-weight:800;font-size:17px;color:var(--text);}
.hdr-lvl{font-size:12px;color:var(--text2);margin-top:1px;}
.hdr-btns{display:flex;gap:8px;flex-shrink:0;}
.btn-prem{padding:8px 14px;border-radius:22px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:linear-gradient(135deg,#ffd55a,#ff8c42);color:#fff;box-shadow:0 4px 14px rgba(255,140,66,0.35);}
.btn-out{padding:8px 14px;border-radius:22px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:var(--surface2);color:var(--text2);}
.xp-row{display:flex;align-items:center;gap:10px;}
.xp-bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.xp-bar-fill{height:100%;background:var(--grad1);border-radius:4px;transition:width .4s;}
.xp-label{font-size:12px;color:var(--accent);font-weight:700;white-space:nowrap;}

/* ── NAV ────────────────────────────────── */
#nav{flex-shrink:0;display:flex;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 16px rgba(0,0,0,0.05);z-index:10;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;transition:color .2s;padding:8px 2px;}
.nav-btn.active{color:var(--accent);}
.nav-ico{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}

/* ── CARDS ──────────────────────────────── */
.card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.card-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.sec-title{font-size:20px;font-weight:800;color:var(--text);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px;}
.empty-ico{font-size:64px;}
.empty-title{font-size:18px;font-weight:800;color:var(--text);}
.empty-sub{font-size:14px;color:var(--text2);text-align:center;}

/* ── STAT TILES ─────────────────────────── */
.tiles3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.tiles2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tile{background:var(--surface);border-radius:var(--r-sm);padding:14px 10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:6px;}
.tile-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;}
.tile-val{font-size:22px;font-weight:900;}
.tile-lbl{font-size:11px;color:var(--text2);text-align:center;line-height:1.3;}

/* ── QUICK TILES (дашборд) ──────────────── */
.qtiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.qtile{border-radius:var(--r);padding:16px;position:relative;overflow:hidden;}
.qtile-val{font-size:30px;font-weight:900;}
.qtile-lbl{font-size:12px;font-weight:600;margin-top:2px;opacity:.8;}
.qtile-bg-ico{position:absolute;right:10px;top:10px;font-size:32px;opacity:.25;}

/* ── PROGRESS ───────────────────────────── */
.prog-wrap{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s;}
.prog-exp{position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,.15);}
.prog-row{display:flex;align-items:center;gap:8px;}
.prog-pct{font-size:13px;font-weight:800;color:var(--accent);min-width:36px;text-align:right;}

/* ── TASKS ──────────────────────────────── */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.task-row:last-child{border-bottom:none;}
.task-cb{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;background:var(--surface2);}
.task-cb.done{background:var(--accent);border-color:var(--accent);}
.task-cb.done::after{content:'✓';color:#fff;font-size:13px;font-weight:800;}
.task-txt{flex:1;font-size:14px;font-weight:500;}
.task-txt.done{text-decoration:line-through;color:var(--text2);}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:16px;}

/* ── HABITS ─────────────────────────────── */
.hab-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.hab-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.hab-ico-wrap{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.hab-info{flex:1;min-width:0;}
.hab-name{font-weight:700;font-size:16px;}
.hab-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.hab-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:18px;}
.hab-days{display:flex;gap:5px;margin-bottom:10px;}
.hab-day{flex:1;aspect-ratio:1;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:8px;font-weight:700;color:var(--text2);gap:2px;transition:all .2s;}
.hab-day .dn{font-size:11px;font-weight:800;}
.hab-day.done{background:var(--grad1);border-color:transparent;color:#fff;}
.hab-day.today{border-color:var(--accent);color:var(--accent);}
.hab-day.done.today{color:#fff;}
.hab-day.off{opacity:.3;cursor:default;}
.hab-prog-row{display:flex;align-items:center;gap:8px;}
.hab-prog-pct{font-size:12px;font-weight:800;margin-left:auto;}

/* ── GOALS ──────────────────────────────── */
.goal-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.goal-title{font-weight:800;font-size:16px;flex:1;}
.goal-badge{font-size:10px;padding:4px 10px;border-radius:20px;flex-shrink:0;margin-left:8px;font-weight:700;}
.b-ok{background:rgba(67,217,162,.15);color:#1a9e75;}
.b-over{background:rgba(239,68,68,.12);color:#dc2626;}
.b-soon{background:rgba(255,213,90,.2);color:#d97706;}
.b-act{background:rgba(123,104,238,.12);color:var(--accent);}
.goal-meta{font-size:12px;color:var(--text2);margin-bottom:12px;}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:5px;}
.hab-mini-grid{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;}
.hab-mini-dot{width:24px;height:24px;border-radius:7px;font-size:9px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-weight:700;}
.hab-mini-dot.ok{background:var(--grad1);border-color:transparent;color:#fff;}
.goal-del-btn{width:100%;margin-top:12px;padding:9px;border-radius:10px;background:rgba(239,68,68,.08);color:#dc2626;border:none;cursor:pointer;font-size:13px;font-weight:700;}

/* ── BOOKS ──────────────────────────────── */
.books-tabs{display:flex;gap:8px;margin-bottom:16px;}
.bk-tab{flex:1;padding:11px 6px;border-radius:22px;border:1.5px solid var(--border);font-size:13px;font-weight:700;background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.bk-tab.active{background:var(--grad1);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(123,104,238,.3);}
.books-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.book-card{background:var(--surface);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:transform .15s;}
.book-card:active{transform:scale(.97);}
.book-cover{width:100%;aspect-ratio:2/3;overflow:hidden;position:relative;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.book-cover img{width:100%;height:100%;object-fit:cover;}
.book-status-dot{position:absolute;top:8px;left:8px;width:10px;height:10px;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.book-circ{position:absolute;bottom:6px;right:6px;width:44px;height:44px;}
.book-circ svg{width:44px;height:44px;transform:rotate(-90deg);}
.book-circ-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;}
.book-info{padding:10px 10px 12px;}
.book-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-author{font-size:11px;color:var(--text2);margin-top:2px;}
.book-stars{display:flex;gap:1px;margin-top:4px;font-size:12px;}

/* ── BOOK OVERLAY ───────────────────────── */
#book-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .3s;}
#book-overlay.open{transform:translateX(0);}
.bok-hdr{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);background:var(--surface);}
.bok-back{background:none;border:none;color:var(--text);cursor:pointer;font-size:22px;padding:4px;flex-shrink:0;}
.bok-title{font-size:17px;font-weight:800;flex:1;}
.bok-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:20px;}
.bok-body{padding:20px;}
.bok-cover-wrap{width:130px;margin:0 auto 20px;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:50px;cursor:pointer;border:2px dashed var(--border);position:relative;}
.bok-cover-wrap img{width:100%;height:100%;object-fit:cover;}
.bok-cover-edit{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);font-size:11px;text-align:center;padding:6px;color:#fff;font-weight:600;}
.bok-status-tabs{display:flex;gap:6px;margin-bottom:18px;}
.bok-st-tab{flex:1;padding:9px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;text-align:center;}
.bok-st-tab.active{background:var(--grad1);border-color:transparent;color:#fff;}
.bok-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.bok-prog-inp{width:78px;padding:10px;border-radius:12px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:16px;text-align:center;outline:none;font-weight:700;}
.bok-prog-inp:focus{border-color:var(--accent);}
.bok-prog-bar-wrap{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.bok-prog-bar{height:100%;background:var(--grad1);border-radius:5px;transition:width .3s;}
.bok-prog-pct{font-size:14px;font-weight:800;color:var(--accent);min-width:38px;text-align:right;}
.bok-stars{display:flex;gap:8px;margin-bottom:18px;font-size:30px;cursor:pointer;}
.bok-notes{width:100%;padding:12px;border-radius:var(--r-sm);background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;margin-bottom:18px;height:100px;}
.bok-notes:focus{border-color:var(--accent);}

/* ── VITAMINS ───────────────────────────── */
.vit-hero{background:linear-gradient(135deg,#5b21b6,#7c3aed,#a855f7);border-radius:var(--r);padding:20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;}
.vit-hero-circ{position:relative;width:80px;height:80px;flex-shrink:0;}
.vit-hero-circ svg{width:80px;height:80px;transform:rotate(-90deg);}
.vit-hero-circ-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.vhct-big{font-size:20px;font-weight:900;color:#fff;}
.vhct-sm{font-size:10px;color:rgba(255,255,255,.7);}
.vit-hero-info{flex:1;}
.vit-hero-date{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:4px;}
.vit-hero-ttl{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px;}
.vit-hero-sub{font-size:12px;color:rgba(255,255,255,.6);}
.vit-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.vit-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.vit-ico-wrap{width:46px;height:46px;border-radius:14px;background:rgba(139,92,246,.1);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.vit-info{flex:1;min-width:0;}
.vit-name{font-weight:700;font-size:16px;}
.vit-dose{font-size:12px;color:var(--text2);margin-top:2px;}
.vit-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:18px;}
.vit-times{display:flex;gap:6px;flex-wrap:wrap;}
.vit-badge{padding:7px 14px;border-radius:14px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;}
.vit-badge.done{background:linear-gradient(135deg,#a78bfa,#c4b5fd);border-color:transparent;color:#fff;}
.vit-wk{display:flex;gap:5px;margin-top:10px;}
.vit-wk-d{flex:1;height:30px;border-radius:8px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text2);flex-direction:column;gap:1px;font-weight:700;}
.vit-wk-d.full{background:linear-gradient(135deg,#a78bfa,#c4b5fd);border-color:transparent;color:#fff;}
.vit-wk-d.part{background:rgba(167,139,250,.15);border-color:#a78bfa;color:#7c3aed;}

/* ── FAB ────────────────────────────────── */
#fab{position:fixed;bottom:calc(var(--nav-h)+16px);right:20px;width:56px;height:56px;border-radius:50%;background:var(--grad-orange);border:none;color:#fff;font-size:30px;cursor:pointer;box-shadow:0 6px 24px rgba(255,140,66,.5);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s;}
#fab:active{transform:scale(.92);}

/* ── MODALS ─────────────────────────────── */
.mo{position:fixed;inset:0;background:rgba(28,28,58,.45);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.mo.open{opacity:1;pointer-events:all;}
.mo-box{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:6px 20px 36px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s;}
.mo.open .mo-box{transform:translateY(0);}
.mo-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 16px;}
.mo-title{font-size:20px;font-weight:900;margin-bottom:18px;color:var(--text);}
.f{margin-bottom:16px;}
.f label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:600;}
.f input,.f select,.f textarea{width:100%;padding:13px 14px;border-radius:var(--r-sm);background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:inherit;font-weight:500;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--accent);}
.f select{-webkit-appearance:none;appearance:none;}
.dates-row{display:flex;gap:10px;}
.dates-row .f{flex:1;min-width:0;}

/* DAY SELECTOR */
.day-sel{display:flex;gap:5px;}
.ds-btn{flex:1;aspect-ratio:1;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ds-btn.on{background:var(--grad1);border-color:transparent;color:#fff;}
.every-btn{width:100%;padding:10px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:center;transition:all .2s;}
.every-btn.on{background:rgba(123,104,238,.1);border-color:var(--accent);color:var(--accent);}

/* EMOJI */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.em-btn{width:40px;height:40px;font-size:22px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.em-btn.on{border-color:var(--accent);background:rgba(123,104,238,.1);}

/* TIME TOGGLE */
.times-pick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.tt{padding:8px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.tt.on{background:linear-gradient(135deg,#a78bfa,#c4b5fd);border-color:transparent;color:#fff;}

/* SAVE BTN */
.save-btn{width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--grad1);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;transition:opacity .2s;box-shadow:0 4px 16px rgba(123,104,238,.3);}
.save-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

/* UPLOAD BTN */
.upload-btn{width:100%;padding:13px;border-radius:var(--r);border:1.5px dashed var(--border);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;text-align:center;font-weight:600;}

/* AVATAR */
.ava-prev{width:100px;height:100px;border-radius:50%;background:var(--surface2);margin:0 auto 16px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:40px;border:3px solid var(--accent);}
.ava-prev img{width:100%;height:100%;object-fit:cover;}

/* LANDING */
#landing{position:fixed;inset:0;background:linear-gradient(160deg,#ede9fe,#fff);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 32px;}
.land-logo{font-size:72px;}
.land-ttl{font-size:30px;font-weight:900;text-align:center;color:var(--text);}
.land-sub{font-size:15px;color:var(--text2);text-align:center;}
.land-inp{width:100%;padding:15px 18px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;outline:none;font-weight:600;}
.land-inp:focus{border-color:var(--accent);}
.land-btn{width:100%;padding:16px;border-radius:var(--r);border:none;background:var(--grad1);color:#fff;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(123,104,238,.4);}

/* STREAK DOT */
.st-row{display:flex;gap:6px;justify-content:center;}
.st-dot{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);font-weight:700;}
.st-dot.on{background:var(--grad1);border-color:transparent;color:#fff;}
.st-dot.cur{border-color:var(--accent);}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing" style="display:none">
  <div class="land-logo">🚀</div>
  <div class="land-ttl">ЛайфКвест</div>
  <div class="land-sub">Твой личный трекер роста</div>
  <input class="land-inp" id="land-name" placeholder="Введи своё имя" maxlength="30">
  <button class="land-btn" onclick="startApp()">Начать путь ✨</button>
</div>

<div id="shell">
  <div id="hdr"></div>
  <div id="content">
    <div class="page active" id="p-dash"></div>
    <div class="page" id="p-plan"></div>
    <div class="page" id="p-hab"></div>
    <div class="page" id="p-goals"></div>
    <div class="page" id="p-vit"></div>
    <div class="page" id="p-books"></div>
  </div>
  <nav id="nav">
    <!-- ГЛАВНАЯ -->
    <button class="nav-btn active" data-p="dash" onclick="go('dash')">
      <div class="nav-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="2.5" fill="currentColor" opacity=".4"/>
          <rect x="13" y="3" width="8" height="8" rx="2.5" fill="currentColor"/>
          <rect x="3" y="13" width="8" height="8" rx="2.5" fill="currentColor"/>
          <rect x="13" y="13" width="8" height="8" rx="2.5" fill="currentColor" opacity=".4"/>
        </svg>
      </div>
      Главная
    </button>
    <!-- ПЛАНЕР -->
    <button class="nav-btn" data-p="plan" onclick="go('plan')">
      <div class="nav-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="17" rx="3"/>
          <path d="M16 2v4M8 2v4M3 10h18" stroke-linecap="round"/>
          <path d="M7 14h.01M12 14h.01M17 14h.01M7 18h.01M12 18h.01" stroke-linecap="round" stroke-width="2.5"/>
        </svg>
      </div>
      Планер
    </button>
    <!-- ПРИВЫЧКИ -->
    <button class="nav-btn" data-p="hab" onclick="go('hab')">
      <div class="nav-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2l2.4 5 5.6.8-4 4 1 5.5L12 14.8 7 17.3l1-5.5L4 7.8l5.6-.8L12 2z" fill="currentColor" opacity=".25" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M12 2l2.4 5 5.6.8-4 4 1 5.5L12 14.8 7 17.3l1-5.5L4 7.8l5.6-.8L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      Привычки
    </button>
    <!-- ЦЕЛИ -->
    <button class="nav-btn" data-p="goals" onclick="go('goals')">
      <div class="nav-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      Цели
    </button>
    <!-- ВИТАМИНЫ -->
    <button class="nav-btn" data-p="vit" onclick="go('vit')">
      <div class="nav-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 3h6l1 4H8L9 3z" stroke-linejoin="round"/>
          <rect x="4" y="7" width="16" height="13" rx="3"/>
          <path d="M4 11h16" stroke-linecap="round"/>
          <circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      Витамины
    </button>
    <!-- КНИГИ -->
    <button class="nav-btn" data-p="books" onclick="go('books')">
      <div class="nav-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke-linecap="round"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" fill="currentColor" opacity=".15"/>
          <path d="M9 7h6M9 11h4" stroke-linecap="round"/>
        </svg>
      </div>
      Книги
    </button>
  </nav>
</div>

<!-- FAB -->
<button id="fab" onclick="openFab()">+</button>

<!-- BOOK OVERLAY -->
<div id="book-overlay">
  <div class="bok-hdr">
    <button class="bok-back" onclick="closeBookOverlay()">←</button>
    <div class="bok-title" id="bok-ov-title">Книга</div>
    <button class="bok-del" onclick="delBook()">🗑</button>
  </div>
  <div class="bok-body" id="bok-ov-body"></div>
</div>

<!-- MODAL: TASK -->
<div class="mo" id="m-task">
  <div class="mo-box">
    <div class="mo-handle"></div>
    <div class="mo-title">Новая задача</div>
    <div class="f"><label>Название</label><input id="t-text" placeholder="Что нужно сделать?" oninput="val('m-task')"></div>
    <div class="f"><label>Дата</label><input id="t-date" type="date"></div>
    <div class="f"><label>Связать с целью</label><select id="t-goal"></select></div>
    <button class="save-btn" id="sb-task" onclick="saveTask()" disabled>Сохранить</button>
  </div>
</div>

<!-- MODAL: HABIT -->
<div class="mo" id="m-hab">
  <div class="mo-box">
    <div class="mo-handle"></div>
    <div class="mo-title">Новая привычка</div>
    <div class="f"><label>Название</label><input id="h-name" placeholder="Название привычки" oninput="val('m-hab')"></div>
    <div class="f"><label>Иконка</label><div class="emoji-grid" id="h-ep"></div></div>
    <div class="f">
      <label>Дни выполнения</label>
      <button class="every-btn" id="every-btn" onclick="toggleEvery()">✓ Каждый день</button>
      <div class="day-sel" id="h-dp"></div>
    </div>
    <div class="f"><label>Связать с целью</label><select id="h-goal"></select></div>
    <button class="save-btn" id="sb-hab" onclick="saveHab()" disabled>Сохранить</button>
  </div>
</div>

<!-- MODAL: GOAL -->
<div class="mo" id="m-goal">
  <div class="mo-box">
    <div class="mo-handle"></div>
    <div class="mo-title">Новая цель</div>
    <div class="f"><label>Название</label><input id="g-title" placeholder="Моя цель" oninput="val('m-goal')"></div>
    <div class="dates-row">
      <div class="f"><label>Начало</label><input id="g-start" type="date" oninput="val('m-goal')"></div>
      <div class="f"><label>Конец</label><input id="g-end" type="date" oninput="val('m-goal')"></div>
    </div>
    <div class="f"><label>Привязать привычку</label><select id="g-hab"></select></div>
    <div class="f"><label>Раз в неделю</label><input id="g-tpw" type="number" min="1" max="7" value="3"></div>
    <button class="save-btn" id="sb-goal" onclick="saveGoal()" disabled>Сохранить</button>
  </div>
</div>

<!-- MODAL: BOOK -->
<div class="mo" id="m-book">
  <div class="mo-box">
    <div class="mo-handle"></div>
    <div class="mo-title">Новая книга</div>
    <div class="f"><label>Название</label><input id="b-title" placeholder="Название книги" oninput="val('m-book')"></div>
    <div class="f"><label>Автор</label><input id="b-author" placeholder="Автор"></div>
    <div class="f"><label>Страниц</label><input id="b-total" type="number" min="1" placeholder="300" oninput="val('m-book')"></div>
    <div class="f">
      <label>Обложка</label>
      <input type="file" id="b-cover-inp" accept="image/*" style="display:none" onchange="previewCover()">
      <div class="upload-btn" onclick="document.getElementById('b-cover-inp').click()">📷 Загрузить обложку</div>
      <div id="b-cover-prev" style="margin-top:8px;display:none">
        <img id="b-cover-img" style="width:80px;height:120px;object-fit:cover;border-radius:10px;border:2px solid var(--accent)">
      </div>
    </div>
    <button class="save-btn" id="sb-book" onclick="saveBook()" disabled>Сохранить</button>
  </div>
</div>

<!-- MODAL: VITAMIN -->
<div class="mo" id="m-vit">
  <div class="mo-box">
    <div class="mo-handle"></div>
    <div class="mo-title">Новый витамин</div>
    <div class="f"><label>Название</label><input id="v-name" placeholder="Витамин D3" oninput="val('m-vit')"></div>
    <div class="f"><label>Дозировка</label><input id="v-dose" placeholder="2000 МЕ"></div>
    <div class="f"><label>Иконка</label><div class="emoji-grid" id="v-ep"></div></div>
    <div class="f"><label>Время приёма</label><div class="times-pick" id="v-tp"></div></div>
    <div class="f"><label>Конец курса</label><input id="v-end" type="date"></div>
    <button class="save-btn" id="sb-vit" onclick="saveVit()" disabled>Сохранить</button>
  </div>
</div>

<!-- MODAL: AVATAR -->
<div class="mo" id="m-ava">
  <div class="mo-box">
    <div class="mo-handle"></div>
    <div class="mo-title">Аватар</div>
    <div class="ava-prev" id="ava-prev"></div>
    <input type="file" id="ava-inp" accept="image/*" style="display:none" onchange="avaChange()">
    <div class="upload-btn" onclick="document.getElementById('ava-inp').click()">📷 Загрузить фото</div>
    <button class="save-btn" style="margin-top:12px" onclick="closeModal('m-ava')">Готово</button>
  </div>
</div>

<script>
/* ════════════════════════════════
   TELEGRAM
════════════════════════════════ */
const tg=window.Telegram?.WebApp||{initData:'',initDataUnsafe:{},ready:()=>{},expand:()=>{},
  setHeaderColor:()=>{},setBackgroundColor:()=>{},
  HapticFeedback:{impactOccurred:()=>{}},
  BackButton:{show:()=>{},hide:()=>{},onClick:()=>{},offClick:()=>{}}};
tg.ready();tg.expand();
tg.setHeaderColor('#ffffff');tg.setBackgroundColor('#f0f2fa');
const IS_TG=tg.initData.length>0;

/* ════════════════════════════════
   CONSTANTS
════════════════════════════════ */
const LEVELS=[
  {n:'Новичок',xp:0},{n:'Ученик',xp:100},{n:'Искатель',xp:250},
  {n:'Воин',xp:500},{n:'Мастер',xp:900},{n:'Герой',xp:1400},
  {n:'Легенда',xp:2000},{n:'Бог',xp:3000}
];
const HAB_EMOJIS=['💪','📚','🧘','🏃','🎯','✍️','🥗','💧','🎨','🎵','💤','🧹','🐕','🌿','🏋️','🚴','🤸','📝'];
const VIT_EMOJIS=['💊','🌟','☀️','🫐','🍋','🥕','🍵','💧','🧴','🌿','🫧','⚡'];
const VIT_TIMES=['Утро','День','Вечер','Ночь'];
const DS=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const ALL7=[0,1,2,3,4,5,6];

/* ════════════════════════════════
   STATE
════════════════════════════════ */
const SK='lq_v8';
const OLD=['lq5','lq_v4','lq_v5','lq_v6','lq_v7'];
function defS(){return{name:'',isLoggedIn:false,isSubscribed:false,xp:0,habits:[],weeks:{},goals:[],avatar:'',books:[],vitamins:[],booksTab:'reading'};}
function loadS(){
  try{const r=localStorage.getItem(SK);if(r)return Object.assign({},defS(),JSON.parse(r));}catch(e){}
  for(const k of OLD){try{const r=localStorage.getItem(k);if(!r)continue;const m=Object.assign({},defS(),JSON.parse(r));localStorage.setItem(SK,JSON.stringify(m));return m;}catch(e){}}
  return defS();
}
let S=loadS();
const sv=()=>{try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}};

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const hp=(t='light')=>{try{tg.HapticFeedback.impactOccurred(t);}catch(e){}};
function getLv(xp){let l=0;for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){l=i;break;}}return{idx:l,...LEVELS[l],next:LEVELS[l+1]||null};}
function lvPct(xp){const l=getLv(xp);if(!l.next)return 100;return Math.min(100,Math.round((xp-l.xp)/(l.next.xp-l.xp)*100));}
function addXP(n){S.xp=Math.max(0,S.xp+n);sv();rHdr();}
function getWK(off=0){const d=new Date();d.setDate(d.getDate()-d.getDay()+off*7);return d.toISOString().slice(0,10);}
function curWK(){return getWK(0);}
function ensW(wk){if(!S.weeks[wk])S.weeks[wk]={tasks:[],notes:''};if(!S.weeks[wk].tasks)S.weeks[wk].tasks=[];}
function wkDates(wk){const s=new Date(wk+'T00:00:00');return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d.toISOString().slice(0,10);});}
function fmt(ds){const d=new Date(ds+'T00:00:00');return`${d.getDate()} ${MONTHS[d.getMonth()]}`;}

/* Прогресс привычки за текущую неделю (только по выбранным дням) */
function habPct(h){
  const wd=wkDates(curWK());const td=today();
  const tgt=h.days||ALL7;
  const pass=wd.filter(d=>{const dow=new Date(d+'T00:00:00').getDay();return tgt.includes(dow)&&d<=td;});
  if(!pass.length)return 0;
  const done=pass.filter(d=>h.completions&&h.completions.includes(d)).length;
  return Math.round(done/pass.length*100);
}

/* ════════════════════════════════
   NAVIGATION
════════════════════════════════ */
let curP='dash';
let planOff=0;
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('p-'+p).classList.add('active');
  const nb=document.querySelector(`.nav-btn[data-p="${p}"]`);if(nb)nb.classList.add('active');
  curP=p;rPage(p);
}
function rPage(p){
  if(p==='dash')rDash();
  else if(p==='plan')rPlan();
  else if(p==='hab')rHab();
  else if(p==='goals')rGoals();
  else if(p==='books')rBooks();
  else if(p==='vit')rVit();
}
function rAll(){rHdr();rPage(curP);}

/* ════════════════════════════════
   HEADER
════════════════════════════════ */
function rHdr(){
  const lv=getLv(S.xp);const pct=lvPct(S.xp);const nx=lv.next?lv.next.xp:S.xp;
  document.getElementById('hdr').innerHTML=`
    <div class="hdr-top">
      <div class="hdr-ava" onclick="openModal('m-ava')">${S.avatar?`<img src="${S.avatar}">`:'🧑'}</div>
      <div class="hdr-info">
        <div class="hdr-name">${S.name||'Игрок'}</div>
        <div class="hdr-lvl">Ур.${lv.idx+1} · ${lv.n}</div>
      </div>
      <div class="hdr-btns">
        ${!S.isSubscribed?`<button class="btn-prem" onclick="buyPrem()">⭐ Premium</button>`:''}
        ${!IS_TG?`<button class="btn-out" onclick="logout()">Выйти</button>`:''}
      </div>
    </div>
    <div class="xp-row">
      <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
      <div class="xp-label">${S.xp}/${nx} XP</div>
    </div>`;
  const ap=document.getElementById('ava-prev');if(ap)ap.innerHTML=S.avatar?`<img src="${S.avatar}">`:'🧑';
}

/* ════════════════════════════════
   DASHBOARD
════════════════════════════════ */
function rDash(){
  const wk=curWK();ensW(wk);const tasks=S.weeks[wk].tasks;
  const td=today();const now=new Date();
  const done=tasks.filter(t=>t.done).length;
  const habsDoneToday=S.habits.filter(h=>h.completions&&h.completions.includes(td)).length;
  const habsActiveToday=S.habits.filter(h=>(h.days||ALL7).includes(now.getDay())).length;

  let streak=0;
  for(let i=0;i<60;i++){const d=new Date(now);d.setDate(now.getDate()-i);const ds=d.toISOString().slice(0,10);
    if(S.habits.some(h=>h.completions&&h.completions.includes(ds)))streak++;else break;}

  let vitT=0,vitD=0;
  (S.vitamins||[]).forEach(v=>{if(v.endDate&&td>v.endDate)return;const tm=v.times||['Утро'];vitT+=tm.length;vitD+=tm.filter(t=>v.taken&&v.taken[td]&&v.taken[td].includes(t)).length;});
  const vitPct=vitT>0?Math.round(vitD/vitT*100):0;
  const readingBk=(S.books||[]).filter(b=>b.status==='reading').length;
  const doneBk=(S.books||[]).filter(b=>b.status==='done').length;

  let habWkPct=0;if(S.habits.length)habWkPct=Math.round(S.habits.reduce((a,h)=>a+habPct(h),0)/S.habits.length);

  const dots7=Array.from({length:7},(_,i)=>{
    const d=new Date(now);d.setDate(now.getDate()-(6-i));const ds=d.toISOString().slice(0,10);
    return{l:DS[d.getDay()],on:S.habits.some(h=>h.completions&&h.completions.includes(ds)),cur:ds===td};
  });

  const recent=[...tasks].slice(-5).reverse();

  /* SVG иконки для tiles */
  const svgBooks=`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7b68ee"/><stop offset="100%" stop-color="#9d8ff5"/></linearGradient></defs><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" fill="url(#g1)" opacity=".3"/><path d="M9 7h6M9 11h4" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/></svg>`;
  const svgPages=`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5b9cf6"/><stop offset="100%" stop-color="#7eb8ff"/></linearGradient></defs><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" fill="url(#g2)" opacity=".25" stroke="url(#g2)" stroke-width="1.8"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  const svgFire=`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><defs><linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8c42"/><stop offset="100%" stop-color="#ffb347"/></linearGradient></defs><path d="M12 2c0 0-6 5-6 10.5a6 6 0 0 0 12 0C18 7 12 2 12 2zm0 14a2 2 0 0 1-2-2c0-2 2-4 2-4s2 2 2 4a2 2 0 0 1-2 2z" fill="url(#g3)"/></svg>`;

  document.getElementById('p-dash').innerHTML=`
    <div style="font-size:22px;font-weight:900;color:var(--text);margin-bottom:2px">Привет, ${S.name||'Игрок'}! 👋</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">${now.getDate()} ${MONTHS[now.getMonth()]}, ${['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'][now.getDay()]}</div>

    <div class="qtiles">
      <div class="qtile" style="background:linear-gradient(135deg,#ede9fe,#ddd6fe)">
        <div class="qtile-bg-ico">✅</div>
        <div class="qtile-val" style="color:#7b68ee">${done}/${tasks.length}</div>
        <div class="qtile-lbl" style="color:#7b68ee">Задач сегодня</div>
      </div>
      <div class="qtile" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0)">
        <div class="qtile-bg-ico">🌟</div>
        <div class="qtile-val" style="color:#059669">${habsDoneToday}/${habsActiveToday}</div>
        <div class="qtile-lbl" style="color:#059669">Привычек</div>
      </div>
      <div class="qtile" style="background:linear-gradient(135deg,#fef3c7,#fde68a)">
        <div class="qtile-bg-ico">🔥</div>
        <div class="qtile-val" style="color:#d97706">${streak}</div>

function rPlan(){

  const pct=tasks.length?Math.round(dc/tasks.length*100):0;

function tRow(t){

function togTask(id){
  for(const[,w]of Object.entries(S.weeks)){const t=w.tasks&&w.tasks.find(x=>x.id===id);if(t){t.done=!t.done;t.done?addXP(10):addXP(-10);hp();sv();break;}}

function delTask(id){

/* ════════════════════════════════
   GOALS  ← ИСПРАВЛЕННАЯ ПРИВЯЗКА
════════════════════════════════ */
function goalPct(g){
  if(!g.habitId||!g.targetPerWeek)return 0;
  const hab=S.habits.find(h=>h.id===g.habitId);
  if(!hab||!hab.completions||!hab.completions.length)return 0;
  const s=new Date(g.startDate+'T00:00:00');
  const e=new Date(g.endDate+'T00:00:00');
  if(isNaN(s.getTime())||isNaN(e.getTime()))return 0;
  const MS=86400000;
  const totalDays=Math.round((e-s)/MS)+1;if(totalDays<=0)return 0;
  const totalWeeks=Math.ceil(totalDays/7);
  const totalTarget=g.targetPerWeek*totalWeeks;if(!totalTarget)return 0;
  let total=0;
  for(let w=0;w<totalWeeks;w++){
    const ws=new Date(s.getTime()+w*7*MS);
    const we=new Date(Math.min(ws.getTime()+6*MS,e.getTime()));
    const wss=ws.toISOString().slice(0,10),wes=we.toISOString().slice(0,10);
    const cnt=hab.completions.filter(d=>d>=wss&&d<=wes).length;
    total+=Math.min(cnt,g.targetPerWeek);
  }
  return Math.min(100,Math.round(total/totalTarget*100));
}
function expPct(g){
  if(!g.startDate||!g.endDate)return 0;
  const n=new Date(),s=new Date(g.startDate+'T00:00:00'),e=new Date(g.endDate+'T00:00:00');
  if(n<=s)return 0;if(n>=e)return 100;
  return Math.round((n-s)/(e-s)*100);
}
function rGoals(){
  let h=`<div class="sec-hdr"><div class="sec-title">Цели</div></div>`;
  if(!S.goals.length){
    h+=`<div class="empty-wrap"><div class="empty-ico">🎯</div><div class="empty-title">Нет целей</div><div class="empty-sub">Нажми + чтобы поставить первую цель</div></div>`;
  } else {
    const now=new Date();
    S.goals.forEach(g=>{
      const p=goalPct(g);const ep=expPct(g);
      const hab=g.habitId?S.habits.find(h=>h.id===g.habitId):null;
      const ed=g.endDate?new Date(g.endDate+'T00:00:00'):null;
      const dl=ed?Math.ceil((ed-now)/86400000):null;
      let badge=p>=100?`<span class="goal-badge b-ok">✅ Готово</span>`:
        ed&&dl<0?`<span class="goal-badge b-over">❌ Просрочено</span>`:
        ed&&dl<=7?`<span class="goal-badge b-soon">⚠️ ${dl}д</span>`:
        `<span class="goal-badge b-act">🎯 В процессе</span>`;
      const tw=g.endDate&&g.startDate?Math.ceil((new Date(g.endDate+'T00:00:00')-new Date(g.startDate+'T00:00:00'))/86400000/7):0;
      let miniGrid='';
      if(hab&&hab.completions){
        const l7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().slice(0,10);return{ds,l:DS[d.getDay()],ok:hab.completions.includes(ds)};});
        miniGrid=`<div style="margin-top:10px"><div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600">${hab.icon||'💪'} ${hab.name} — 7 дней</div>
          <div class="hab-mini-grid">${l7.map(x=>`<div class="hab-mini-dot${x.ok?' ok':''}">${x.l}</div>`).join('')}</div></div>`;
      }
      h+=`<div class="goal-card">
        <div class="goal-top"><div class="goal-title">${g.title}</div>${badge}</div>
        <div class="goal-meta">${g.startDate?fmt(g.startDate):''} — ${g.endDate?fmt(g.endDate):''}${g.targetPerWeek?` · ${g.targetPerWeek}×/нед · Цель: ${g.targetPerWeek*tw} раз`:''}</div>
        <div class="prog-wrap">
          <div class="prog-fill" style="width:${p}%;background:var(--grad1)"></div>
          ${ep>0&&p<100?`<div class="prog-exp" style="left:${ep}%"></div>`:''}
        </div>
        <div class="prog-lbl"><span>${p}% выполнено</span>${ep>0&&p<100?`<span style="color:#d97706;font-weight:600">Ожидаемо: ${ep}%</span>`:''}</div>
        ${miniGrid}
        <button class="goal-del-btn" onclick="delGoal('${g.id}')">🗑 Удалить</button>
      </div>`;
    });
  }
  document.getElementById('p-goals').innerHTML=h;
}

    </div>
    <div style="margin-bottom:18px">
      <div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px">Заметки</div>
      <textarea class="bok-notes" id="bok-notes" placeholder="Мысли о книге...">${b.notes||''}</textarea>
    </div>
    <button class="save-btn" onclick="bokSave()">💾 Сохранить</button>`;
  document.getElementById('book-overlay').classList.add('open');
  tg.BackButton.show();tg.BackButton.onClick(closeBookOverlay);
}
function closeBookOverlay(){document.getElementById('book-overlay').classList.remove('open');tg.BackButton.hide();curBId=null;rBooks();}
function bokCoverChg(){const i=document.getElementById('bok-file-inp');if(!i.files[0])return;const fr=new FileReader();fr.onload=e=>{const b=S.books.find(x=>x.id===curBId);if(b){b.cover=e.target.result;sv();}const w=document.querySelector('.bok-cover-wrap');if(w)w.innerHTML=`<img src="${e.target.result}"><div class="bok-cover-edit">Изменить обложку</div>`;};fr.readAsDataURL(i.files[0]);}
function bokStat(s){const b=S.books.find(x=>x.id===curBId);if(!b)return;b.status=s;if(s==='done'&&!b.finishedDate)b.finishedDate=today();document.querySelectorAll('.bok-st-tab').forEach(el=>el.classList.remove('active'));event.target.classList.add('active');}
function bokRate(r){const b=S.books.find(x=>x.id===curBId);if(!b)return;b.rating=r;const s=document.getElementById('bok-stars');if(s)s.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="bokRate(${i})">${i<=r?'⭐':'☆'}</span>`).join('');}
function bokUpdProg(){const b=S.books.find(x=>x.id===curBId);if(!b)return;const v=Math.min(b.total,Math.max(0,parseInt(document.getElementById('bok-cur').value)||0));const p=b.total>0?Math.round(v/b.total*100):0;const pb=document.getElementById('bok-pb');if(pb)pb.style.width=p+'%';const pp=document.getElementById('bok-pp');if(pp)pp.textContent=p+'%';}
function bokSave(){const b=S.books.find(x=>x.id===curBId);if(!b)return;const cur=parseInt(document.getElementById('bok-cur').value)||0;const old=b.current||0;b.current=Math.min(b.total,Math.max(0,cur));const ne=document.getElementById('bok-notes');if(ne)b.notes=ne.value;if(b.current>old)addXP(Math.floor((b.current-old)/10));if(b.current>=b.total){b.status='done';if(!b.finishedDate)b.finishedDate=today();}sv();closeBookOverlay();hp('medium');}
function delBook(){if(!curBId)return;S.books=S.books.filter(b=>b.id!==curBId);sv();closeBookOverlay();}

/* ════════════════════════════════
   VITAMINS
════════════════════════════════ */
function rVit(){
  if(!S.vitamins)S.vitamins=[];
  const td=today();const now=new Date();
  let tT=0,tD=0;
  S.vitamins.forEach(v=>{if(v.endDate&&td>v.endDate)return;const tm=v.times||['Утро'];tT+=tm.length;tD+=tm.filter(t=>v.taken&&v.taken[td]&&v.taken[td].includes(t)).length;});
  const hPct=tT>0?Math.round(tD/tT*100):0;
  const hR=35;const hC=2*Math.PI*hR;const hD=hC*hPct/100;
  let streak=0;for(let i=0;i<30;i++){const d=new Date(now);d.setDate(now.getDate()-i);const ds=d.toISOString().slice(0,10);if(S.vitamins.some(v=>v.taken&&v.taken[ds]&&v.taken[ds].length))streak++;else break;}
  let totPills=0;S.vitamins.forEach(v=>Object.values(v.taken||{}).forEach(a=>totPills+=(a||[]).length));
  const daySet=new Set();S.vitamins.forEach(v=>Object.entries(v.taken||{}).forEach(([d,a])=>{if(a&&a.length)daySet.add(d);}));
  const h7=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()-(6-i));const ds=d.toISOString().slice(0,10);let t=0,dn=0;S.vitamins.forEach(v=>{const tm=v.times||['Утро'];t+=tm.length;dn+=tm.filter(x=>v.taken&&v.taken[ds]&&v.taken[ds].includes(x)).length;});return{l:DS[d.getDay()],p:t>0?Math.round(dn/t*100):0};});
  let h=`
    <div class="vit-hero">
      <div class="vit-hero-circ">
        <svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="${hR}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="7"/><circle cx="40" cy="40" r="${hR}" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="7" stroke-dasharray="${hD} ${hC}" stroke-linecap="round"/></svg>
        <div class="vit-hero-circ-txt"><div class="vhct-big">${hPct}%</div><div class="vhct-sm">${tD}/${tT}</div></div>
      </div>
      <div class="vit-hero-info">
        <div class="vit-hero-date">${now.getDate()} ${MONTHS[now.getMonth()]}</div>
        <div class="vit-hero-ttl">Витамины</div>
        <div class="vit-hero-sub">Сегодня ${tD} из ${tT}</div>
      </div>
    </div>
    <div class="tiles3" style="margin-bottom:14px">
      <div class="tile"><div style="font-size:26px">🔥</div><div class="tile-val" style="color:#8b5cf6">${streak}</div><div class="tile-lbl">Дней стрика</div></div>
      <div class="tile"><div style="font-size:26px">📅</div><div class="tile-val" style="color:#43d9a2">${daySet.size}</div><div class="tile-lbl">Активных дней</div></div>
      <div class="tile"><div style="font-size:26px">💊</div><div class="tile-val" style="color:#5b9cf6">${totPills}</div><div class="tile-lbl">Принято всего</div></div>
    </div>
    <div class="sec-hdr"><div class="sec-title">Сегодня</div></div>`;
  if(!S.vitamins.length){
    h+=`<div class="empty-wrap"><div class="empty-ico">💊</div><div class="empty-title">Нет витаминов</div><div class="empty-sub">Нажми + чтобы добавить</div></div>`;
  } else {
    S.vitamins.forEach(v=>{
      if(v.endDate&&td>v.endDate)return;
      const tk=v.taken||{};const tm=v.times||['Утро'];
      const sun=new Date(now);sun.setDate(now.getDate()-now.getDay());
      const wk7=Array.from({length:7},(_,i)=>{const d=new Date(sun);d.setDate(sun.getDate()+i);const ds=d.toISOString().slice(0,10);const full=tm.every(t=>tk[ds]&&tk[ds].includes(t));const part=tm.some(t=>tk[ds]&&tk[ds].includes(t));return{l:DS[d.getDay()],full,part:part&&!full};});
      h+=`<div class="vit-card">
        <div class="vit-top">
          <div class="vit-ico-wrap">${v.emoji||'💊'}</div>
          <div class="vit-info"><div class="vit-name">${v.name}</div><div class="vit-dose">${v.dose||''}${v.endDate?' · до '+fmt(v.endDate):''}</div></div>
          <button class="vit-del" onclick="delVit('${v.id}')">🗑</button>
        </div>
        <div class="vit-times">${tm.map(t=>{const done=tk[td]&&tk[td].includes(t);return`<div class="vit-badge${done?' done':''}" onclick="vitTog('${v.id}','${t}')">${t}</div>`;}).join('')}</div>
        <div class="vit-wk">${wk7.map(d=>`<div class="vit-wk-d${d.full?' full':d.part?' part':''}"><span>${d.l}</span>${d.full?'✓':''}</div>`).join('')}</div>
      </div>`;
    });
  }
  h+=`<div class="card" style="margin-top:14px"><div class="card-label">История 7 дней</div>${h7.map(x=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="font-size:11px;color:var(--text2);font-weight:700;width:22px;text-align:right">${x.l}</div><div class="prog-wrap" style="flex:1;height:8px"><div class="prog-fill" style="width:${x.p}%;background:linear-gradient(90deg,#a78bfa,#c4b5fd)"></div></div><div style="font-size:10px;color:var(--text2);font-weight:700;width:30px;text-align:right">${x.p}%</div></div>`).join('')}</div>`;
  document.getElementById('p-vit').innerHTML=h;
}
function vitTog(id,t){const v=S.vitamins.find(x=>x.id===id);if(!v)return;if(!v.taken)v.taken={};const ds=today();if(!v.taken[ds])v.taken[ds]=[];const i=v.taken[ds].indexOf(t);if(i===-1){v.taken[ds].push(t);addXP(5);hp();}else{v.taken[ds].splice(i,1);addXP(-5);}sv();rVit();}
function delVit(id){S.vitamins=S.vitamins.filter(v=>v.id!==id);sv();rVit();}

/* ════════════════════════════════
   FAB & MODALS
════════════════════════════════ */
function openFab(){
  hp();
  const map={dash:'m-task',plan:'m-task',hab:'m-hab',goals:'m-goal',books:'m-book',vit:'m-vit'};
  openModal(map[curP]||'m-task');
}

function openModal(id){
  // Заполняем данные
  if(id==='m-task'){fillGoalSel('t-goal');document.getElementById('t-text').value='';document.getElementById('t-date').value=today();}
  if(id==='m-hab'){fillGoalSel('h-goal');document.getElementById('h-name').value='';buildEP('h-ep',HAB_EMOJIS,'hab');selDays=new Set(ALL7);buildDP();}
  if(id==='m-goal'){fillHabSel('g-hab');document.getElementById('g-title').value='';document.getElementById('g-start').value=today();document.getElementById('g-end').value='';document.getElementById('g-tpw').value='3';}
  if(id==='m-book'){document.getElementById('b-title').value='';document.getElementById('b-author').value='';document.getElementById('b-total').value='';document.getElementById('b-cover-prev').style.display='none';newCoverB64='';}
  if(id==='m-vit'){document.getElementById('v-name').value='';document.getElementById('v-dose').value='';document.getElementById('v-end').value='';buildEP('v-ep',VIT_EMOJIS,'vit');selTimes=new Set(['Утро']);buildTP();}
  if(id==='m-ava'){const p=document.getElementById('ava-prev');if(p)p.innerHTML=S.avatar?`<img src="${S.avatar}">`:'🧑';}
  val(id);
  document.getElementById(id).classList.add('open');
  tg.BackButton.show();tg.BackButton.onClick(()=>closeModal(id));
}
function closeModal(id){document.getElementById(id).classList.remove('open');tg.BackButton.hide();}

function fillGoalSel(sid){const s=document.getElementById(sid);if(!s)return;s.innerHTML=`<option value="">— Без цели —</option>`+S.goals.map(g=>`<option value="${g.id}">${g.title}</option>`).join('');}
function fillHabSel(sid){const s=document.getElementById(sid);if(!s)return;s.innerHTML=`<option value="">— Без привычки —</option>`+S.habits.map(h=>`<option value="${h.id}">${h.icon||'💪'} ${h.name}</option>`).join('');}

/* Emoji picker */
let selEm={hab:'💪',vit:'💊'};
function buildEP(cid,emojis,type){
  const c=document.getElementById(cid);if(!c)return;
  c.innerHTML=emojis.map(e=>`<button class="em-btn${selEm[type]===e?' on':''}" onclick="pickEm('${type}','${e}','${cid}')">${e}</button>`).join('');
}
function pickEm(type,e,cid){selEm[type]=e;buildEP(cid,type==='hab'?HAB_EMOJIS:VIT_EMOJIS,type);}

/* Day picker */
let selDays=new Set(ALL7);
function buildDP(){
  const c=document.getElementById('h-dp');if(!c)return;
  const all=selDays.size===7;
  const eb=document.getElementById('every-btn');
  if(eb){eb.textContent=all?'✓ Каждый день':'Каждый день';eb.className='every-btn'+(all?' on':'');}
  c.innerHTML=DS.map((d,i)=>`<div class="ds-btn${selDays.has(i)?' on':''}" onclick="pickDay(${i})">${d}</div>`).join('');
}
function pickDay(i){if(selDays.has(i)){if(selDays.size>1)selDays.delete(i);}else selDays.add(i);buildDP();val('m-hab');}
function toggleEvery(){if(selDays.size===7){selDays=new Set([new Date().getDay()]);}else{selDays=new Set(ALL7);}buildDP();}

/* Time picker */
let selTimes=new Set(['Утро']);
function buildTP(){const c=document.getElementById('v-tp');if(!c)return;c.innerHTML=VIT_TIMES.map(t=>`<div class="tt${selTimes.has(t)?' on':''}" onclick="pickT('${t}')">${t}</div>`).join('');}
function pickT(t){if(selTimes.has(t))selTimes.delete(t);else selTimes.add(t);buildTP();}

/* Validation */
function val(id){
  const m={
    'm-task':()=>!!document.getElementById('t-text')?.value.trim(),
    'm-hab':()=>!!document.getElementById('h-name')?.value.trim(),
    'm-goal':()=>!!(document.getElementById('g-title')?.value.trim()&&document.getElementById('g-end')?.value),
    'm-book':()=>!!(document.getElementById('b-title')?.value.trim()&&parseInt(document.getElementById('b-total')?.value)>0),
    'm-vit':()=>!!document.getElementById('v-name')?.value.trim(),
  };
  const ids={'m-task':'sb-task','m-hab':'sb-hab','m-goal':'sb-goal','m-book':'sb-book','m-vit':'sb-vit'};
  const ok=m[id]?m[id]():false;
  const btn=document.getElementById(ids[id]);if(btn)btn.disabled=!ok;
}

/* Save */
function saveTask(){
  const txt=document.getElementById('t-text').value.trim();if(!txt)return;
  const date=document.getElementById('t-date').value||today();
  const gid=document.getElementById('t-goal').value||null;
  const wk=curWK();ensW(wk);S.weeks[wk].tasks.push({id:uid(),text:txt,date,done:false,goalId:gid});
  sv();closeModal('m-task');if(curP==='plan')rPlan();else rDash();hp();
}
function saveHab(){
  const name=document.getElementById('h-name').value.trim();if(!name)return;
  const gid=document.getElementById('h-goal').value||null;
  S.habits.push({id:uid(),name,icon:selEm.hab,goalId:gid,days:[...selDays],completions:[]});
  sv();closeModal('m-hab');rHab();hp();
}
function saveGoal(){
  const title=document.getElementById('g-title').value.trim();
  const start=document.getElementById('g-start').value||today();
  const end=document.getElementById('g-end').value;
  const habId=document.getElementById('g-hab').value||null;
  const tpw=parseInt(document.getElementById('g-tpw').value)||3;
  if(!title||!end)return;
  S.goals.push({id:uid(),title,startDate:start,endDate:end,habitId:habId,targetPerWeek:tpw});
  sv();closeModal('m-goal');rGoals();hp();
}
function saveBook(){
  const title=document.getElementById('b-title').value.trim();
  const author=document.getElementById('b-author').value.trim();
  const total=parseInt(document.getElementById('b-total').value);
  if(!title||!total)return;
  S.books.push({id:uid(),title,author,total,current:0,status:'reading',rating:0,notes:'',cover:newCoverB64||''});
  S.booksTab='reading';sv();closeModal('m-book');rBooks();hp();
}
function previewCover(){const i=document.getElementById('b-cover-inp');if(!i.files[0])return;const fr=new FileReader();fr.onload=e=>{newCoverB64=e.target.result;document.getElementById('b-cover-prev').style.display='block';document.getElementById('b-cover-img').src=e.target.result;};fr.readAsDataURL(i.files[0]);}
function saveVit(){
  const name=document.getElementById('v-name').value.trim();if(!name)return;
  const dose=document.getElementById('v-dose').value.trim();
  const end=document.getElementById('v-end').value||null;
  const times=[...selTimes];
  S.vitamins.push({id:uid(),name,dose,emoji:selEm.vit,times:times.length?times:['Утро'],endDate:end,taken:{}});
  sv();closeModal('m-vit');rVit();hp();
}

/* Avatar */
function avaChange(){const i=document.getElementById('ava-inp');if(!i.files[0])return;const fr=new FileReader();fr.onload=e=>{S.avatar=e.target.result;sv();rHdr();const p=document.getElementById('ava-prev');if(p)p.innerHTML=`<img src="${e.target.result}">`;};fr.readAsDataURL(i.files[0]);}

/* ════════════════════════════════
   AUTH
════════════════════════════════ */
function startApp(){
  const name=document.getElementById('land-name').value.trim()||'Игрок';
  S.name=name;S.isLoggedIn=true;sv();
  document.getElementById('landing').style.display='none';
  document.getElementById('shell').style.display='flex';
  rAll();
}
function logout(){S.isLoggedIn=false;sv();document.getElementById('landing').style.display='flex';document.getElementById('shell').style.display='none';}
function buyPrem(){S.isSubscribed=true;sv();rHdr();hp('medium');}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
function init(){
  document.querySelectorAll('.mo').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});
  if(IS_TG){const u=tg.initDataUnsafe?.user;if(u){S.name=u.first_name||S.name||'Игрок';S.isLoggedIn=true;sv();}}
  if(!S.isLoggedIn){
    document.getElementById('landing').style.display='flex';
    document.getElementById('shell').style.display='none';
  } else {
    document.getElementById('landing').style.display='none';
    document.getElementById('shell').style.display='flex';
    rAll();
  }
}
init();
</script>
</body>
</html>
