<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЛайфКвест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --surface2: #f0f1f8;
  --border: #e8eaf0;
  --text: #1a1a2e;
  --text2: #8890b0;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --accent-soft: rgba(124,106,247,0.12);
  --green: #22c55e;
  --green-soft: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-soft: rgba(239,68,68,0.12);
  --yellow: #f59e0b;
  --yellow-soft: rgba(245,158,11,0.12);
  --orange: #f97316;
  --blue: #3b82f6;
  --blue-soft: rgba(59,130,246,0.12);
  --pink: #ec4899;
  --pink-soft: rgba(236,72,153,0.12);
  --violet: #8b5cf6;
  --violet-soft: rgba(139,92,246,0.12);
  --teal: #14b8a6;
  --teal-soft: rgba(20,184,166,0.12);
  --radius: 18px;
  --radius-sm: 12px;
  --nav-h: 72px;
  --shadow: 0 2px 16px rgba(124,106,247,0.10);
  --shadow-sm: 0 1px 8px rgba(0,0,0,0.07);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif; }

/* SHELL */
#shell { display:flex; flex-direction:column; height:100%; overflow:hidden; }
#hdr { flex-shrink:0; padding:14px 18px 12px; background:var(--surface); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); z-index:10; }
#content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.page { display:none; min-height:100%; padding:16px 16px calc(var(--nav-h)+24px); }
.page.active { display:block; }

/* HEADER */
.hdr-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.hdr-ava {
  width:48px; height:48px; border-radius:50%;
  border:2.5px solid var(--accent); overflow:hidden;
  flex-shrink:0; cursor:pointer; background:var(--surface2);
  display:flex; align-items:center; justify-content:center; font-size:22px;
  box-shadow:0 0 0 4px var(--accent-soft);
}
.hdr-ava img { width:100%; height:100%; object-fit:cover; }
.hdr-info { flex:1; min-width:0; }
.hdr-name { font-weight:800; font-size:17px; color:var(--text); }
.hdr-lvl { font-size:12px; color:var(--text2); margin-top:1px; }
.hdr-btns { display:flex; gap:8px; flex-shrink:0; }
.hdr-btn { padding:8px 14px; border-radius:22px; border:none; cursor:pointer; font-size:13px; font-weight:700; }
.btn-prem { background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; box-shadow:0 4px 12px rgba(249,115,22,0.35); }
.btn-out { background:var(--surface2); color:var(--text2); }
.xp-row { display:flex; align-items:center; gap:10px; }
.xp-bar-wrap { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.xp-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:4px; transition:width .4s; }
.xp-label { font-size:12px; color:var(--accent); font-weight:700; white-space:nowrap; }

/* NAV */
#nav {
  flex-shrink:0; display:flex; height:var(--nav-h);
  background:var(--surface); border-top:1px solid var(--border);
  box-shadow:0 -2px 16px rgba(0,0,0,0.06); z-index:10;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; border:none; background:none; color:var(--text2); cursor:pointer;
  font-size:10px; font-weight:600; transition:color .2s; padding:6px 2px;
}
.nav-btn.active { color:var(--accent); }
.nav-icon { width:26px; height:26px; display:flex; align-items:center; justify-content:center; position:relative; }
.nav-btn.active .nav-icon::after {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:var(--accent-soft);
}

/* CARDS */
.card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
.card-title { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.6px; margin-bottom:12px; }
.section-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-title { font-size:20px; font-weight:800; color:var(--text); }
.empty-state { text-align:center; padding:50px 20px; color:var(--text2); font-size:14px; }
.empty-icon { font-size:56px; margin-bottom:14px; }
.empty-title { font-size:17px; font-weight:700; color:var(--text); margin-bottom:6px; }

/* STAT TILES */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stats-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.stat-tile {
  background:var(--surface); border-radius:var(--radius-sm); padding:14px 12px;
  box-shadow:var(--shadow-sm); border:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.stat-tile .ico { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
.stat-tile .val { font-size:22px; font-weight:800; }
.stat-tile .lbl { font-size:11px; color:var(--text2); text-align:center; line-height:1.3; }

/* PROGRESS BAR */
.prog-wrap { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; margin-bottom:6px; position:relative; }
.prog-fill { height:100%; border-radius:4px; transition:width .4s; }
.prog-expected { position:absolute; top:0; height:100%; width:2px; background:rgba(0,0,0,.2); }

/* TASKS */
.task-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.task-row:last-child { border-bottom:none; }
.task-cb {
  width:24px; height:24px; border-radius:8px; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all .2s; background:var(--surface2);
}
.task-cb.done { background:var(--accent); border-color:var(--accent); }
.task-cb.done::after { content:'✓'; color:#fff; font-size:13px; font-weight:700; }
.task-text { flex:1; font-size:14px; font-weight:500; }
.task-text.done { text-decoration:line-through; color:var(--text2); }
.task-del { background:none; border:none; color:var(--text2); cursor:pointer; padding:6px; font-size:16px; }
.task-goal-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* HABITS */
.hab-card {
  background:var(--surface); border-radius:var(--radius); padding:16px;
  margin-bottom:10px; box-shadow:var(--shadow-sm); border:1px solid var(--border);
}
.hab-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.hab-icon-wrap {
  width:46px; height:46px; border-radius:14px; display:flex; align-items:center;
  justify-content:center; font-size:24px; flex-shrink:0;
}
.hab-info { flex:1; min-width:0; }
.hab-name { font-weight:700; font-size:16px; }
.hab-sub { font-size:12px; color:var(--text2); margin-top:2px; }
.hab-del { background:none; border:none; color:var(--text2); cursor:pointer; padding:6px; font-size:18px; }
.hab-days-row { display:flex; gap:5px; margin-bottom:10px; }
.hab-day-btn {
  flex:1; aspect-ratio:1; border-radius:10px; background:var(--surface2);
  border:1.5px solid var(--border); display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer; font-size:8px;
  color:var(--text2); gap:2px; transition:all .2s; font-weight:600;
}
.hab-day-btn .day-num { font-size:11px; font-weight:700; }
.hab-day-btn.done { background:var(--accent); border-color:var(--accent); color:#fff; }
.hab-day-btn.today { border-color:var(--accent); color:var(--accent); }
.hab-day-btn.done.today { color:#fff; }
.hab-day-btn.inactive { opacity:0.35; cursor:default; }
.hab-prog-row { display:flex; align-items:center; gap:8px; }
.hab-prog-label { font-size:12px; color:var(--text2); }
.hab-prog-pct { font-size:12px; font-weight:700; color:var(--accent); margin-left:auto; }

/* GOALS */
.goal-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:10px; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
.goal-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.goal-title { font-weight:700; font-size:16px; flex:1; }
.goal-badge { font-size:10px; padding:4px 10px; border-radius:12px; flex-shrink:0; margin-left:8px; font-weight:700; }
.badge-ok { background:var(--green-soft); color:var(--green); }
.badge-over { background:var(--red-soft); color:var(--red); }
.badge-soon { background:var(--yellow-soft); color:var(--yellow); }
.badge-active { background:var(--accent-soft); color:var(--accent); }
.goal-meta { font-size:12px; color:var(--text2); margin-bottom:12px; }
.prog-label { font-size:12px; color:var(--text2); display:flex; justify-content:space-between; margin-top:4px; }
.goal-hab-grid { display:flex; gap:4px; flex-wrap:wrap; margin-top:10px; }
.goal-hab-dot {
  width:24px; height:24px; border-radius:7px; font-size:9px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface2); border:1px solid var(--border); color:var(--text2); font-weight:700;
}
.goal-hab-dot.done { background:var(--accent); border-color:var(--accent); color:#fff; }

/* BOOKS */
.books-tabs { display:flex; gap:8px; margin-bottom:16px; }
.books-tab {
  flex:1; padding:10px 8px; border-radius:22px; border:1.5px solid var(--border);
  font-size:13px; font-weight:700; background:var(--surface); color:var(--text2);
  cursor:pointer; text-align:center; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .2s;
}
.books-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.books-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.book-card {
  background:var(--surface); border-radius:var(--radius); overflow:hidden;
  cursor:pointer; box-shadow:var(--shadow-sm); border:1px solid var(--border);
  transition:transform .15s;
}
.book-card:active { transform:scale(.97); }
.book-cover-wrap { width:100%; aspect-ratio:2/3; overflow:hidden; position:relative; background:var(--surface2); display:flex; align-items:center; justify-content:center; }
.book-cover-wrap img { width:100%; height:100%; object-fit:cover; }
.book-status-dot { position:absolute; top:8px; left:8px; width:10px; height:10px; border-radius:50%; }
.book-circ { position:absolute; bottom:6px; right:6px; width:44px; height:44px; }
.book-circ svg { width:44px; height:44px; transform:rotate(-90deg); }
.book-circ-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#fff; }
.book-info { padding:10px 10px 12px; }
.book-info-title { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.book-info-author { font-size:11px; color:var(--text2); margin-top:2px; }
.book-stars { display:flex; gap:2px; margin-top:5px; font-size:12px; }

/* VITAMINS */
.vit-hero { background:linear-gradient(135deg,#5b21b6,#7c3aed,#a855f7); border-radius:var(--radius); padding:20px; margin-bottom:14px; display:flex; align-items:center; gap:16px; }
.vit-hero-circ { position:relative; width:80px; height:80px; flex-shrink:0; }
.vit-hero-circ svg { width:80px; height:80px; transform:rotate(-90deg); }
.vit-hero-circ-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.vit-hero-circ-text .big { font-size:20px; font-weight:800; color:#fff; }
.vit-hero-circ-text .small { font-size:10px; color:rgba(255,255,255,.7); }
.vit-hero-info { flex:1; min-width:0; }
.vit-hero-date { font-size:13px; color:rgba(255,255,255,.7); margin-bottom:4px; }
.vit-hero-title { font-size:18px; font-weight:800; color:#fff; margin-bottom:4px; }
.vit-hero-sub { font-size:12px; color:rgba(255,255,255,.6); }
.vit-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:10px; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
.vit-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.vit-emoji-wrap { width:46px; height:46px; border-radius:14px; background:var(--violet-soft); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.vit-info { flex:1; min-width:0; }
.vit-name { font-weight:700; font-size:16px; }
.vit-dose { font-size:12px; color:var(--text2); margin-top:2px; }
.vit-del { background:none; border:none; color:var(--text2); cursor:pointer; padding:6px; font-size:18px; }
.vit-times { display:flex; gap:6px; flex-wrap:wrap; }
.vit-time-badge { padding:6px 14px; border-radius:14px; font-size:13px; font-weight:600; border:1.5px solid var(--border); background:var(--surface2); color:var(--text2); cursor:pointer; transition:all .2s; }
.vit-time-badge.done { background:var(--violet); border-color:var(--violet); color:#fff; }
.vit-week-row { display:flex; gap:5px; margin-top:10px; }
.vit-week-day { flex:1; height:30px; border-radius:8px; background:var(--surface2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--text2); flex-direction:column; gap:1px; font-weight:600; }
.vit-week-day.full { background:var(--violet); border-color:var(--violet); color:#fff; }
.vit-week-day.partial { background:rgba(139,92,246,.15); border-color:var(--violet); color:var(--violet); }
.vit-hist-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.vit-hist-label { font-size:11px; color:var(--text2); width:24px; text-align:right; flex-shrink:0; font-weight:600; }
.vit-hist-bar-wrap { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.vit-hist-bar-fill { height:100%; background:var(--violet); border-radius:4px; }
.vit-hist-pct { font-size:10px; color:var(--text2); width:30px; text-align:right; flex-shrink:0; font-weight:600; }

/* STREAK DOTS */
.streak-row { display:flex; gap:6px; justify-content:center; }
.streak-dot { width:32px; height:32px; border-radius:50%; background:var(--surface2); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text2); font-weight:700; }
.streak-dot.done { background:var(--accent); border-color:var(--accent); color:#fff; }

/* FAB */
#fab {
  position:fixed; bottom:calc(var(--nav-h)+18px); right:20px;
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg,var(--orange),var(--yellow));
  border:none; color:#fff; font-size:28px; cursor:pointer;
  box-shadow:0 6px 24px rgba(249,115,22,0.5);
  display:flex; align-items:center; justify-content:center; z-index:20;
  transition:transform .15s;
}
#fab:active { transform:scale(.92); }

/* MODALS */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-box { width:100%; background:var(--surface); border-radius:24px 24px 0 0; padding:20px 20px 36px; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:transform .3s; }
.modal-overlay.open .modal-box { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal-title { font-size:20px; font-weight:800; margin-bottom:18px; color:var(--text); }
.modal-field { margin-bottom:16px; }
.modal-field label { display:block; font-size:13px; color:var(--text2); margin-bottom:7px; font-weight:600; }
.modal-field input, .modal-field select, .modal-field textarea {
  width:100%; padding:12px 14px; border-radius:var(--radius-sm);
  background:var(--surface2); border:1.5px solid var(--border);
  color:var(--text); font-size:14px; outline:none; font-family:inherit;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color:var(--accent); }
.modal-field select { appearance:none; -webkit-appearance:none; }
.dates-row { display:flex; gap:10px; }
.dates-row .modal-field { flex:1; min-width:0; }

/* DAY SELECTOR */
.day-selector { display:flex; gap:5px; }
.day-sel-btn {
  flex:1; aspect-ratio:1; border-radius:10px; border:1.5px solid var(--border);
  background:var(--surface2); color:var(--text2); font-size:11px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.day-sel-btn.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
.all-days-btn {
  width:100%; padding:10px; border-radius:12px; border:1.5px solid var(--border);
  background:var(--surface2); color:var(--text2); font-size:13px; font-weight:700;
  cursor:pointer; margin-bottom:10px; transition:all .2s; text-align:center;
}
.all-days-btn.sel { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

/* EMOJI PICKER */
.emoji-picker { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.emoji-btn { width:40px; height:40px; font-size:22px; border-radius:12px; border:2px solid var(--border); background:var(--surface2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.emoji-btn.sel { border-color:var(--accent); background:var(--accent-soft); }
.times-picker { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.time-toggle { padding:8px 16px; border-radius:16px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text2); cursor:pointer; font-size:13px; font-weight:600; }
.time-toggle.sel { background:var(--violet); border-color:var(--violet); color:#fff; }

/* SAVE BTN */
.save-btn { width:100%; padding:15px; border-radius:var(--radius); border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:16px; font-weight:800; cursor:pointer; margin-top:8px; transition:opacity .2s; box-shadow:0 4px 16px rgba(124,106,247,0.3); }
.save-btn:disabled { opacity:0.4; cursor:not-allowed; box-shadow:none; }

/* BOOK OVERLAY */
#book-overlay { position:fixed; inset:0; background:var(--bg); z-index:200; overflow-y:auto; transform:translateX(100%); transition:transform .3s; }
#book-overlay.open { transform:translateX(0); }
.bok-ov-header { display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--border); background:var(--surface); }
.bok-ov-back { background:none; border:none; color:var(--text); cursor:pointer; font-size:22px; padding:4px; flex-shrink:0; }
.bok-ov-title { font-size:17px; font-weight:800; flex:1; }
.bok-ov-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:22px; }
.bok-ov-body { padding:20px; }
.bok-cover-wrap { width:130px; margin:0 auto 20px; aspect-ratio:2/3; border-radius:var(--radius); overflow:hidden; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:50px; cursor:pointer; border:2px dashed var(--border); position:relative; }
.bok-cover-wrap img { width:100%; height:100%; object-fit:cover; }
.bok-cover-edit { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.55); font-size:11px; text-align:center; padding:6px; color:#fff; font-weight:600; }
.bok-status-tabs { display:flex; gap:6px; margin-bottom:18px; }
.bok-status-tab { flex:1; padding:9px; border-radius:12px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text2); cursor:pointer; font-size:12px; font-weight:700; text-align:center; }
.bok-status-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.bok-prog-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.bok-prog-input { width:80px; padding:10px; border-radius:12px; background:var(--surface2); border:1.5px solid var(--border); color:var(--text); font-size:16px; text-align:center; outline:none; font-weight:700; }
.bok-prog-input:focus { border-color:var(--accent); }
.bok-prog-bar-wrap { flex:1; height:10px; background:var(--surface2); border-radius:5px; overflow:hidden; }
.bok-prog-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:5px; transition:width .3s; }
.bok-prog-pct { font-size:14px; font-weight:800; color:var(--accent); min-width:38px; text-align:right; }
.bok-stars { display:flex; gap:8px; margin-bottom:18px; font-size:30px; cursor:pointer; }
.bok-notes { width:100%; padding:12px; border-radius:var(--radius-sm); background:var(--surface2); border:1.5px solid var(--border); color:var(--text); font-size:14px; font-family:inherit; resize:none; outline:none; margin-bottom:18px; height:100px; }

/* AVATAR MODAL */

<script>
/* ═══════════════════════════════════════════
   TELEGRAM
═══════════════════════════════════════════ */
const tg = window.Telegram?.WebApp || {
  initData:'', initDataUnsafe:{}, ready:()=>{}, expand:()=>{},
  setHeaderColor:()=>{}, setBackgroundColor:()=>{},
  HapticFeedback:{impactOccurred:()=>{}},
  BackButton:{ show:()=>{}, hide:()=>{}, onClick:()=>{}, offClick:()=>{} }
};
tg.ready(); tg.expand();
tg.setHeaderColor('#ffffff'); tg.setBackgroundColor('#f5f6fa');
const IS_TG = tg.initData.length > 0;

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const LEVELS = [
  {n:'Новичок',xp:0},{n:'Ученик',xp:100},{n:'Искатель',xp:250},
  {n:'Воин',xp:500},{n:'Мастер',xp:900},{n:'Герой',xp:1400},
  {n:'Легенда',xp:2000},{n:'Бог',xp:3000}
];
const HAB_EMOJIS = ['💪','📚','🧘','🏃','🎯','✍️','🥗','💧','🎨','🎵','💤','🧹','🐕','🌿','🏋️','🚴','🤸','📝'];
const VIT_EMOJIS  = ['💊','🌟','☀️','🫐','🍋','🥕','🍵','💧','🧴','🌿','🫧','⚡'];
const VIT_TIMES   = ['Утро','День','Вечер','Ночь'];
const DAYS_SHORT  = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DAYS_FULL   = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const MONTHS      = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const ALL_DAYS    = [0,1,2,3,4,5,6]; // 0=Вс

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const SK = 'lq_v7';
const OLD_KEYS = ['lq5','lq_v4','lq_v5','lq_v6'];

function defaultState() {
  return {
    name:'', isLoggedIn:false, isSubscribed:false, xp:0,
    habits:[], weeks:{}, goals:[], avatar:'',
    books:[], vitamins:[], booksTab:'reading'
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) return Object.assign({}, defaultState(), JSON.parse(raw));
  } catch(e) {}
  for (const ok of OLD_KEYS) {
    try {
      const raw = localStorage.getItem(ok);
      if (!raw) continue;
      const merged = Object.assign({}, defaultState(), JSON.parse(raw));
      localStorage.setItem(SK, JSON.stringify(merged));
      return merged;
    } catch(e) {}
  }
  return defaultState();
}

let S = loadState();
function sv() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {} }

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today   = () => new Date().toISOString().slice(0,10);
const haptic  = (t='light') => { try { tg.HapticFeedback.impactOccurred(t); } catch(e) {} };

function getLevel(xp) {
  let lv = 0;
  for (let i = LEVELS.length-1; i >= 0; i--) { if (xp >= LEVELS[i].xp) { lv=i; break; } }
  return { idx:lv, ...LEVELS[lv], next:LEVELS[lv+1]||null };
}
function getLvlPct(xp) {
  const lv = getLevel(xp);
  if (!lv.next) return 100;
  return Math.min(100, Math.round((xp-lv.xp)/(lv.next.xp-lv.xp)*100));
}
function addXP(n) { S.xp = Math.max(0, S.xp+n); sv(); rHeader(); }

function getWeekKey(offset=0) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + offset*7);
  return d.toISOString().slice(0,10);
}
function getCurrentWeekKey() { return getWeekKey(0); }

function ensureWeek(wk) {
  if (!S.weeks[wk]) S.weeks[wk] = { tasks:[], notes:'' };
  if (!S.weeks[wk].tasks) S.weeks[wk].tasks = [];
}

function getWeekDates(wk) {
  const sun = new Date(wk+'T00:00:00');
  return Array.from({length:7}, (_,i) => {
    const d = new Date(sun); d.setDate(sun.getDate()+i);
    return d.toISOString().slice(0,10);
  });
}

function fmt(ds) {
  const d = new Date(ds+'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

/* ── Прогресс привычки за текущую неделю ── */
function habWeekPct(h) {
  const wk = getCurrentWeekKey();
  const weekDates = getWeekDates(wk);
  const targetDays = h.days || ALL_DAYS; // дни недели (0=Вс..6=Сб)
  // Считаем сколько дней-мишеней на этой неделе уже прошло или сегодня
  const todayStr = today();
  const targetThisWeek = weekDates.filter(d => {
    const dow = new Date(d+'T00:00:00').getDay();
    return targetDays.includes(dow) && d <= todayStr;
  });
  if (!targetThisWeek.length) return 0;
  const done = targetThisWeek.filter(d => h.completions && h.completions.includes(d)).length;
  return Math.round(done / targetThisWeek.length * 100);
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
let curPage = 'dash';
let planWeekOffset = 0;

function go(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('p-'+page);
  if (el) el.classList.add('active');
  const nb = document.querySelector(`.nav-btn[data-page="${page}"]`);
  if (nb) nb.classList.add('active');
  curPage = page;
  renderPage(page);
}

function renderPage(p) {
  if (p==='dash')  rDash();
  else if (p==='plan')  rPlanner();
  else if (p==='hab')   rHabits();
  else if (p==='goals') rGoals();
  else if (p==='books') rBooks();
  else if (p==='vit')   rVit();
}

function rAll() { rHeader(); renderPage(curPage); }

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
function rHeader() {
  const lv = getLevel(S.xp);
  const pct = getLvlPct(S.xp);
  const nextXp = lv.next ? lv.next.xp : S.xp;
  document.getElementById('hdr').innerHTML = `
    <div class="hdr-top">
      <div class="hdr-ava" onclick="openModal('m-ava')">
        ${S.avatar ? `<img src="${S.avatar}">` : '🧑'}
      </div>
      <div class="hdr-info">
        <div class="hdr-name">${S.name || 'Игрок'}</div>
        <div class="hdr-lvl">Ур. ${lv.idx+1} · ${lv.n}</div>
      </div>
      <div class="hdr-btns">
        ${!S.isSubscribed ? `<button class="hdr-btn btn-prem" onclick="buyPrem()">⭐ Premium</button>` : ''}
        ${!IS_TG ? `<button class="hdr-btn btn-out" onclick="logout()">Выйти</button>` : ''}
      </div>
    </div>

   PLANNER
═══════════════════════════════════════════ */
function rPlanner() {
  const wk = getWeekKey(planWeekOffset);
  ensureWeek(wk);
  const tasks = S.weeks[wk].tasks;
  const days = getWeekDates(wk);
  const todayStr = today();

  const byDay = {};
  days.forEach(d => byDay[d]=[]);
  byDay['nodate']=[];
  tasks.forEach(t => {
    if (t.date && days.includes(t.date)) byDay[t.date].push(t);
    else byDay['nodate'].push(t);
  });

  const doneCount = tasks.filter(t=>t.done).length;
  const weekLabel = planWeekOffset===0?'Эта неделя':planWeekOffset===1?'Следующая':planWeekOffset===-1?'Прошлая':'';

  let html = `
    <div class="section-hdr">
      <button onclick="planWeekOffset--;rPlanner()" style="background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px">‹</button>
      <div class="section-title">${weekLabel||'Неделя'}</div>
      <button onclick="planWeekOffset++;rPlanner()" style="background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px">›</button>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text2);font-weight:600">Выполнено ${doneCount} из ${tasks.length}</span>
        <span style="font-size:14px;font-weight:800;color:var(--accent)">${tasks.length?Math.round(doneCount/tasks.length*100):0}%</span>
      </div>
      <div class="prog-wrap" style="height:10px;margin-bottom:0">
        <div class="prog-fill" style="width:${tasks.length?Math.round(doneCount/tasks.length*100):0}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div>
      </div>
    </div>
  `;

  days.forEach(d => {
    const dtasks = byDay[d]||[];
    const isToday = d===todayStr;
    const dn = new Date(d+'T00:00:00');
    html += `
      <div class="card" style="${isToday?'border-color:var(--accent);border-width:2px':''}">
        <div class="card-title" style="${isToday?'color:var(--accent)':''}">
          ${DAYS_SHORT[dn.getDay()]} · ${fmt(d)}${isToday?' · Сегодня':''}
        </div>
        ${dtasks.map(t=>taskRowHtml(t)).join('')}
        ${!dtasks.length?`<div style="font-size:13px;color:var(--text2);padding:4px 0">Нет задач</div>`:''}
      </div>
    `;
  });

  if (byDay['nodate'].length) {
    html += `<div class="card"><div class="card-title">Без даты</div>${byDay['nodate'].map(t=>taskRowHtml(t)).join('')}</div>`;
  }
  document.getElementById('p-plan').innerHTML = html;
}

function taskRowHtml(t) {
  const goal = S.goals.find(g=>g.id===t.goalId);
  return `
    <div class="task-row">
      <div class="task-cb${t.done?' done':''}" onclick="togTask('${t.id}')"></div>
      <div class="task-text${t.done?' done':''}" style="flex:1">${t.text}</div>
      ${goal?`<div class="task-goal-dot" style="background:var(--accent)"></div>`:''}
      <button class="task-del" onclick="delTask('${t.id}')">✕</button>
    </div>
  `;
}

function togTask(id) {
  for (const [,w] of Object.entries(S.weeks)) {
    const t = w.tasks&&w.tasks.find(x=>x.id===id);
    if (t) { t.done=!t.done; t.done?addXP(10):addXP(-10); haptic(); sv(); break; }
  }
  if (curPage==='plan') rPlanner();
  else if (curPage==='dash') rDash();
}

function delTask(id) {
  for (const wKey of Object.keys(S.weeks)) {
    const w = S.weeks[wKey];
    if (!w.tasks) continue;
    const idx = w.tasks.findIndex(t=>t.id===id);
    if (idx!==-1) { w.tasks.splice(idx,1); break; }
  }
  sv(); rPlanner();
}

function togHab(habId, dateStr) {

  if (idx===-1) { h.completions.push(dateStr); addXP(15); }
  else { h.completions.splice(idx,1); addXP(-15); }

  if (curPage==='goals') rGoals();
}

function delHab(habId) {
  S.habits = S.habits.filter(h=>h.id!==habId);
  S.goals.forEach(g=>{ if(g.habitId===habId) g.habitId=null; });
  sv(); rHabits();

/* ═══════════════════════════════════════════
   GOALS  ← ИСПРАВЛЕННАЯ ПРИВЯЗКА
═══════════════════════════════════════════ */
function calcGoalPct(g) {
  if (!g.habitId || !g.targetPerWeek) return 0;
  const habit = S.habits.find(h=>h.id===g.habitId);
  if (!habit || !habit.completions || !habit.completions.length) return 0;

  const startDate = new Date(g.startDate+'T00:00:00');
  const endDate   = new Date(g.endDate+'T00:00:00');
  if (isNaN(startDate.getTime())||isNaN(endDate.getTime())) return 0;

  const MS_DAY = 86400000;
  const totalDays  = Math.round((endDate-startDate)/MS_DAY)+1;
  if (totalDays<=0) return 0;
  const totalWeeks = Math.ceil(totalDays/7);
  const totalTarget = g.targetPerWeek * totalWeeks;
  if (totalTarget<=0) return 0;

  let completedTotal = 0;
  for (let w=0; w<totalWeeks; w++) {
    const wStart = new Date(startDate.getTime()+w*7*MS_DAY);
    const wEnd   = new Date(Math.min(wStart.getTime()+6*MS_DAY, endDate.getTime()));
    const wStartStr = wStart.toISOString().slice(0,10);
    const wEndStr   = wEnd.toISOString().slice(0,10);
    const cnt = habit.completions.filter(d=>d>=wStartStr&&d<=wEndStr).length;
    completedTotal += Math.min(cnt, g.targetPerWeek);
  }
  return Math.min(100, Math.round(completedTotal/totalTarget*100));
}

function calcExpectedPct(g) {
  if (!g.startDate||!g.endDate) return 0;
  const now=new Date(), start=new Date(g.startDate+'T00:00:00'), end=new Date(g.endDate+'T00:00:00');
  if (now<=start) return 0;
  if (now>=end) return 100;
  return Math.round((now-start)/(end-start)*100);
}

function rGoals() {
  let html = `<div class="section-hdr"><div class="section-title">Цели</div></div>`;

  if (!S.goals.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">🎯</div>
      <div class="empty-title">Нет целей</div>
      <div>Нажми + чтобы поставить первую цель!</div>
    </div>`;
  } else {
    const now = new Date();
    S.goals.forEach(g => {
      const pct = calcGoalPct(g);
      const expPct = calcExpectedPct(g);
      const habit = g.habitId ? S.habits.find(h=>h.id===g.habitId) : null;
      const endDate = g.endDate ? new Date(g.endDate+'T00:00:00') : null;
      const daysLeft = endDate ? Math.ceil((endDate-now)/86400000) : null;

      let badge = '';
      if (pct>=100) badge=`<span class="goal-badge badge-ok">✅ Выполнено</span>`;
      else if (endDate&&daysLeft<0) badge=`<span class="goal-badge badge-over">❌ Просрочено</span>`;
      else if (endDate&&daysLeft<=7) badge=`<span class="goal-badge badge-soon">⚠️ ${daysLeft}д</span>`;
      else badge=`<span class="goal-badge badge-active">🎯 В процессе</span>`;

      // Мини-сетка последних 7 дней привычки
      let habGrid = '';
      if (habit&&habit.completions) {
        const last7 = Array.from({length:7},(_,i)=>{
          const d=new Date(); d.setDate(d.getDate()-(6-i));
          const ds=d.toISOString().slice(0,10);
          return {ds, label:DAYS_SHORT[d.getDay()], done:habit.completions.includes(ds)};
        });
        habGrid = `
          <div style="margin-top:10px">
            <div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600">
              ${habit.icon||'💪'} ${habit.name} — последние 7 дней
            </div>
            <div class="goal-hab-grid">
              ${last7.map(x=>`<div class="goal-hab-dot${x.done?' done':''}" title="${x.ds}">${x.label}</div>`).join('')}
            </div>
          </div>`;
      }

      const totalWeeks = g.endDate&&g.startDate
        ? Math.ceil((new Date(g.endDate+'T00:00:00')-new Date(g.startDate+'T00:00:00'))/86400000/7) : 0;
      const totalTarget = g.targetPerWeek*totalWeeks;

      html += `
        <div class="goal-card">
          <div class="goal-top">
            <div class="goal-title">${g.title}</div>
            ${badge}
          </div>
          <div class="goal-meta">
            ${g.startDate?fmt(g.startDate):''} — ${g.endDate?fmt(g.endDate):''}
            ${g.targetPerWeek?` · ${g.targetPerWeek}×/нед · Цель: ${totalTarget} раз`:''}
          </div>
          <div class="prog-wrap">
            <div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div>
            ${expPct>0&&pct<100?`<div class="prog-expected" style="left:${expPct}%"></div>`:''}
          </div>
          <div class="prog-label">
            <span>${pct}% выполнено</span>
            ${expPct>0&&pct<100?`<span style="color:var(--yellow);font-weight:600">Ожидаемо: ${expPct}%</span>`:''}
          </div>
          ${habGrid}
          <button class="goal-del-btn" onclick="delGoal('${g.id}')">🗑 Удалить цель</button>
        </div>
      `;
    });
  }
  document.getElementById('p-goals').innerHTML = html;
}

        <div class="val" style="color:var(--yellow);font-size:20px">${readingCount}</div>
        <div class="lbl">Дней серия чтения</div>
      </div>
    </div>
  `;

  if (!books.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">📚</div>
      <div class="empty-title">Нет книг в процессе</div>
      <div>Нажми + чтобы добавить</div>
    </div>`;
  } else {
    html += `<div class="books-grid">`;
    books.forEach(b => {
      const pct = b.total>0 ? Math.min(100,Math.round((b.current||0)/b.total*100)) : 0;
      const r=16; const circ=2*Math.PI*r; const dash=circ*pct/100;
      const statusColor = b.status==='done'?'var(--green)':b.status==='want'?'var(--yellow)':'var(--accent)';
      html += `
        <div class="book-card" onclick="openBook('${b.id}')">
          <div class="book-cover-wrap">
            ${b.cover?`<img src="${b.cover}" alt="cover">`:`<span style="font-size:40px">📖</span>`}
            <div class="book-status-dot" style="background:${statusColor}"></div>
            ${b.status==='reading'?`
            <div class="book-circ">
              <svg viewBox="0 0 44 44">
                <circle cx="22" cy="22" r="${r}" fill="rgba(0,0,0,.4)" stroke="none"/>
                <circle cx="22" cy="22" r="${r}" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="4"/>
                <circle cx="22" cy="22" r="${r}" fill="none" stroke="#fff" stroke-width="4"
                  stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
              </svg>
              <div class="book-circ-text">${pct}%</div>
            </div>`:''}
          </div>
          <div class="book-info">
            <div class="book-info-title">${b.title}</div>
            ${b.author?`<div class="book-info-author">${b.author}</div>`:''}
            ${b.rating?`<div class="book-stars">${[1,2,3,4,5].map(i=>`<span>${i<=b.rating?'⭐':'☆'}</span>`).join('')}</div>`:''}
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }
  document.getElementById('p-books').innerHTML = html;
}

function setBooksTab(tab) { S.booksTab=tab; sv(); rBooks(); }

function openBook(id) {

  curBookId = id;

  document.getElementById('bok-ov-body').innerHTML = `
    <div class="bok-cover-wrap" onclick="document.getElementById('bok-file-input').click()">

    <div class="bok-status-tabs">

      <button class="bok-status-tab${(b.status||'reading')==='done'?' active':''}" onclick="bokSetStatus('done')">✅ Прочитал</button>
      <button class="bok-status-tab${(b.status||'reading')==='want'?' active':''}" onclick="bokSetStatus('want')">💜 Хочу</button>

      <div class="sec-label">Прогресс чтения</div>

          <div class="bok-prog-bar" id="bok-prog-bar" style="width:${pct}%"></div>

      </div>
    </div>

    <div style="margin-bottom:18px">

function closeBookOverlay() {
  document.getElementById('book-overlay').classList.remove('open');
  tg.BackButton.hide(); curBookId=null; rBooks();
}
function bokCoverChange() {
  const inp=document.getElementById('bok-file-input');
  if (!inp.files[0]) return;
  const fr=new FileReader();
  fr.onload=e=>{
    const b=S.books.find(x=>x.id===curBookId);
    if (b) { b.cover=e.target.result; sv(); }
    const wrap=document.querySelector('.bok-cover-wrap');
    if (wrap) wrap.innerHTML=`<img src="${e.target.result}"><div class="bok-cover-edit">Нажми чтобы изменить</div>`;
  };
  fr.readAsDataURL(inp.files[0]);
}
function bokSetStatus(status) {
  const b=S.books.find(x=>x.id===curBookId);
  if (!b) return;
  b.status=status;
  if (status==='done'&&!b.finishedDate) b.finishedDate=today();
  document.querySelectorAll('.bok-status-tab').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
}
function bokSetRating(r) {
  const b=S.books.find(x=>x.id===curBookId);
  if (!b) return; b.rating=r;
  const stars=document.getElementById('bok-stars');
  if (stars) stars.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="bokSetRating(${i})">${i<=r?'⭐':'☆'}</span>`).join('');
}
function bokUpdateProg() {
  const b=S.books.find(x=>x.id===curBookId); if (!b) return;
  const val=Math.min(b.total,Math.max(0,parseInt(document.getElementById('bok-cur').value)||0));
  const pct=b.total>0?Math.round(val/b.total*100):0;
  const bar=document.getElementById('bok-prog-bar'); if (bar) bar.style.width=pct+'%';
  const pctEl=document.getElementById('bok-prog-pct'); if (pctEl) pctEl.textContent=pct+'%';
}
function bokSave() {
  const b=S.books.find(x=>x.id===curBookId); if (!b) return;
  const cur=parseInt(document.getElementById('bok-cur').value)||0;
  const old=b.current||0; b.current=Math.min(b.total,Math.max(0,cur));
  const notesEl=document.getElementById('bok-notes'); if (notesEl) b.notes=notesEl.value;
  if (b.current>old) addXP(Math.floor((b.current-old)/10));
  if (b.current>=b.total) { b.status='done'; if (!b.finishedDate) b.finishedDate=today(); }
  sv(); closeBookOverlay(); haptic('medium');
}
function delBook() {
  if (!curBookId) return;
  S.books=S.books.filter(b=>b.id!==curBookId); sv(); closeBookOverlay();
}

/* ═══════════════════════════════════════════
   VITAMINS
═══════════════════════════════════════════ */
function rVit() {
  if (!S.vitamins) S.vitamins=[];
  const todayStr=today(); const td=new Date();

  let totalToday=0, doneToday=0;
  S.vitamins.forEach(v=>{
    if (v.endDate&&todayStr>v.endDate) return;
    const times=v.times||['Утро']; totalToday+=times.length;
    doneToday+=times.filter(t=>v.taken&&v.taken[todayStr]&&v.taken[todayStr].includes(t)).length;
  });
  const heroPct=totalToday>0?Math.round(doneToday/totalToday*100):0;
  const heroR=35; const heroCirc=2*Math.PI*heroR; const heroDash=heroCirc*heroPct/100;

  let streakDays=0;
  for (let i=0;i<30;i++){
    const d=new Date(td); d.setDate(td.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    if (S.vitamins.some(v=>v.taken&&v.taken[ds]&&v.taken[ds].length)) streakDays++; else break;
  }
  let totalPills=0;
  S.vitamins.forEach(v=>Object.values(v.taken||{}).forEach(arr=>totalPills+=(arr||[]).length));
  const daySet=new Set();
  S.vitamins.forEach(v=>Object.entries(v.taken||{}).forEach(([d,arr])=>{if(arr&&arr.length)daySet.add(d);}));

  const hist7=Array.from({length:7},(_,i)=>{
    const d=new Date(td); d.setDate(td.getDate()-(6-i));
    const ds=d.toISOString().slice(0,10);
    let tot=0,dn2=0;
    S.vitamins.forEach(v=>{const times=v.times||['Утро'];tot+=times.length;dn2+=times.filter(t=>v.taken&&v.taken[ds]&&v.taken[ds].includes(t)).length;});
    return {label:DAYS_SHORT[d.getDay()],pct:tot>0?Math.round(dn2/tot*100):0};
  });

  let html = `
    <div class="vit-hero">
      <div class="vit-hero-circ">
        <svg viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="${heroR}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="7"/>
          <circle cx="40" cy="40" r="${heroR}" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="7"
            stroke-dasharray="${heroDash} ${heroCirc}" stroke-linecap="round"/>
        </svg>
        <div class="vit-hero-circ-text">
          <div class="big">${heroPct}%</div>
          <div class="small">${doneToday}/${totalToday}</div>
        </div>
      </div>
      <div class="vit-hero-info">
        <div class="vit-hero-date">${td.getDate()} ${MONTHS[td.getMonth()]}</div>
        <div class="vit-hero-title">Витамины</div>
        <div class="vit-hero-sub">Сегодня ${doneToday} из ${totalToday}</div>
      </div>
    </div>
    <div class="stats-grid-3" style="margin-bottom:14px">
      <div class="stat-tile"><div style="font-size:24px">🔥</div><div class="val" style="color:var(--violet)">${streakDays}</div><div class="lbl">Дней стрика</div></div>
      <div class="stat-tile"><div style="font-size:24px">📅</div><div class="val" style="color:var(--green)">${daySet.size}</div><div class="lbl">Активных дней</div></div>
      <div class="stat-tile"><div style="font-size:24px">💊</div><div class="val" style="color:var(--blue)">${totalPills}</div><div class="lbl">Принято всего</div></div>
    </div>
    <div class="section-hdr"><div class="section-title">Сегодня</div></div>
  `;

  if (!S.vitamins.length) {
    html+=`<div class="empty-state"><div class="empty-icon">💊</div><div class="empty-title">Нет витаминов</div><div>Нажми + чтобы добавить!</div></div>`;
  } else {
    S.vitamins.forEach(v=>{
      if (v.endDate&&todayStr>v.endDate) return;
      const taken=v.taken||{}, times=v.times||['Утро'];
      const weekDates=Array.from({length:7},(_,i)=>{
        const sun=new Date(td); sun.setDate(td.getDate()-td.getDay());
        const day=new Date(sun); day.setDate(sun.getDate()+i);
        const ds=day.toISOString().slice(0,10);
        const full=times.every(t=>taken[ds]&&taken[ds].includes(t));
        const part=times.some(t=>taken[ds]&&taken[ds].includes(t));
        return {label:DAYS_SHORT[day.getDay()],full,part:part&&!full};
      });
      html+=`
        <div class="vit-card">
          <div class="vit-top">
            <div class="vit-emoji-wrap">${v.emoji||'💊'}</div>
            <div class="vit-info">
              <div class="vit-name">${v.name}</div>
              <div class="vit-dose">${v.dose||''}${v.endDate?' · до '+fmt(v.endDate):''}</div>
            </div>
            <button class="vit-del" onclick="delVit('${v.id}')">🗑</button>
          </div>
          <div class="vit-times">
            ${times.map(t=>{const done=taken[todayStr]&&taken[todayStr].includes(t);
              return `<div class="vit-time-badge${done?' done':''}" onclick="vitToggle('${v.id}','${t}')">${t}</div>`;
            }).join('')}
          </div>
          <div class="vit-week-row">
            ${weekDates.map(d=>`<div class="vit-week-day${d.full?' full':d.part?' partial':''}"><span>${d.label}</span>${d.full?'✓':''}</div>`).join('')}
          </div>
        </div>
      `;
    });
  }

  html+=`
    <div class="card" style="margin-top:14px">
      <div class="card-title">История 7 дней</div>
      ${hist7.map(h=>`
        <div class="vit-hist-row">
          <div class="vit-hist-label">${h.label}</div>
          <div class="vit-hist-bar-wrap"><div class="vit-hist-bar-fill" style="width:${h.pct}%"></div></div>
          <div class="vit-hist-pct">${h.pct}%</div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('p-vit').innerHTML = html;
}

function vitToggle(vitId,time) {
  const v=S.vitamins.find(x=>x.id===vitId); if (!v) return;
  if (!v.taken) v.taken={};
  const ds=today(); if (!v.taken[ds]) v.taken[ds]=[];
  const idx=v.taken[ds].indexOf(time);
  if (idx===-1){v.taken[ds].push(time);addXP(5);haptic();}
  else{v.taken[ds].splice(idx,1);addXP(-5);}
  sv(); rVit();
}
function delVit(vitId) { S.vitamins=S.vitamins.filter(v=>v.id!==vitId); sv(); rVit(); }

}

}
function fillHabSelect(selId) {
  const sel=document.getElementById(selId); if (!sel) return;

/* ── Emoji picker ── */
let selEmoji={hab:'💪',vit:'💊'};
function buildEmojiPicker(containerId,emojis,type) {
  const c=document.getElementById(containerId); if (!c) return;
  c.innerHTML=emojis.map(e=>`<button class="emoji-btn${selEmoji[type]===e?' sel':''}" onclick="selEmojiClick('${type}','${e}','${containerId}','${containerId==='h-emoji-pick'?'hab':'vit'}')">${e}</button>`).join('');

/* ── Days picker ── */
let selDays = new Set(ALL_DAYS);
function buildDaysPicker() {
  const c=document.getElementById('h-days-pick'); if (!c) return;
  const allBtn=document.getElementById('all-days-btn');
  const allSel=selDays.size===7;
  if (allBtn) { allBtn.textContent=allSel?'✓ Каждый день':'Каждый день'; allBtn.className='all-days-btn'+(allSel?' sel':''); }
  c.innerHTML=DAYS_SHORT.map((d,i)=>`
    <div class="day-sel-btn${selDays.has(i)?' sel':''}" onclick="toggleDay(${i})">${d}</div>
  `).join('');
}
function toggleDay(i) {
  if (selDays.has(i)) { if (selDays.size>1) selDays.delete(i); }
  else selDays.add(i);
  buildDaysPicker();
  validateModal('m-hab');
}
function toggleAllDays() {
  if (selDays.size===7) { selDays=new Set([new Date().getDay()]); }
  else { selDays=new Set(ALL_DAYS); }
  buildDaysPicker();
}

/* ── Times picker ── */
let selTimes=new Set(['Утро']);
function buildTimesPicker() {
  const c=document.getElementById('v-times-pick'); if (!c) return;
  c.innerHTML=VIT_TIMES.map(t=>`<div class="time-toggle${selTimes.has(t)?' sel':''}" onclick="toggleTime('${t}')">${t}</div>`).join('');
}
function toggleTime(t) { if(selTimes.has(t))selTimes.delete(t); else selTimes.add(t); buildTimesPicker(); }

/* ── Validation ── */
function validateModal(modalId) {
  if (modalId==='m-task') setBtn('save-task',!!document.getElementById('t-text')?.value.trim());
  else if (modalId==='m-hab') setBtn('save-hab',!!document.getElementById('h-name')?.value.trim());
  else if (modalId==='m-goal') setBtn('save-goal',!!(document.getElementById('g-title')?.value.trim()&&document.getElementById('g-end')?.value));
  else if (modalId==='m-book') setBtn('save-book',!!(document.getElementById('b-title')?.value.trim()&&parseInt(document.getElementById('b-total')?.value)>0));
  else if (modalId==='m-vit') setBtn('save-vit',!!document.getElementById('v-name')?.value.trim());
}
function setBtn(id,enabled) { const b=document.getElementById(id); if(b){b.disabled=!enabled;} }

function saveGoal() {

  if (IS_TG) {
    const tgUser=tg.initDataUnsafe?.user;
    if (tgUser) { S.name=tgUser.first_name||S.name||'Игрок'; S.isLoggedIn=true; sv(); }
  }

  if (!S.isLoggedIn) {
    document.getElementById('landing').style.display='flex';
    document.getElementById('shell').style.display='none';
  } else {
    document.getElementById('landing').style.display='none';
    document.getElementById('shell').style.display='flex';
    rAll();
  }
}

init();
</script>
</body>
