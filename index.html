<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ЛайфКвест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#F4F0FF;
  --card:#FFFFFF;
  --accent:#9B6DFF;
  --accent2:#5B8CFF;
  --accent3:#2FA6FF;
  --grad-hdr:linear-gradient(135deg,#BB62FF 0%,#5B8CFF 55%,#2FA6FF 100%);
  --text:#1A1035;
  --sub:#7A6E9A;
  --nav-h:64px;
  --r:18px;
  --sha:0 4px 24px rgba(155,109,255,.13);
  --pri-hi:#FF5A5A;
  --pri-md:#FFB830;
  --pri-lo:#4CD78A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── SHELL ── */
#shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── HEADER ── */
#hdr{
  background:var(--grad-hdr);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  transition:background .4s ease;
  position:relative;z-index:10;
}
.hdr-ava{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.6);overflow:hidden;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.hdr-ava img{width:100%;height:100%;object-fit:cover;}
.hdr-ava svg{width:22px;height:22px;fill:rgba(255,255,255,.85);}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-lvl{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px;}
.hdr-xp-bar{height:4px;background:rgba(255,255,255,.25);border-radius:4px;margin-top:4px;overflow:hidden;}
.hdr-xp-fill{height:100%;background:#fff;border-radius:4px;transition:width .4s;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hdr-premium{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;}

/* ── NAV ── */
#nav{
  height:var(--nav-h);background:#fff;border-top:1px solid rgba(155,109,255,.1);
  display:flex;align-items:center;justify-content:space-around;
  flex-shrink:0;z-index:20;
  box-shadow:0 -2px 12px rgba(155,109,255,.08);
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:12px;transition:background .2s;}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:#B0A8CC;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.nav-btn span{font-size:10px;color:#B0A8CC;transition:color .2s;}
.nav-btn.active svg{stroke:var(--accent);}
.nav-btn.active span{color:var(--accent);}

/* ── PAGES ── */
#pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:16px;}
.page.active{display:block;}
/* Hide scrollbar */
.page::-webkit-scrollbar{display:none;}

/* ── PLANNER ── */
#p-plan{padding:0;}

/* Ring Carousel */
.ring-carousel-wrap{
  background:var(--grad-hdr);
  padding:16px 0 20px;
  overflow:hidden;
  position:relative;
}
.ring-carousel{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  width:100%;
  position:relative;
  height:130px;
  touch-action:pan-y;
  user-select:none;
}
.ring-item{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .35s cubic-bezier(.4,0,.2,1), opacity .35s;
  cursor:pointer;
  position:absolute;
  top:50%;
}
.ring-item.pos-center{
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
  z-index:3;
  left:50%;
}
.ring-item.pos-left{
  transform:translate(-50%,-50%) scale(0.65);
  opacity:0.7;
  z-index:2;
  left:calc(50% - 105px);
}
.ring-item.pos-right{
  transform:translate(-50%,-50%) scale(0.65);
  opacity:0.7;
  z-index:2;
  left:calc(50% + 105px);
}
.ring-item.pos-hidden-left{
  transform:translate(-50%,-50%) scale(0.4);
  opacity:0;
  z-index:1;
  left:calc(50% - 180px);
  pointer-events:none;
}
.ring-item.pos-hidden-right{
  transform:translate(-50%,-50%) scale(0.4);
  opacity:0;
  z-index:1;
  left:calc(50% + 180px);
  pointer-events:none;
}

.ring-svg-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.ring-label{margin-top:6px;text-align:center;}
.ring-label .r-day-name{font-size:11px;color:rgba(255,255,255,.75);font-weight:500;}
.ring-label .r-day-num{font-size:13px;color:#fff;font-weight:700;}
.ring-item.pos-center .ring-label .r-day-name{font-size:13px;}
.ring-item.pos-center .ring-label .r-day-num{font-size:15px;}

.ring-center-text{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  pointer-events:none;
}
.ring-pct{font-size:14px;font-weight:800;color:#fff;line-height:1;}
.ring-cnt{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.ring-item.pos-center .ring-pct{font-size:18px;}
.ring-item.pos-center .ring-cnt{font-size:11px;}

/* Schedule card */
.plan-body{padding:16px;}
.sched-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sha);overflow:hidden;}
.sched-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.sched-hdr-left{display:flex;align-items:center;gap:8px;}
.sched-hdr-left svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sched-title{font-size:15px;font-weight:700;color:var(--text);}
.sched-date{font-size:13px;color:var(--sub);font-weight:500;}
.add-task-btn{width:36px;height:36px;border-radius:50%;background:var(--grad-hdr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(155,109,255,.35);flex-shrink:0;}
.add-task-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}

/* Timeline */
.timeline{padding:0 16px 16px;}
.tl-item{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;}
.tl-time{font-size:11px;color:var(--sub);width:42px;flex-shrink:0;padding-top:12px;text-align:right;line-height:1.3;}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:14px;flex-shrink:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tl-dot.pri-hi{background:var(--pri-hi);}
.tl-dot.pri-md{background:var(--pri-md);}
.tl-dot.pri-lo{background:var(--pri-lo);}
.tl-line{width:2px;flex:1;min-height:24px;background:rgba(155,109,255,.1);margin-top:3px;}
.tl-card{
  flex:1;
  background:linear-gradient(135deg,rgba(255,184,48,.08),rgba(255,184,48,.03));
  border:1.5px solid rgba(255,184,48,.2);
  border-radius:14px;
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  min-width:0;
}
.tl-card.pri-hi{background:linear-gradient(135deg,rgba(255,90,90,.08),rgba(255,90,90,.03));border-color:rgba(255,90,90,.2);}
.tl-card.pri-lo{background:linear-gradient(135deg,rgba(76,215,138,.08),rgba(76,215,138,.03));border-color:rgba(76,215,138,.2);}
.tl-card-body{flex:1;min-width:0;}
.tl-task-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-task-name.done-text{text-decoration:line-through;color:var(--sub);}
.tl-task-time{font-size:11px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:3px;}
.tl-task-time svg{width:11px;height:11px;stroke:var(--sub);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;}
.tl-check{
  width:30px;height:30px;border-radius:10px;
  border:2px solid rgba(155,109,255,.3);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .2s;
}
.tl-check.done{background:var(--grad-hdr);border-color:transparent;}
.tl-check svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none;}
.tl-check.done svg{display:block;}
.tl-empty{text-align:center;padding:32px 16px;color:var(--sub);font-size:14px;}
.tl-empty svg{width:40px;height:40px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:8px;opacity:.5;}

/* ── HABITS ── */
.hab-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.hab-head h2{font-size:18px;font-weight:800;}
.sec-add{width:36px;height:36px;border-radius:50%;background:var(--grad-hdr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(155,109,255,.3);}
.sec-add svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}
.hab-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.hab-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sha);}
.hab-card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hab-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hab-info{flex:1;min-width:0;}
.hab-name{font-size:14px;font-weight:700;}
.hab-streak{font-size:11px;color:var(--sub);}
.hab-prog-bar{height:6px;background:rgba(155,109,255,.12);border-radius:6px;overflow:hidden;}
.hab-prog-fill{height:100%;background:var(--grad-hdr);border-radius:6px;transition:width .4s;}
.hab-prog-label{font-size:10px;color:var(--sub);margin-top:4px;text-align:right;}
.hab-check{width:30px;height:30px;border-radius:10px;border:2px solid rgba(155,109,255,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.hab-check.done{background:var(--grad-hdr);border-color:transparent;}
.hab-check svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none;}
.hab-check.done svg{display:block;}

/* ── GOALS ── */
.goals-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.goals-head h2{font-size:18px;font-weight:800;}
.goals-list{padding:0 16px;display:flex;flex-direction:column;gap:12px;}
.goal-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sha);}
.goal-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.goal-icon{width:44px;height:44px;border-radius:14px;background:var(--grad-hdr);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.goal-info{flex:1;min-width:0;}
.goal-name{font-size:15px;font-weight:700;}
.goal-deadline{font-size:11px;color:var(--sub);margin-top:2px;}
.goal-prog-bar{height:8px;background:rgba(155,109,255,.12);border-radius:8px;overflow:hidden;}
.goal-prog-fill{height:100%;background:var(--grad-hdr);border-radius:8px;transition:width .5s;}
.goal-prog-label{font-size:11px;color:var(--sub);margin-top:5px;display:flex;justify-content:space-between;}

/* ── BOOKS ── */
.books-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.books-head h2{font-size:18px;font-weight:800;}
.books-list{padding:0 16px;display:flex;flex-direction:column;gap:12px;}
.book-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sha);display:flex;gap:12px;align-items:center;}
.book-cover{width:52px;height:70px;border-radius:10px;background:var(--grad-hdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;}
.book-cover img{width:100%;height:100%;object-fit:cover;}
.book-info{flex:1;min-width:0;}
.book-title{font-size:14px;font-weight:700;margin-bottom:2px;}
.book-author{font-size:11px;color:var(--sub);margin-bottom:6px;}
.book-prog-bar{height:5px;background:rgba(155,109,255,.12);border-radius:5px;overflow:hidden;}
.book-prog-fill{height:100%;background:var(--grad-hdr);border-radius:5px;transition:width .4s;}
.book-pages{font-size:10px;color:var(--sub);margin-top:3px;}

/* ── VITAMINS ── */
.vit-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.vit-head h2{font-size:18px;font-weight:800;}
.vit-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.vit-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sha);display:flex;align-items:center;gap:12px;}
.vit-icon{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#FF8FAB,#FF5A5A);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.vit-info{flex:1;min-width:0;}
.vit-name{font-size:14px;font-weight:700;}
.vit-dose{font-size:11px;color:var(--sub);margin-top:2px;}
.vit-check{width:30px;height:30px;border-radius:10px;border:2px solid rgba(155,109,255,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.vit-check.done{background:var(--grad-hdr);border-color:transparent;}
.vit-check svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none;}
.vit-check.done svg{display:block;}

/* ── DASHBOARD ── */
.dash-wrap{padding:16px;}
.dash-xp-card{background:var(--grad-hdr);border-radius:var(--r);padding:18px;color:#fff;margin-bottom:14px;box-shadow:0 4px 20px rgba(155,109,255,.3);}
.dash-xp-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.dash-ava{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.5);overflow:hidden;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;}
.dash-ava img{width:100%;height:100%;object-fit:cover;}
.dash-ava svg{width:28px;height:28px;fill:rgba(255,255,255,.85);}
.dash-name{font-size:18px;font-weight:800;}
.dash-lvl{font-size:12px;opacity:.8;margin-top:2px;}
.dash-xp-bar{height:8px;background:rgba(255,255,255,.25);border-radius:8px;overflow:hidden;}
.dash-xp-fill{height:100%;background:#fff;border-radius:8px;transition:width .5s;}
.dash-xp-label{font-size:11px;opacity:.75;margin-top:5px;text-align:right;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-tile{background:var(--card);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sha);}
.stat-val{font-size:22px;font-weight:800;color:var(--accent);}
.stat-lbl{font-size:10px;color:var(--sub);margin-top:2px;}
.section-title{font-size:15px;font-weight:700;margin-bottom:10px;}

/* ── MODALS ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(3px);}
.mo.open{display:flex;}
.mo-box{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:slideUp .3s ease;}
.mo-box::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mo-handle{width:40px;height:4px;background:#E0D9F5;border-radius:4px;margin:0 auto 14px;}
.mo-title{font-size:17px;font-weight:800;margin-bottom:16px;text-align:center;}
.f{margin-bottom:12px;}
.f label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600;}
.f input,.f select,.f textarea{width:100%;border:1.5px solid rgba(155,109,255,.2);border-radius:12px;padding:10px 12px;font-size:14px;outline:none;background:#F8F5FF;color:var(--text);transition:border .2s;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--accent);}
.dates-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.save-btn{width:100%;padding:14px;background:var(--grad-hdr);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 4px 14px rgba(155,109,255,.35);}
.save-btn:disabled{opacity:.4;cursor:not-allowed;}
.mo-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;background:#F0EBF8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}

/* ── LANDING ── */
#landing{position:fixed;inset:0;background:var(--grad-hdr);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:32px;}
.land-logo{font-size:52px;margin-bottom:12px;}
.land-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:8px;}
.land-sub{font-size:15px;color:rgba(255,255,255,.75);text-align:center;margin-bottom:32px;}
.land-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}
.land-input{padding:14px 16px;border-radius:14px;border:none;font-size:15px;background:rgba(255,255,255,.18);color:#fff;outline:none;}
.land-input::placeholder{color:rgba(255,255,255,.6);}
.land-btn{padding:15px;border-radius:14px;border:none;background:#fff;color:var(--accent);font-size:16px;font-weight:800;cursor:pointer;}

/* ── AVATAR MODAL ── */
.ava-opts{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px;}
.ava-opt{width:60px;height:60px;border-radius:50%;border:3px solid transparent;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;background:#F0EBF8;transition:border .2s;}
.ava-opt.sel{border-color:var(--accent);}
.ava-upload{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:#F8F5FF;border-radius:12px;cursor:pointer;font-size:13px;color:var(--accent);font-weight:600;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--sub);}
.empty-state svg{width:48px;height:48px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:12px;opacity:.5;}
.empty-state p{font-size:14px;}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="land-logo">🏆</div>
  <div class="land-title">ЛайфКвест</div>
  <div class="land-sub">Прокачай свою жизнь каждый день</div>
  <div class="land-form">
    <input class="land-input" id="ln-name" placeholder="Ваше имя" maxlength="24">
    <button class="land-btn" id="ln-go">Начать →</button>
  </div>
</div>

<!-- SHELL -->
<div id="shell" style="display:none;">

  <!-- HEADER -->
  <div id="hdr">
    <div class="hdr-ava" id="hdr-ava-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">—</div>
      <div class="hdr-lvl" id="hdr-lvl">Уровень 1</div>
      <div class="hdr-xp-bar"><div class="hdr-xp-fill" id="hdr-xp-fill" style="width:0%"></div></div>
    </div>
    <div class="hdr-right">
      <button class="hdr-premium" id="hdr-premium-btn">⭐ Premium</button>
    </div>
  </div>

  <!-- PAGES -->
  <div id="pages">

    <!-- DASHBOARD -->
    <div class="page" id="p-dash"></div>

    <!-- PLANNER -->
    <div class="page" id="p-plan"></div>

    <!-- HABITS -->
    <div class="page" id="p-hab">
      <div class="hab-head">
        <h2>Привычки</h2>
        <button class="sec-add" data-action="open-modal" data-modal="m-hab">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="hab-list" id="hab-list"></div>
    </div>

    <!-- GOALS -->

<script>
(function(){'use strict';

/* ═══════════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════════ */
var KEY = 'lq_v9';
var XP_PER_LVL = 200;
var S;
var curP = 'plan';
var planSel = '';
var planCenterIdx = 0; // index into flat day array

var DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
var MONTH_NAMES = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function today(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return n<10?'0'+n:String(n);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function dateFromStr(s){
  var p=s.split('-');
  return new Date(+p[0],+p[1]-1,+p[2]);
}
function strFromDate(d){
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function addDays(s,n){
  var d=dateFromStr(s);
  d.setDate(d.getDate()+n);
  return strFromDate(d);
}
function fmtDate(s){
  var d=dateFromStr(s);
  return d.getDate()+' '+MONTH_NAMES[d.getMonth()];
}
function wkKey(s){
  var d=dateFromStr(s);
  var day=d.getDay();
  var diff=d.getDate()-(day===0?6:day-1);
  var mon=new Date(d.getFullYear(),d.getMonth(),diff);
  return strFromDate(mon);
}

/* ═══════════════════════════════════════
   STORAGE
═══════════════════════════════════════ */
function defS(){
  return {
    name:'',ava:'🦊',xp:0,
    weeks:{},
    habits:[],goals:[],books:[],vitamins:[],
    vitDone:{},
    premium:false
  };
}
function loadS(){
  try{
    var raw=localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
    // migrate old keys
    var oldKeys=['lq5','lq_v4','lq_v5','lq_v6','lq_v7','lq_v8'];
    for(var i=0;i<oldKeys.length;i++){
      var o=localStorage.getItem(oldKeys[i]);
      if(o){var d=JSON.parse(o);localStorage.removeItem(oldKeys[i]);return Object.assign(defS(),d);}
    }
  }catch(e){}
  return defS();
}
function sv(){localStorage.setItem(KEY,JSON.stringify(S));}

/* ═══════════════════════════════════════
   XP / LEVEL
═══════════════════════════════════════ */
function lvl(){return Math.floor(S.xp/XP_PER_LVL)+1;}
function xpInLvl(){return S.xp%XP_PER_LVL;}
function xpPct(){return Math.round(xpInLvl()/XP_PER_LVL*100);}
function addXP(n){S.xp+=n;sv();}

/* ═══════════════════════════════════════
   WEEK / TASK HELPERS
═══════════════════════════════════════ */
function ensW(wk){
  if(!S.weeks[wk]) S.weeks[wk]={tasks:[]};
  return S.weeks[wk];
}
function tasksForDate(dateStr){
  var wk=wkKey(dateStr);
  return (S.weeks[wk]?S.weeks[wk].tasks:[]).filter(function(t){return t.date===dateStr;});
}
function allTasks(){
  var arr=[];
  Object.values(S.weeks).forEach(function(w){arr=arr.concat(w.tasks||[]);});
  return arr;
}
function taskDoneCount(dateStr){
  return tasksForDate(dateStr).filter(function(t){return t.done;}).length;
}
function taskTotalCount(dateStr){
  return tasksForDate(dateStr).length;
}
function taskPct(dateStr){
  var tot=taskTotalCount(dateStr);
  return tot===0?0:Math.round(taskDoneCount(dateStr)/tot*100);
}

/* ═══════════════════════════════════════
   RING SVG
═══════════════════════════════════════ */
function ringsvg(pct,size,stroke,color){
  var r=(size-stroke)/2;
  var circ=2*Math.PI*r;
  var dash=circ*(pct/100);
  var cx=size/2,cy=size/2;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="'+stroke+'"/>'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+stroke
    +'" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+(-circ/4)+'" stroke-linecap="round"/>'
    +'</svg>';
}

/* ═══════════════════════════════════════
   PLANNER CAROUSEL
═══════════════════════════════════════ */
// planCenterIdx is index in a "virtual" continuous day list
// day 0 = today. Negative = past, positive = future
// We store offset from today

var carouselAnimating = false;

function buildCarousel(){
  var wrap = document.querySelector('.ring-carousel');
  if(!wrap) return;
  renderCarouselItems(wrap, false);
  attachCarouselEvents(wrap);
}

function idxToDate(idx){
  return addDays(today(), idx);
}

function renderCarouselItems(wrap, animate){
  var positions = ['pos-hidden-left','pos-left','pos-center','pos-right','pos-hidden-right'];
  var offsets = [-2,-1,0,1,2];
  var html='';
  offsets.forEach(function(off, i){
    var dateStr = idxToDate(planCenterIdx + off);
    var d = dateFromStr(dateStr);
    var dayName = DAY_NAMES[d.getDay()];
    var dayNum = d.getDate();
    var pct = taskPct(dateStr);
    var tot = taskTotalCount(dateStr);
    var isCenter = off===0;
    var sz = isCenter ? 88 : 60;
    var sw = isCenter ? 7 : 5;
    html += '<div class="ring-item '+positions[i]+'" data-offset="'+off+'">'
      +'<div class="ring-svg-wrap">'
      +ringsvg(pct, sz, sw, '#fff')
      +'<div class="ring-center-text">'
      +'<div class="ring-pct">'+(pct>0?pct+'%':tot>0?pct+'%':'')+'</div>'
      +(tot>0?'<div class="ring-cnt">'+tot+'</div>':'')
      +'</div>'
      +'</div>'
      +'<div class="ring-label">'
      +'<div class="r-day-name">'+dayName+'</div>'
      +'<div class="r-day-num">'+dayNum+'</div>'
      +'</div>'
    +'</div>';
  });
  wrap.innerHTML = html;
}

function attachCarouselEvents(wrap){
  // Click on left/right
  wrap.addEventListener('click', function(e){
    var item = e.target.closest('.ring-item');
    if(!item || carouselAnimating) return;
    var off = parseInt(item.dataset.offset);
    if(off === 0) return;
    shiftCarousel(off > 0 ? 1 : -1, wrap);
  });

  // Swipe
  var sx=0, sy=0;
  wrap.addEventListener('touchstart', function(e){
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, {passive:true});
  wrap.addEventListener('touchend', function(e){
    if(carouselAnimating) return;
    var dx = e.changedTouches[0].clientX - sx;
    var dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30){
      shiftCarousel(dx < 0 ? 1 : -1, wrap);
    }
  }, {passive:true});

  // Mouse drag
  var mx=0, dragging=false;
  wrap.addEventListener('mousedown', function(e){mx=e.clientX;dragging=true;});
  wrap.addEventListener('mouseup', function(e){
    if(!dragging || carouselAnimating) return;
    dragging=false;
    var dx=e.clientX-mx;
    if(Math.abs(dx)>30) shiftCarousel(dx<0?1:-1,wrap);
  });
  wrap.addEventListener('mouseleave', function(){dragging=false;});
}

function shiftCarousel(dir, wrap){
  carouselAnimating = true;
  planCenterIdx += dir;
  var dateStr = idxToDate(planCenterIdx);
  planSel = dateStr;

  // Animate out
  var items = wrap.querySelectorAll('.ring-item');
  var positions = ['pos-hidden-left','pos-left','pos-center','pos-right','pos-hidden-right'];
  // shift positions
  items.forEach(function(item){
    var curOff = parseInt(item.dataset.offset);
    var newOff = curOff - dir;
    var posIdx = newOff + 2; // -2..2 => 0..4
    item.dataset.offset = newOff;
    // remove all pos classes
    positions.forEach(function(p){item.classList.remove(p);});
    if(posIdx >= 0 && posIdx < 5){
      item.classList.add(positions[posIdx]);
      // Update ring size for center
      updateRingItem(item, newOff===0, idxToDate(planCenterIdx + newOff));
    } else {
      item.style.display='none';
    }
  });

  setTimeout(function(){
    carouselAnimating = false;
    // Re-render to get fresh data
    renderCarouselItems(wrap, false);
    attachCarouselEvents(wrap);
    // Update schedule
    renderSchedule();
  }, 360);
}

function updateRingItem(item, isCenter, dateStr){
  var sz = isCenter ? 88 : 60;
  var sw = isCenter ? 7 : 5;
  var pct = taskPct(dateStr);
  var tot = taskTotalCount(dateStr);
  var svgWrap = item.querySelector('.ring-svg-wrap');
  if(svgWrap){
    var d2 = dateFromStr(dateStr);
    svgWrap.innerHTML = ringsvg(pct, sz, sw, '#fff')
      +'<div class="ring-center-text">'
      +'<div class="ring-pct">'+(tot>0?pct+'%':'')+'</div>'
      +(tot>0?'<div class="ring-cnt">'+tot+'</div>':'')
      +'</div>';
  }
}

/* ═══════════════════════════════════════
   PLANNER RENDER
═══════════════════════════════════════ */
function rPlan(){
  var el = document.getElementById('p-plan');
  if(!el) return;

  planSel = planSel || today();

  el.innerHTML =
    '<div class="ring-carousel-wrap">'
    +'<div class="ring-carousel"></div>'
    +'</div>'
    +'<div class="plan-body" id="plan-body"></div>';

  buildCarousel();
  renderSchedule();
}

function renderSchedule(){
  var body = document.getElementById('plan-body');
  if(!body) return;
  var dateStr = idxToDate(planCenterIdx);
  planSel = dateStr;
  var tasks = tasksForDate(dateStr).slice().sort(function(a,b){
    var ta = a.timeStart||a.time||'';
    var tb = b.timeStart||b.time||'';
    return ta.localeCompare(tb);
  });

  var html = '<div class="sched-card">'
    +'<div class="sched-hdr">'
    +'<div class="sched-hdr-left">'
    +'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    +'<span class="sched-title">Расписание</span>'
    +'<span class="sched-date"> · '+fmtDate(dateStr)+'</span>'
    +'</div>'
    +'<button class="add-task-btn" data-action="open-task-modal">'
    +'<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +'</button>'
    +'</div>'
    +'<div class="timeline">';

  if(tasks.length === 0){
    html += '<div class="tl-empty">'
      +'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
      +'<p>Нет задач на этот день</p>'
      +'</div>';
  } else {
    tasks.forEach(function(t, i){
      var pri = t.priority||'md';
      var priClass = 'pri-'+pri;
      var ts = t.timeStart||t.time||'';
      var te = t.timeEnd||'';
      var timeDisplay = '';
      if(ts && te){
        // calculate minutes
        var mins = timeDiff(ts, te);
        if(mins !== null && mins > 0){
          timeDisplay = mins + ' мин';
        } else {
          timeDisplay = ts + ' — ' + te;
        }
      } else if(ts){
        timeDisplay = ts;
      }
      var timeLabel = ts;
      if(ts && te) timeLabel = ts+'–'+te.slice(0,5);

      var isLast = i === tasks.length-1;
      html += '<div class="tl-item">'
        +'<div class="tl-time">'+esc(timeLabel)+'</div>'
        +'<div class="tl-dot-col">'
        +'<div class="tl-dot '+priClass+'"></div>'
        +(!isLast ? '<div class="tl-line"></div>' : '')
        +'</div>'
        +'<div class="tl-card '+priClass+'">'
        +'<div class="tl-card-body">'
        +'<div class="tl-task-name'+(t.done?' done-text':'')+'">'+esc(t.text)+'</div>'
        +(timeDisplay ? '<div class="tl-task-time"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+esc(timeDisplay)+'</div>' : '')
        +'</div>'
        +'<div class="tl-check'+(t.done?' done':'')+'" data-action="tog" data-tid="'+t.id+'" data-date="'+dateStr+'">'
        +'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
        +'</div>'
        +'</div>'
        +'</div>';
    });
  }

  html += '</div></div>';
  body.innerHTML = html;
}

function timeDiff(start, end){
  try{
    var sp=start.split(':'), ep=end.split(':');
    var sm=parseInt(sp[0])*60+parseInt(sp[1]);
    var em=parseInt(ep[0])*60+parseInt(ep[1]);
    return em-sm;
  }catch(e){return null;}
}

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
function rDash(){
  var el=document.getElementById('p-dash');
  if(!el) return;
  var tod=today();
  var tasks=tasksForDate(tod);
  var done=tasks.filter(function(t){return t.done;}).length;
  var habs=S.habits.length;
  var habDone=S.habits.filter(function(h){return (h.doneDs||[]).indexOf(tod)>=0;}).length;

  el.innerHTML='<div class="dash-wrap">'
    +'<div class="dash-xp-card">'
    +'<div class="dash-xp-top">'
    +'<div class="dash-ava" id="dash-ava">'+(S.ava&&S.ava.startsWith('data:')?'<img src="'+S.ava+'">':('<span style="font-size:28px;">'+esc(S.ava||'🦊')+'</span>'))+'</div>'
    +'<div><div class="dash-name">'+esc(S.name||'Игрок')+'</div><div class="dash-lvl">Уровень '+lvl()+'</div></div>'
    +'</div>'
    +'<div class="dash-xp-bar"><div class="dash-xp-fill" style="width:'+xpPct()+'%"></div></div>'
    +'<div class="dash-xp-label">'+xpInLvl()+' / '+XP_PER_LVL+' XP</div>'
    +'</div>'
    +'<div class="stats-row">'
    +'<div class="stat-tile"><div class="stat-val">'+done+'</div><div class="stat-lbl">Задач сегодня</div></div>'
    +'<div class="stat-tile"><div class="stat-val">'+habDone+'</div><div class="stat-lbl">Привычек</div></div>'
    +'<div class="stat-tile"><div class="stat-val">'+lvl()+'</div><div class="stat-lbl">Уровень</div></div>'
    +'</div>'
    +'</div>';
}

/* ═══════════════════════════════════════
   HABITS
═══════════════════════════════════════ */
function rHab(){
  var el=document.getElementById('hab-list');
  if(!el) return;
  if(!S.habits.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><p>Нет привычек. Добавь первую!</p></div>';return;}
  var tod=today();
  el.innerHTML=S.habits.map(function(h){
    var done=(h.doneDs||[]).indexOf(tod)>=0;
    var streak=h.streak||0;
    var goal=h.goalDays||30;
    var pct=Math.min(100,Math.round(streak/goal*100));
    return '<div class="hab-card">'
      +'<div class="hab-card-top">'
      +'<div class="hab-icon">'+esc(h.icon||'⭐')+'</div>'
      +'<div class="hab-info"><div class="hab-name">'+esc(h.name)+'</div><div class="hab-streak">🔥 '+streak+' дней подряд</div></div>'
      +'<div class="hab-check'+(done?' done':'')+'" data-action="hab-tog" data-hid="'+h.id+'">'
      +'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
      +'</div>'
      +'</div>'
      +'<div class="hab-prog-bar"><div class="hab-prog-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="hab-prog-label">'+streak+' / '+goal+' дней</div>'
      +'</div>';
  }).join('');
}

/* ═══════════════════════════════════════
   GOALS
═══════════════════════════════════════ */
function rGoals(){
  var el=document.getElementById('goals-list');
  if(!el) return;
  if(!S.goals.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><p>Нет целей. Поставь первую!</p></div>';return;}
  el.innerHTML=S.goals.map(function(g){
    var pct=g.pct||0;
    return '<div class="goal-card">'
      +'<div class="goal-card-top">'
      +'<div class="goal-icon">'+esc(g.icon||'🎯')+'</div>'
      +'<div class="goal-info"><div class="goal-name">'+esc(g.name)+'</div>'+(g.deadline?'<div class="goal-deadline">до '+fmtDate(g.deadline)+'</div>':'')+'</div>'
      +'</div>'
      +'<div class="goal-prog-bar"><div class="goal-prog-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="goal-prog-label"><span>'+pct+'%</span><span>осталось '+(100-pct)+'%</span></div>'
      +'</div>';
  }).join('');
}

/* ═══════════════════════════════════════
   BOOKS
═══════════════════════════════════════ */
function rBooks(){
  var el=document.getElementById('books-list');
  if(!el) return;
  if(!S.books.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><p>Нет книг. Добавь первую!</p></div>';return;}
  el.innerHTML=S.books.map(function(b){
    var pct=b.total>0?Math.round((b.read||0)/b.total*100):0;
    return '<div class="book-card">'
      +'<div class="book-cover">'+(b.cover?'<img src="'+b.cover+'">':(b.emoji||'📖'))+'</div>'
      +'<div class="book-info">'
      +'<div class="book-title">'+esc(b.title)+'</div>'
      +'<div class="book-author">'+esc(b.author||'')+'</div>'
      +'<div class="book-prog-bar"><div class="book-prog-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="book-pages">'+(b.read||0)+' / '+b.total+' стр. ('+pct+'%)</div>'
      +'</div>'
      +'</div>';
  }).join('');
}

/* ═══════════════════════════════════════
   VITAMINS
═══════════════════════════════════════ */
function rVit(){
  var el=document.getElementById('vit-list');
  if(!el) return;
  if(!S.vitamins.length){el.innerHTML='<div class="empty-state"><p>Нет витаминов. Добавь первый!</p></div>';return;}
  var tod=today();
  el.innerHTML=S.vitamins.map(function(v){
    var done=(S.vitDone[tod]||[]).indexOf(v.id)>=0;
    return '<div class="vit-card">'
      +'<div class="vit-icon">'+esc(v.icon||'💊')+'</div>'
      +'<div class="vit-info"><div class="vit-name">'+esc(v.name)+'</div><div class="vit-dose">'+esc(v.dose||'')+'</div></div>'
      +'<div class="vit-check'+(done?' done':'')+'" data-action="vit-tog" data-vid="'+v.id+'">'
      +'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
      +'</div>'
      +'</div>';
  }).join('');
}

/* ═══════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════ */
function rAll(){
  updateHdr();
  rDash();
  if(curP==='plan') rPlan();
  rHab();
  rGoals();
  rBooks();
  rVit();
}

function updateHdr(){
  var nameEl=document.getElementById('hdr-name');
  var lvlEl=document.getElementById('hdr-lvl');
  var xpEl=document.getElementById('hdr-xp-fill');
  var avaEl=document.getElementById('hdr-ava-btn');
  if(nameEl) nameEl.textContent=S.name||'Игрок';
  if(lvlEl) lvlEl.textContent='Уровень '+lvl();
  if(xpEl) xpEl.style.width=xpPct()+'%';
  if(avaEl){
    if(S.ava&&S.ava.startsWith('data:')){
      avaEl.innerHTML='<img src="'+S.ava+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
    } else {
      avaEl.innerHTML='<span style="font-size:20px;">'+esc(S.ava||'🦊')+'</span>';
    }
  }
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function goPage(p){
  curP=p;
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('active');});
  var pg=document.getElementById('p-'+p);
  if(pg) pg.classList.add('active');
  var nb=document.querySelector('.nav-btn[data-page="'+p+'"]');
  if(nb) nb.classList.add('active');
  if(p==='plan') rPlan();
  if(p==='dash') rDash();
  if(p==='hab') rHab();
  if(p==='goals') rGoals();
  if(p==='books') rBooks();
  if(p==='vit') rVit();
}

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
function openModal(id){
  if(id==='m-task'){
    var tt=document.getElementById('t-text');
    var td=document.getElementById('t-date');
    var ts=document.getElementById('t-time-start');
    var te=document.getElementById('t-time-end');
    var tp=document.getElementById('t-pri');
    if(tt) tt.value='';
    if(td) td.value=idxToDate(planCenterIdx);
    if(ts) ts.value='';
    if(te) te.value='';
    if(tp) tp.value='md';
    fillGoalSel('t-goal');
    vld('m-task');
  }
  if(id==='m-hab'){
    var ht=document.getElementById('h-text');
    var hi=document.getElementById('h-icon');
    var hg=document.getElementById('h-goal');
    if(ht) ht.value='';
    if(hi) hi.value='';
    if(hg) hg.value='30';
  }
  if(id==='m-goal'){
    var gt=document.getElementById('g-text');
    var gi=document.getElementById('g-icon');
    var gd=document.getElementById('g-deadline');
    var gdesc=document.getElementById('g-desc');
    if(gt) gt.value='';
    if(gi) gi.value='';
    if(gd) gd.value='';
    if(gdesc) gdesc.value='';
  }
  if(id==='m-vit'){
    var vn=document.getElementById('v-name');
    var vd=document.getElementById('v-dose');
    var vi=document.getElementById('v-icon');
    if(vn) vn.value='';
    if(vd) vd.value='';
    if(vi) vi.value='';
  }
  if(id==='m-book'){
    var bt=document.getElementById('b-title');
    var ba=document.getElementById('b-author');
    var btot=document.getElementById('b-total');
    var br=document.getElementById('b-read');
    if(bt) bt.value='';
    if(ba) ba.value='';
    if(btot) btot.value='';
    if(br) br.value='0';
  }
  if(id==='m-ava'){
    document.querySelectorAll('.ava-opt').forEach(function(o){
      o.classList.toggle('sel', o.dataset.ava===S.ava);
    });
  }
  var mo=document.getElementById(id);
  if(mo) mo.classList.add('open');
}
function closeModal(id){
  var mo=document.getElementById(id);
  if(mo) mo.classList.remove('open');
}
function closeAllModals(){
  document.querySelectorAll('.mo.open').forEach(function(m){m.classList.remove('open');});
}

function vld(mid){
  if(mid==='m-task'){
    var ok=!!(document.getElementById('t-text').value.trim());
    document.getElementById('sb-task').disabled=!ok;
  }
}

function fillGoalSel(elId){
  var sel=document.getElementById(elId);
  if(!sel) return;
  sel.innerHTML='<option value="">— без цели —</option>';
  S.goals.forEach(function(g){
    sel.innerHTML+='<option value="'+g.id+'">'+esc(g.name)+'</option>';
  });
}

/* ═══════════════════════════════════════
   SAVE ACTIONS
═══════════════════════════════════════ */
function saveTask(){
  var txt=document.getElementById('t-text').value.trim();
  var date=document.getElementById('t-date').value||idxToDate(planCenterIdx);
  var ts=document.getElementById('t-time-start').value||'';
  var te=document.getElementById('t-time-end').value||'';
  var pri=document.getElementById('t-pri').value||'md';
  var gid=document.getElementById('t-goal').value||'';
  if(!txt) return;
  var wk=wkKey(date);
  ensW(wk);
  S.weeks[wk].tasks.push({id:uid(),text:txt,date:date,timeStart:ts,timeEnd:te,time:ts,priority:pri,done:false,goalId:gid});
  sv();
  closeModal('m-task');
  if(curP==='plan'){
    var wrap=document.querySelector('.ring-carousel');
    if(wrap) renderCarouselItems(wrap,false);
    renderSchedule();
  }
  if(curP==='dash') rDash();
}

function saveHabit(){
  var txt=document.getElementById('h-text').value.trim();
  if(!txt) return;
  var icon=document.getElementById('h-icon').value||'⭐';
  var goal=parseInt(document.getElementById('h-goal').value)||30;
  S.habits.push({id:uid(),name:txt,icon:icon,goalDays:goal,streak:0,doneDs:[]});
  sv();
  closeModal('m-hab');
  rHab();
}

function saveGoal(){
  var txt=document.getElementById('g-text').value.trim();
  if(!txt) return;
  var icon=document.getElementById('g-icon').value||'🎯';
  var deadline=document.getElementById('g-deadline').value||'';
  var desc=document.getElementById('g-desc').value||'';
  S.goals.push({id:uid(),name:txt,icon:icon,deadline:deadline,desc:desc,pct:0});
  sv();
  closeModal('m-goal');
  rGoals();
}

function saveBook(){
  var title=document.getElementById('b-title').value.trim();
  if(!title) return;
  var author=document.getElementById('b-author').value||'';
  var total=parseInt(document.getElementById('b-total').value)||100;
  var read=parseInt(document.getElementById('b-read').value)||0;
  S.books.push({id:uid(),title:title,author:author,total:total,read:read,emoji:'📖'});
  sv();
  closeModal('m-book');
  rBooks();
}

function saveVit(){
  var name=document.getElementById('v-name').value.trim();
  if(!name) return;
  var dose=document.getElementById('v-dose').value||'';
  var icon=document.getElementById('v-icon').value||'💊';
  S.vitamins.push({id:uid(),name:name,dose:dose,icon:icon});
  sv();
  closeModal('m-vit');
  rVit();
}

function saveAva(){
  var sel=document.querySelector('.ava-opt.sel');
  if(sel) S.ava=sel.dataset.ava;
  sv();
  closeModal('m-ava');
  updateHdr();
  rDash();
}

/* ═══════════════════════════════════════
   TOGGLE TASK
═══════════════════════════════════════ */
function toggleTask(tid, dateStr){
  var wk=wkKey(dateStr);
  if(!S.weeks[wk]) return;
  var tasks=S.weeks[wk].tasks;
  for(var i=0;i<tasks.length;i++){
    if(tasks[i].id===tid){
      tasks[i].done=!tasks[i].done;
      if(tasks[i].done) addXP(10);
      break;
    }
  }
  sv();
  // Update carousel ring for current day
  var wrap=document.querySelector('.ring-carousel');
  if(wrap) renderCarouselItems(wrap,false);
  renderSchedule();
  updateHdr();
  if(curP==='dash') rDash();
}

/* ═══════════════════════════════════════
   TOGGLE HABIT
═══════════════════════════════════════ */
function toggleHabit(hid){
  var tod=today();
  for(var i=0;i<S.habits.length;i++){
    var h=S.habits[i];
    if(h.id===hid){
      if(!h.doneDs) h.doneDs=[];
      var idx=h.doneDs.indexOf(tod);
      if(idx>=0){h.doneDs.splice(idx,1);h.streak=Math.max(0,(h.streak||1)-1);}
      else{h.doneDs.push(tod);h.streak=(h.streak||0)+1;addXP(15);}
      break;
    }
  }
  sv();
  rHab();
  rDash();
}

/* ═══════════════════════════════════════
   TOGGLE VITAMIN
═══════════════════════════════════════ */
function toggleVit(vid){
  var tod=today();
  if(!S.vitDone[tod]) S.vitDone[tod]=[];
  var idx=S.vitDone[tod].indexOf(vid);
  if(idx>=0) S.vitDone[tod].splice(idx,1);
  else{S.vitDone[tod].push(vid);addXP(5);}
  sv();
  rVit();
}

/* ═══════════════════════════════════════
   EVENT DELEGATION
═══════════════════════════════════════ */
document.addEventListener('click', function(e){
  // Nav
  var nb=e.target.closest('.nav-btn[data-page]');
  if(nb){goPage(nb.dataset.page);return;}

  // Open modal via data-action
  var om=e.target.closest('[data-action="open-modal"]');
  if(om){openModal(om.dataset.modal);return;}

  // Open task modal
  var otm=e.target.closest('[data-action="open-task-modal"]');
  if(otm){openModal('m-task');return;}

  // Close modal on backdrop
  if(e.target.classList.contains('mo')){closeAllModals();return;}

  // Avatar buttons
  var avaBtn=e.target.closest('#hdr-ava-btn');
  if(avaBtn){openModal('m-ava');return;}

  // Avatar option select
  var avaOpt=e.target.closest('.ava-opt');
  if(avaOpt){
    document.querySelectorAll('.ava-opt').forEach(function(o){o.classList.remove('sel');});
    avaOpt.classList.add('sel');
    return;
  }

  // Save buttons
  if(e.target.id==='sb-task'){saveTask();return;}
  if(e.target.id==='sb-hab'){saveHabit();return;}
  if(e.target.id==='sb-goal'){saveGoal();return;}
  if(e.target.id==='sb-book'){saveBook();return;}
  if(e.target.id==='sb-vit'){saveVit();return;}
  if(e.target.id==='sb-ava'){saveAva();return;}

  // Toggle task
  var tog=e.target.closest('[data-action="tog"]');
  if(tog){toggleTask(tog.dataset.tid, tog.dataset.date);return;}

  // Toggle habit
  var htog=e.target.closest('[data-action="hab-tog"]');
  if(htog){toggleHabit(htog.dataset.hid);return;}

  // Toggle vitamin
  var vtog=e.target.closest('[data-action="vit-tog"]');
  if(vtog){toggleVit(vtog.dataset.vid);return;}

  // Premium
  if(e.target.id==='hdr-premium-btn'){alert('Premium — скоро!');return;}
});

/* ═══════════════════════════════════════
   INPUT LISTENERS
═══════════════════════════════════════ */
document.addEventListener('input', function(e){
  if(e.target.id==='t-text') vld('m-task');
});

/* ═══════════════════════════════════════
   AVATAR FILE UPLOAD
═══════════════════════════════════════ */
var avaFile=document.getElementById('ava-file');
if(avaFile){
  avaFile.addEventListener('change',function(){
    var f=this.files[0];
    if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){
      S.ava=ev.target.result;
      document.querySelectorAll('.ava-opt').forEach(function(o){o.classList.remove('sel');});
    };
    r.readAsDataURL(f);
  });
}

/* ═══════════════════════════════════════
   LANDING
═══════════════════════════════════════ */
document.getElementById('ln-go').addEventListener('click', function(){
  var name=document.getElementById('ln-name').value.trim();
  if(!name) return;
  S.name=name;
  sv();
  startApp();
});
document.getElementById('ln-name').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('ln-go').click();
});

/* ═══════════════════════════════════════
   TELEGRAM BACK BUTTON
═══════════════════════════════════════ */
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){
  tg.ready();
  tg.expand();
  if(tg.BackButton){
    tg.BackButton.onClick(function(){
      if(document.querySelector('.mo.open')){closeAllModals();return;}
      if(curP!=='dash'){goPage('dash');}
      else{tg.close();}
    });
  }
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function startApp(){
  document.getElementById('landing').style.display='none';
  document.getElementById('shell').style.display='flex';
  planCenterIdx=0;
  planSel=today();
  goPage('plan');
  rAll();
}

function init(){
  S=loadS();
  if(S.name){
    startApp();
  } else {
    document.getElementById('landing').style.display='flex';
    document.getElementById('shell').style.display='none';
  }
}

init();

})();
</script>
