<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Club App</title>
    <!-- Подключение скрипта Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #3390ec;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f4f4f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .game-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-info {
            font-size: 0.9em;
            color: gray;
            margin-bottom: 10px;
        }

        .player-list {
            margin-top: 10px;
            font-size: 0.9em;
        }

        .player-item {
            display: inline-block;
            background: var(--tg-theme-bg-color);
            padding: 4px 10px;
            border-radius: 15px;
            margin: 2px;
            border: 1px solid #ddd;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-panel {
            display: none; /* Скрыто по умолчанию */
            border-top: 2px dashed #ccc;
            margin-top: 20px;
            padding-top: 20px;
        }

        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Mafia Club</h1>
    </div>

    <!-- Вкладка: Расписание и запись -->
    <div id="schedule-tab" class="tab-content active">
        <h2>Ближайшие игры</h2>
        <div id="games-container">
            <!-- Пример карточки игры -->
            <div class="card">
                <div class="game-title">Пятничная Мафия</div>
                <div class="game-info">Дата: 15 мая | 19:00 | Свободно мест: 4</div>
                
                <div class="player-list">
                    <strong>Участники:</strong>
                    <div id="players-1">
                        <span class="player-item">Mr. White</span>
                        <span class="player-item">Black Widow</span>
                    </div>
                </div>

                <input type="text" id="player-name-1" placeholder="Ваш ник в игре">
                <button onclick="registerPlayer(1)">Записаться на игру</button>
            </div>
        </div>
    </div>

    <!-- Вкладка: Панель администратора -->
    <div id="admin-tab" class="admin-panel">
        <h2>Панель администратора</h2>
        <div class="card">
            <input type="text" id="new-game-name" placeholder="Название игры (напр. Субботний вечер)">
            <input type="text" id="new-game-date" placeholder="Дата и время">
            <input type="number" id="new-game-slots" placeholder="Количество мест">
            <button onclick="addGame()">Добавить игру в расписание</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на все окно

        // Имитация проверки прав администратора
        // В реальном приложении нужно проверять tg.initDataUnsafe.user.id на бэкенде
        const isAdmin = true; // Для теста поставим true

        if (isAdmin) {
            document.getElementById('admin-tab').style.display = 'block';
        }

        function registerPlayer(gameId) {
            const nameInput = document.getElementById(`player-name-${gameId}`);
            const name = nameInput.value;

            if (name.trim() === "") {
                tg.showAlert("Пожалуйста, введите ник!");
                return;
            }

            // В реальном приложении здесь должен быть запрос к вашему API (fetch)
            const list = document.getElementById(`players-${gameId}`);
            const span = document.createElement('span');
            span.className = 'player-item';
            span.innerText = name;
            list.appendChild(span);

            nameInput.value = "";
            tg.showScanQrPopup({text: "Вы успешно записаны!"}); // Пример уведомления
            
            // Отправка данных боту (если нужно закрыть приложение)
            // tg.sendData(JSON.stringify({action: "register", gameId: gameId, name: name}));
        }

        function addGame() {
            const name = document.getElementById('new-game-name').value;
            const date = document.getElementById('new-game-date').value;
            
            if (name && date) {
                alert(`Игра "${name}" на ${date} добавлена! (Нужен бэкенд для сохранения)`);
            }
        }
    </script>
</body>
</html>
