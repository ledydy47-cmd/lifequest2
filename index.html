<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЛайфКвест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f2f6f3;--card:#fff;--text:#1a2e25;--sub:#7a9e8e;--border:#ddeee6;
  --nav-h:62px;--r:18px;--sh:0 2px 16px rgba(0,0,0,0.07);
  --c0:#5bbf95;--c1:#5b9bbf;--c2:#a07cc5;--c3:#e07a5f;--c4:#f2b705;--c5:#e05c8a;--c6:#3d8b6e;
  --gold:#f5a623;--gold2:#f7c948;--red:#e05c5c;--primary:#3d8b6e;--accent:#5bbf95;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h)+18px+env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;}

/* ── HEADER ── */
.hdr{background:var(--card);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 8px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.av-btn{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2.5px solid var(--accent);
  cursor:pointer;background:#e8f5ee;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.av-btn img,.av-btn span{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:22px;}
.hdr-name{font-size:.95rem;font-weight:700;color:var(--text);}
.hdr-lvl{font-size:.63rem;color:var(--sub);margin-top:1px;}
.hdr-xp-wrap{flex:1;max-width:120px;margin:0 10px;}
.hdr-xp-bar{height:5px;background:var(--border);border-radius:3px;margin-top:3px;}
.hdr-xp-fill{height:5px;background:var(--gold2);border-radius:3px;transition:width .4s;}
.btn-prem{font-size:.7rem;padding:5px 10px;border-radius:20px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#6b4500;
  border:none;font-weight:700;cursor:pointer;white-space:nowrap;}

/* ── BOTTOM NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--card);border-top:1px solid var(--border);
  display:flex;z-index:200;box-shadow:0 -3px 16px rgba(0,0,0,.06);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;color:var(--sub);
  font-size:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;
  padding:8px 2px;position:relative;transition:color .2s;}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.nb.active{color:var(--primary);}
.nb.active::after{content:'';position:absolute;bottom:6px;width:18px;height:3px;
  border-radius:2px;background:var(--primary);}

/* ── FAB ── */
.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);
  width:54px;height:54px;border-radius:50%;background:var(--primary);color:white;
  border:none;font-size:26px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(61,139,110,.45);z-index:150;cursor:pointer;}

/* ── PAGES ── */
.page{display:none;}.page.active{display:block;}
.sec{font-size:.7rem;font-weight:700;color:var(--sub);text-transform:uppercase;
  letter-spacing:.5px;margin:14px 16px 8px;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);
  margin:0 14px 12px;border:1px solid var(--border);overflow:hidden;}
.card-body{padding:12px 14px;}
.xp-card{margin:14px 14px 12px;border-radius:var(--r);padding:16px;
  background:linear-gradient(135deg,#2d6e57,#3d8b6e,#5bbf95);color:white;}
.xp-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.lv-ring{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lv-n{font-size:1.1rem;font-weight:900;color:var(--gold2);}
.xp-bar-bg{height:7px;background:rgba(0,0,0,.2);border-radius:4px;margin-top:6px;}
.xp-fill{height:7px;background:var(--gold2);border-radius:4px;transition:width .5s;}
.xp-flash{position:fixed;pointer-events:none;font-size:.85rem;font-weight:800;
  color:var(--gold);z-index:9999;animation:xpPop 1.1s ease forwards;}
@keyframes xpPop{0%{opacity:1;transform:translateY(0) scale(1)}
  60%{opacity:1;transform:translateY(-28px) scale(1.2)}
  100%{opacity:0;transform:translateY(-50px) scale(.9)}}

/* ── TODAY HABITS (dashboard) ── */
.h-today-row{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--border);}
.h-today-row:last-child{border-bottom:none;}
.h-ch{width:22px;height:22px;border-radius:6px;accent-color:var(--primary);cursor:pointer;}
.h-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.h-lbl{flex:1;font-size:.9rem;font-weight:600;}
.h-xp-tag{font-size:.62rem;background:#e8f5ee;color:var(--primary);
  padding:2px 7px;border-radius:20px;font-weight:700;}

/* ── HABITS PAGE ── */
.hab-card{border-bottom:1px solid var(--border);padding:12px 14px;}
.hab-card:last-child{border-bottom:none;}
.hab-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hab-name{font-size:.95rem;font-weight:700;}
.hab-days{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.hd-chip{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:.7rem;font-weight:700;cursor:pointer;
  transition:all .15s;border:1.5px solid var(--border);color:var(--sub);}
.hd-chip.done{color:white;border-color:transparent;}
.hab-prog-bg{height:5px;background:var(--border);border-radius:3px;}
.hab-prog-fill{height:5px;border-radius:3px;transition:width .4s;}
.del-btn{background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:4px;}

/* ── PLANNER ── */
#page-plan{display:none;flex-direction:column;height:calc(100dvh - var(--nav-h) - env(safe-area-inset-bottom) - 60px);}
#page-plan.active{display:flex;}
.wk-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.wk-nav button{background:none;border:1px solid var(--border);border-radius:10px;
  padding:6px 14px;color:var(--primary);font-weight:700;cursor:pointer;}
.wk-lbl{font-size:.85rem;font-weight:700;color:var(--text);}
.plan-slider-wrap{flex:1;overflow:hidden;position:relative;}
.plan-slider{display:flex;height:100%;transition:transform .32s cubic-bezier(.4,0,.2,1);}
.day-slide{flex-shrink:0;width:100vw;height:100%;overflow-y:auto;padding-bottom:20px;}
.ds-head{min-height:33vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;position:relative;}
.ds-day-name{font-size:1.25rem;font-weight:800;color:white;opacity:.95;}
.ds-date{font-size:.8rem;color:rgba(255,255,255,.75);margin-top:2px;}
.ds-today-tag{margin-top:6px;background:rgba(255,255,255,.25);color:white;
  font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;}
.ds-circ-wrap{display:flex;flex-direction:column;align-items:center;margin-top:14px;}
.ds-circ{width:min(36vw,150px);height:min(36vw,150px);position:relative;}
.ds-circ svg{transform:rotate(-90deg);width:100%;height:100%;}
.ds-cbg{fill:none;stroke:rgba(255,255,255,.2);stroke-width:8;}
.ds-cfill{fill:none;stroke:white;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s;}
.ds-cpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:900;color:white;}
.ds-cstat{font-size:.75rem;color:rgba(255,255,255,.8);margin-top:5px;}
.ds-body{padding:14px;}
.ds-body-title{font-size:.7rem;font-weight:700;color:var(--sub);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px;}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--border);}
.task-row:last-child{border-bottom:none;}
.t-ch{width:22px;height:22px;border-radius:6px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
.t-inp{flex:1;border:none;background:none;font-size:.9rem;color:var(--text);outline:none;}
.t-inp:disabled{color:var(--text);}
.t-done .t-inp{text-decoration:line-through;color:var(--sub);}
.plan-dots{display:flex;justify-content:center;gap:6px;padding:8px;
  background:var(--card);border-bottom:1px solid var(--border);}
.pdot{height:8px;border-radius:4px;border:none;cursor:pointer;transition:all .2s;width:8px;}
.pdot.active{width:22px;}
.btn-add-t{display:flex;align-items:center;gap:6px;margin-top:10px;padding:9px 14px;
  border-radius:12px;border:1.5px dashed;background:none;cursor:pointer;
  font-size:.85rem;font-weight:700;width:100%;}

/* ── GOALS ── */
.goal-card{border-bottom:1px solid var(--border);padding:12px 14px;}
.goal-card:last-child{border-bottom:none;}
.goal-top{display:flex;align-items:center;justify-content:space-between;}
.goal-name{font-size:.95rem;font-weight:700;}
.goal-dl{font-size:.72rem;color:var(--sub);margin-top:2px;}
.goal-prog-bg{height:5px;background:var(--border);border-radius:3px;margin:8px 0 4px;}
.goal-prog-fill{height:5px;border-radius:3px;background:var(--accent);transition:width .4s;}
.goal-pct{font-size:.72rem;color:var(--sub);}
.step-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.step-ch{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;}

/* ── BOOKS PAGE ── */
.book-list{display:flex;flex-direction:column;}
.book-card{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);
  position:relative;transition:background .2s;}
.book-card:last-child{border-bottom:none;}
.book-card:active{background:#f5faf7;}
.b-cover-wrap{flex-shrink:0;width:64px;height:92px;border-radius:8px;overflow:hidden;
  background:#e8f0ec;display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.12);position:relative;}
.b-cover-wrap img{width:100%;height:100%;object-fit:cover;}
.b-cover-placeholder{font-size:28px;}
.b-cover-edit{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.45);
  text-align:center;font-size:12px;color:white;padding:3px 0;}
.b-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.b-title{font-size:.95rem;font-weight:700;color:var(--text);cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-author{font-size:.75rem;color:var(--sub);}
.b-stars{display:flex;gap:2px;margin:2px 0;}
.b-star{font-size:18px;color:#ddd;cursor:pointer;transition:color .15s;}
.b-star.on{color:var(--gold);}
.b-status-badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;
  display:inline-block;width:fit-content;}
.b-status-reading{background:#e3f5ec;color:#2d6e57;}
.b-status-done{background:#eae3f5;color:#5a3d8b;}
.b-status-want{background:#fdf3e3;color:#7a5200;}
/* Progress bar книги */
.b-prog-wrap{margin-top:4px;}
.b-prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.b-prog-label span{font-size:.7rem;color:var(--sub);}
.b-prog-label strong{font-size:.72rem;color:var(--primary);}
.b-prog-bg{height:6px;background:var(--border);border-radius:3px;}
.b-prog-fill{height:6px;border-radius:3px;transition:width .5s;
  background:linear-gradient(90deg,var(--primary),var(--accent));}
.b-pages-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.b-page-inp{width:52px;border:1.5px solid var(--border);border-radius:8px;
  padding:4px 6px;text-align:center;font-size:.82rem;color:var(--text);
  background:var(--bg);outline:none;}
.b-page-inp:focus{border-color:var(--primary);}
.b-total-lbl{font-size:.8rem;color:var(--sub);}

/* Book detail/notes overlay */
.notes-over{position:fixed;inset:0;background:var(--bg);z-index:2000;
  display:none;flex-direction:column;transition:transform .3s;}
.notes-over.on{display:flex;}
.no-hdr{background:var(--card);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;}
.no-back{background:none;border:none;font-size:22px;color:var(--primary);cursor:pointer;
  padding:4px;display:flex;align-items:center;}
.no-title{flex:1;font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.no-del{background:none;border:none;color:var(--red);font-size:.8rem;font-weight:700;cursor:pointer;}
.no-body{flex:1;overflow-y:auto;padding:14px;}
.quote-item{background:var(--card);border-radius:12px;padding:12px 14px;
  margin-bottom:10px;border-left:4px solid var(--primary);font-size:.88rem;
  line-height:1.5;position:relative;box-shadow:var(--sh);}
.quote-del{position:absolute;top:8px;right:10px;background:none;border:none;
  color:#ccc;font-size:1rem;cursor:pointer;}
.no-inp-wrap{padding:10px 14px;background:var(--card);border-top:1px solid var(--border);
  display:flex;gap:8px;}
.no-inp{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:.88rem;outline:none;background:var(--bg);}
.no-inp:focus{border-color:var(--primary);}
.no-send{padding:0 16px;background:var(--primary);color:white;border:none;
  border-radius:12px;font-size:1.1rem;cursor:pointer;}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end;}
.overlay.on{display:flex;}
.modal{background:white;width:100%;padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  border-radius:20px 20px 0 0;max-height:85vh;overflow-y:auto;}
.m-title{font-size:1.05rem;font-weight:800;margin-bottom:14px;color:var(--text);}
.finp{width:100%;padding:12px 14px;margin:6px 0;border:1.5px solid var(--border);
  border-radius:12px;font-size:.9rem;color:var(--text);background:var(--bg);outline:none;}
.finp:focus{border-color:var(--primary);}
.btn-main{width:100%;padding:14px;margin-top:8px;border-radius:14px;border:none;
  background:var(--primary);color:white;font-size:1rem;font-weight:700;cursor:pointer;}
.btn-cancel{width:100%;padding:12px;margin-top:6px;border-radius:14px;border:1.5px solid var(--border);
  background:none;color:var(--sub);font-size:.9rem;cursor:pointer;}
.day-sel{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.day-chip{padding:7px 10px;border-radius:10px;border:1.5px solid var(--border);
  font-size:.75rem;font-weight:700;cursor:pointer;color:var(--sub);background:none;transition:all .15s;}
.day-chip.sel{color:white;border-color:transparent;}
label.file-lbl{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px;border:1.5px dashed var(--border);border-radius:12px;cursor:pointer;
  color:var(--sub);font-size:.85rem;margin:6px 0;}
label.file-lbl:hover{border-color:var(--primary);color:var(--primary);}

/* Status selector */
.status-sel{display:flex;gap:8px;margin:8px 0;}
.st-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);
  font-size:.72rem;font-weight:700;cursor:pointer;background:none;color:var(--sub);text-align:center;transition:all .15s;}
.st-btn.sel{color:white;border-color:transparent;}

/* Avatar modal */
.av-preview{width:90px;height:90px;border-radius:50%;object-fit:cover;
  display:block;margin:0 auto 14px;border:3px solid var(--accent);}
.av-placeholder{width:90px;height:90px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:40px;
  margin:0 auto 14px;}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;}
.ach-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:12px;border:1.5px solid var(--border);text-align:center;}
.ach-item.unlocked{background:#f0faf5;border-color:var(--accent);}
.ach-icon{font-size:1.5rem;}
.ach-name{font-size:.6rem;font-weight:700;color:var(--sub);}
.ach-item.unlocked .ach-name{color:var(--primary);}
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-l">
      <div class="av-btn" onclick="openAvatarModal()">
        <div id="hdrAv"><span>👤</span></div>
      </div>
      <div>
        <div class="hdr-name" id="hdrName">Герой</div>
        <div class="hdr-lvl" id="hdrLvl">Уровень 1 · Новичок</div>
      </div>
    </div>
    <div class="hdr-xp-wrap">
      <div style="font-size:.62rem;color:rgba(255,255,255,.0);text-align:right;" id="hdrXpN">0/100</div>
      <div class="hdr-xp-bar"><div class="hdr-xp-fill" id="hdrXpFill" style="width:0%"></div></div>
    </div>
    <button class="btn-prem" id="btnPrem" onclick="openSubModal()">⭐ Premium</button>
  </header>

  <!-- CONTENT -->
  <div id="content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dash">
      <div class="xp-card">
        <div class="xp-top">
          <div class="lv-ring"><div class="lv-n" id="lvN">1</div></div>
          <div style="flex:1">
            <div id="xpLvName" style="font-size:1rem;font-weight:800;">Новичок</div>
            <div id="xpNums" style="font-size:.75rem;opacity:.85;">0 / 100 XP</div>
            <div class="xp-bar-bg"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <div style="flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:8px 10px;text-align:center;">
            <div style="font-size:1.4rem;font-weight:900;" id="dashTaskPct">0%</div>
            <div style="font-size:.65rem;opacity:.8;">Задачи сегодня</div>
          </div>
          <div style="flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:8px 10px;text-align:center;">
            <div style="font-size:1.4rem;font-weight:900;" id="dashHabPct">0%</div>
            <div style="font-size:.65rem;opacity:.8;">Привычки недели</div>
          </div>
          <div style="flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:8px 10px;text-align:center;">
            <div style="font-size:1.4rem;font-weight:900;" id="dashBookPct">0%</div>
            <div style="font-size:.65rem;opacity:.8;">Книги читаю</div>
          </div>
        </div>
      </div>
      <div class="sec">Привычки на сегодня</div>
      <div class="card"><div class="card-body" id="todH"></div></div>
      <div class="sec">Достижения</div>
      <div class="card"><div class="ach-grid" id="achGrid"></div></div>
    </div>

    <!-- PLANNER -->
    <div class="page" id="page-plan">
      <div class="wk-nav">
        <button onclick="prevWeek()">‹</button>
        <span class="wk-lbl" id="wkL">Эта неделя</span>
        <button onclick="nextWeek()">›</button>
      </div>
      <div class="plan-dots" id="planDots"></div>
      <div class="plan-slider-wrap">
        <div class="plan-slider" id="planSlider"></div>
      </div>
    </div>

    <!-- HABITS -->
    <div class="page" id="page-habits">
      <div class="sec">Мои привычки</div>
      <div class="card" id="habList"></div>
    </div>

    <!-- GOALS -->
    <div class="page" id="page-goals">
      <div class="sec">Мои цели</div>
      <div class="card" id="goalsList"></div>
    </div>

    <!-- BOOKS -->
    <div class="page" id="page-books">
      <div class="sec">Моя библиотека</div>
      <div class="card" id="booksList">
        <div class="book-list" id="booksListInner"></div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- BOTTOM NAV -->
  <nav id="nav">
    <button class="nb active" onclick="go('dash',this)">

<input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
<input type="file" id="bookCoverFile" accept="image/*" style="display:none" onchange="handleBookCoverUpload(event)">

<script>
/* ═══════════════════════════════════════════
   TELEGRAM INIT
═══════════════════════════════════════════ */
const tg = window.Telegram?.WebApp || null;
const IS_TG = !!(tg?.initData?.length > 0);
if (tg) {
  tg.ready(); tg.expand();
  tg.setHeaderColor('#2d6e57');
  tg.setBackgroundColor('#f2f6f3');
}

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const COLORS = ['#5bbf95','#5b9bbf','#a07cc5','#e07a5f','#f2b705','#e05c8a','#3d8b6e'];
const DN = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const DN_FULL = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
const LEVELS = ['Новичок','Ученик','Искатель','Воин','Мастер','Герой','Легенда','Бог'];
const ACHS = [
  {id:'first_task', icon:'✅', name:'Первый шаг',   req: s => (s.xp||0) >= 10},
  {id:'habit_5',   icon:'🔥', name:'5 привычек',    req: s => (s.habits||[]).length >= 5},
  {id:'xp_100',    icon:'⚡', name:'100 XP',        req: s => (s.xp||0) >= 100},
  {id:'xp_500',    icon:'💎', name:'500 XP',        req: s => (s.xp||0) >= 500},
  {id:'book_1',    icon:'📖', name:'Первая книга',  req: s => (s.books||[]).length >= 1},
  {id:'book_done', icon:'🏆', name:'Книга прочтена',req: s => (s.books||[]).some(b=>b.current>=b.total&&b.total>0)},
  {id:'goal_1',    icon:'🎯', name:'Первая цель',   req: s => (s.goals||[]).length >= 1},
  {id:'xp_1000',   icon:'👑', name:'1000 XP',       req: s => (s.xp||0) >= 1000},
];
const STATUS_LABELS = {reading:'Читаю', done:'Прочитано', want:'Хочу прочитать'};
const STATUS_COLORS = {reading:'b-status-reading', done:'b-status-done', want:'b-status-want'};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
function defaultState() {
  return {
    name: IS_TG && tg.initDataUnsafe?.user?.first_name
          ? tg.initDataUnsafe.user.first_name : 'Искатель',
    isLoggedIn: IS_TG,
    isSubscribed: false,
    xp: 0,
    avatar: null,
    habits: [],
    weeks: {},
    goals: [],
    books: []
  };
}
let S = defaultState();
try { const d = localStorage.getItem('lq_v2'); if (d) S = {...defaultState(), ...JSON.parse(d)}; } catch(e) {}

function sv() { localStorage.setItem('lq_v2', JSON.stringify(S)); }

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function uid() { return Math.random().toString(36).slice(2,9); }

function lvData(xp) {
  let lv=1, used=0;
  while(true){ const need=lv*100; if(used+need>xp) break; used+=need; lv++; if(lv>99) break; }
  return {lv, into:xp-used, need:lv*100, pct:Math.round((xp-used)/(lv*100)*100), name:LEVELS[Math.min(lv-1,LEVELS.length-1)]};
}

function getMon(off=0) {
  const d = new Date(); d.setHours(0,0,0,0);
  const day = d.getDay(); const diff = (day===0?-6:1-day);
  d.setDate(d.getDate()+diff+off*7); return d;
}
function wKey(off=wOff) { const m=getMon(off); return `w_${m.getFullYear()}_${m.getMonth()}_${m.getDate()}`; }
function getWD(off=wOff) {
  const k=wKey(off);
  if(!S.weeks[k]) S.weeks[k]={tasks:[],habits:{}};
  if(!S.weeks[k].tasks) S.weeks[k].tasks=[];
  if(!S.weeks[k].habits) S.weeks[k].habits={};
  return S.weeks[k];
}
function todayIdx() { const d=new Date().getDay(); return d===0?6:d-1; }
function isCW() { return wOff===0; }

function addXp(n, el) {
  S.xp += n;
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  if(el){ const r=el.getBoundingClientRect(); const f=document.createElement('div'); f.className='xp-flash'; f.textContent=`+${n} XP`; f.style.cssText=`left:${r.left+r.width/2}px;top:${r.top+window.scrollY}px;`; document.body.appendChild(f); setTimeout(()=>f.remove(),1100); }
  checkAchs();
}
function subXp(n) { S.xp = Math.max(0, S.xp-n); }

function checkAchs() {
  const ua = S.unlockedAchs || [];
  let changed = false;
  ACHS.forEach(a => { if(!ua.includes(a.id) && a.req(S)){ ua.push(a.id); changed=true; } });
  if(changed){ S.unlockedAchs=ua; }
}

function checkPrem(feature) {
  if(S.isSubscribed) return true;
  const limits = {habits:3, goals:3, books:5, tasks_per_day:5};
  if(feature==='habits' && (S.habits||[]).length >= limits.habits){ openSubModal(); return false; }
  if(feature==='goals' && (S.goals||[]).length >= limits.goals){ openSubModal(); return false; }
  if(feature==='books' && (S.books||[]).length >= limits.books){ openSubModal(); return false; }
  return true;
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
let curPg = 'dash';
let wOff = 0;
let curDayIdx = todayIdx();
let curBookId = null;
let mCtx = null;
let pendingBookId = null; // для загрузки обложки

function go(id, btn) {
  curPg = id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const pg = document.getElementById('page-'+id);
  if(pg) pg.classList.add('active');
  if(btn) btn.classList.add('active');
  rAll();
}

/* ═══════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════ */
function rAll() {
  rHeader();
  if(curPg==='dash')    { rDash(); }
  if(curPg==='plan')    { rPlanner(); }
  if(curPg==='habits')  { rHabits(); }
  if(curPg==='goals')   { rGoals(); }
  if(curPg==='books')   { rBooks(); }
}

/* ── HEADER ── */
function rHeader() {
  const ld = lvData(S.xp||0);
  document.getElementById('hdrName').textContent = S.name||'Искатель';
  document.getElementById('hdrLvl').textContent = `Ур. ${ld.lv} · ${ld.name}`;
  document.getElementById('hdrXpFill').style.width = ld.pct+'%';
  const av = document.getElementById('hdrAv');
  if(S.avatar) av.innerHTML=`<img src="${S.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  else av.innerHTML='<span>👤</span>';
}

/* ── DASHBOARD ── */
function rDash() {
  const ld = lvData(S.xp||0);
  document.getElementById('lvN').textContent = ld.lv;
  document.getElementById('xpLvName').textContent = ld.name;
  document.getElementById('xpNums').textContent = `${ld.into} / ${ld.need} XP`;
  document.getElementById('xpFill').style.width = ld.pct+'%';

  // Task % today
  const wd = getWD(0); const ti = todayIdx();
  const todayTasks = (wd.tasks||[]).filter(t=>t.dayIdx===ti);
  const tDone = todayTasks.filter(t=>t.done).length;
  document.getElementById('dashTaskPct').textContent = todayTasks.length ? Math.round(tDone/todayTasks.length*100)+'%' : '—';

  // Habit % this week
  const allH = S.habits||[];
  let hTotal=0, hDone=0;
  allH.forEach(h=>{
    const days = h.days||[0,1,2,3,4,5,6];
    const wdh = (getWD(0).habits||{})[h.id]||{};
    days.forEach(d=>{ hTotal++; if(wdh[d]) hDone++; });
  });
  document.getElementById('dashHabPct').textContent = hTotal ? Math.round(hDone/hTotal*100)+'%' : '—';

  // Books reading %
  const readingBooks = (S.books||[]).filter(b=>b.status==='reading');
  document.getElementById('dashBookPct').textContent = readingBooks.length ? readingBooks.length+'шт' : '—';

  // Today habits
  const todHEl = document.getElementById('todH');
  const todHabs = allH.filter(h=>(h.days||[0,1,2,3,4,5,6]).includes(todayIdx()));
  if(!todHabs.length){ todHEl.innerHTML='<div style="color:var(--sub);font-size:.85rem;padding:8px 0;">Нет привычек на сегодня</div>'; }
  else {
    const wdh = (getWD(0).habits||{});
    todHEl.innerHTML = todHabs.map((h,i)=>{
      const done = !!(wdh[h.id]&&wdh[h.id][todayIdx()]);
      return `<div class="h-today-row">
        <input type="checkbox" class="h-ch" ${done?'checked':''} onchange="togHabToday('${h.id}',this)">
        <div class="h-dot" style="background:${COLORS[i%COLORS.length]}"></div>
        <span class="h-lbl">${h.name}</span>
        <span class="h-xp-tag">+15 XP</span>
      </div>`;
    }).join('');
  }

  // Achievements
  checkAchs();
  const ua = S.unlockedAchs||[];
  document.getElementById('achGrid').innerHTML = ACHS.map(a=>`
    <div class="ach-item ${ua.includes(a.id)?'unlocked':''}">
      <div class="ach-icon">${ua.includes(a.id)?a.icon:'🔒'}</div>
      <div class="ach-name">${a.name}</div>
    </div>`).join('');
}

/* ── PLANNER ── */
function rPlanner() {
  const wd = getWD(); const mon = getMon(wOff);
  const end = new Date(mon); end.setDate(end.getDate()+6);
  document.getElementById('wkL').textContent =
    `${mon.getDate()} ${mon.toLocaleString('ru',{month:'short'})} — ${end.getDate()} ${end.toLocaleString('ru',{month:'short'})}`;
  const slider = document.getElementById('planSlider'); slider.innerHTML='';
  for(let i=0;i<7;i++){
    const col=COLORS[i];
    const tasks=(wd.tasks||[]).filter(t=>t.dayIdx===i);
    const done=tasks.filter(t=>t.done).length; const total=tasks.length;
    const pct=total?Math.round(done/total*100):0;
    const d=new Date(mon); d.setDate(d.getDate()+i);
    const dateStr=`${d.getDate()} ${d.toLocaleString('ru',{month:'long'})}`;
    const CIRC=282.74; const offset=CIRC-(CIRC*pct/100);
    const slide=document.createElement('div'); slide.className='day-slide';
    const tasksHtml=tasks.length?tasks.map(t=>`
      <div class="task-row ${t.done?'t-done':''}">
        <input type="checkbox" class="t-ch" ${t.done?'checked':''} onchange="togTask('${t.id}',this.checked,this)">
        <input class="t-inp" value="${t.text||''}" ${t.done?'disabled':''} onblur="editTask('${t.id}',this.value)" placeholder="Задача">
        <button class="del-btn" onclick="delTask('${t.id}')">×</button>
      </div>`).join(''):`<div style="text-align:center;color:var(--sub);padding:16px;font-size:.85rem;">Нет задач на этот день</div>`;
    slide.innerHTML=`
      <div class="ds-head" style="background:${col};">
        <div class="ds-day-name">${DN_FULL[i]}</div>
        <div class="ds-date">${dateStr}</div>
        ${isCW()&&i===todayIdx()?'<div class="ds-today-tag">● Сегодня</div>':''}
        <div class="ds-circ-wrap">
          <div class="ds-circ">
            <svg viewBox="0 0 100 100"><circle class="ds-cbg" cx="50" cy="50" r="45"/>
            <circle class="ds-cfill" cx="50" cy="50" r="45" stroke-dasharray="${CIRC}" stroke-dashoffset="${offset}"/></svg>
            <div class="ds-cpct">${pct}%</div>
          </div>
          <div class="ds-cstat">${done} из ${total} задач</div>
        </div>
      </div>
      <div class="ds-body">
        <div class="ds-body-title">Задачи</div>
        ${tasksHtml}
        <button class="btn-add-t" onclick="openTaskM(${i})" style="color:${col};border-color:${col}88;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить задачу
        </button>
      </div>`;
    slider.appendChild(slide);
  }
  rPlanDots();
  goToDay(curDayIdx,false);
  initSliderTouch();
}

function rPlanDots() {
  const el=document.getElementById('planDots'); if(!el) return;
  el.innerHTML='';
  for(let i=0;i<7;i++){
    const btn=document.createElement('button'); btn.className='pdot'+(i===curDayIdx?' active':'');
    btn.style.background=i===curDayIdx?COLORS[curDayIdx]:'var(--border)';
    btn.onclick=()=>goToDay(i); el.appendChild(btn);
  }
}

function goToDay(idx,animate=true){
  curDayIdx=idx;
  const sl=document.getElementById('planSlider'); if(!sl) return;
  if(!animate) sl.style.transition='none'; else sl.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  sl.style.transform=`translateX(-${idx*100}vw)`;
  rPlanDots();
}

function initSliderTouch(){
  const wrap=document.querySelector('.plan-slider-wrap'); if(!wrap) return;
  wrap._ts=0; wrap._tx=0;
  wrap.ontouchstart=e=>{ wrap._ts=e.touches[0].clientX; wrap._tx=0; };
  wrap.ontouchmove=e=>{ wrap._tx=e.touches[0].clientX-wrap._ts; };
  wrap.ontouchend=()=>{ if(Math.abs(wrap._tx)>40){ if(wrap._tx<0&&curDayIdx<6) goToDay(curDayIdx+1); else if(wrap._tx>0&&curDayIdx>0) goToDay(curDayIdx-1); } };
}

function prevWeek(){ wOff--; rPlanner(); }
function nextWeek(){ wOff++; rPlanner(); }

/* ── HABITS ── */
function rHabits() {
  const el=document.getElementById('habList'); if(!el) return;
  const wd=getWD(0);
  if(!S.habits.length){ el.innerHTML='<div class="card-body" style="color:var(--sub);text-align:center;">Нет привычек. Нажми +</div>'; return; }
  el.innerHTML=S.habits.map((h,hi)=>{
    const days=h.days||[0,1,2,3,4,5,6];
    const wdh=(wd.habits||{})[h.id]||{};
    const doneCnt=days.filter(d=>!!wdh[d]).length;
    const pct=days.length?Math.round(doneCnt/days.length*100):0;
    const col=COLORS[hi%COLORS.length];
    const chipsHtml=DN.map((dn,di)=>{
      const active=days.includes(di);
      const done=!!(wdh[di]);
      let cls='hd-chip'; let sty=`border-color:${col}44;color:${col};`;
      if(!active){ cls+=' off'; sty='opacity:.3;cursor:default;'; }
      else if(done){ cls+=' done'; sty=`background:${col};`; }
      return `<div class="${cls}" style="${sty}" onclick="${active?`togHab('${h.id}',${di},${!done},this)`:''}">
        ${dn}${done&&active?'✓':''}
      </div>`;
    }).join('');
    return `<div class="hab-card">
      <div class="hab-top">
        <div>
          <div class="hab-name">${h.name}</div>
          <div style="font-size:.7rem;color:var(--sub);margin-top:2px;">${days.length} дней/нед · ${doneCnt}/${days.length} выполнено</div>
        </div>
        <button class="del-btn" onclick="delHab('${h.id}')">🗑</button>
      </div>
      <div class="hab-days">${chipsHtml}</div>
      <div class="hab-prog-bg"><div class="hab-prog-fill" style="width:${pct}%;background:${col};"></div></div>
      <div style="font-size:.68rem;color:var(--sub);margin-top:3px;">${pct}% этой недели</div>
    </div>`;
  }).join('');
}

/* ── GOALS ── */
function rGoals() {
  const el=document.getElementById('goalsList'); if(!el) return;
  if(!S.goals.length){ el.innerHTML='<div class="card-body" style="color:var(--sub);text-align:center;">Нет целей. Нажми +</div>'; return; }
  el.innerHTML=S.goals.map((g,gi)=>{
    const steps=g.steps||[];
    const total=steps.length; const done=steps.filter(s=>s.done).length;
    const pct=total?Math.round(done/total*100):0;
    const col=COLORS[gi%COLORS.length];
    const stepsHtml=steps.map((st,si)=>`
      <div class="step-row">
        <input type="checkbox" class="step-ch" ${st.done?'checked':''} onchange="togStep('${g.id}',${si},this.checked,this)">
        <span style="font-size:.85rem;${st.done?'text-decoration:line-through;color:var(--sub);':''}">${st.text}</span>
      </div>`).join('');
    return `<div class="goal-card">
      <div class="goal-top">
        <div>
          <div class="goal-name">${g.name}</div>
          ${g.deadline?`<div class="goal-dl">📅 ${g.deadline}</div>`:''}
        </div>
        <button class="del-btn" onclick="delGoal('${g.id}')">🗑</button>
      </div>
      <div class="goal-prog-bg"><div class="goal-prog-fill" style="width:${pct}%;background:${col};"></div></div>
      <div class="goal-pct">${done} из ${total} шагов · ${pct}%</div>
      <div style="margin-top:8px;">${stepsHtml}</div>
      <button onclick="addStepInline('${g.id}')" style="display:flex;align-items:center;gap:5px;margin-top:8px;padding:6px 10px;border-radius:10px;border:1.5px dashed ${col}44;background:none;color:${col};font-size:.8rem;cursor:pointer;font-weight:700;">
        + Добавить шаг
      </button>
    </div>`;
  }).join('');
}

/* ── BOOKS ── */
function rBooks() {
  const el=document.getElementById('booksListInner'); if(!el) return;
  if(!S.books.length){
    el.innerHTML='<div style="padding:28px;text-align:center;color:var(--sub);">📚 Нет книг. Нажми + чтобы добавить</div>';
    return;
  }
  el.innerHTML=S.books.map(b=>{
    const pct=b.total>0?Math.min(100,Math.round((b.current/b.total)*100)):0;
    const stCls=STATUS_COLORS[b.status||'want']||'b-status-want';
    const stLbl=STATUS_LABELS[b.status||'want']||'Хочу прочитать';
    let starsHtml='';
    for(let i=1;i<=5;i++) starsHtml+=`<span class="b-star ${i<=(b.rating||0)?'on':''}" onclick="setRating('${b.id}',${i})">★</span>`;
    const coverHtml=b.cover
      ?`<img src="${b.cover}" style="width:100%;height:100%;object-fit:cover;">`
      :`<span class="b-cover-placeholder">📖</span>`;
    return `<div class="book-card">
      <div class="b-cover-wrap" onclick="openBookCoverUpload('${b.id}')">
        ${coverHtml}
        <div class="b-cover-edit">Фото</div>
      </div>
      <div class="b-info">
        <div class="b-title" onclick="openNotes('${b.id}')">${b.title}</div>
        ${b.author?`<div class="b-author">${b.author}</div>`:''}
        <div class="b-stars">${starsHtml}</div>
        <span class="b-status-badge ${stCls}">${stLbl}</span>
        <div class="b-prog-wrap">
          <div class="b-prog-label">
            <span>Прогресс</span>
            <strong>${pct}%</strong>
          </div>
          <div class="b-prog-bg"><div class="b-prog-fill" style="width:${pct}%;"></div></div>
        </div>
        <div class="b-pages-row">
          <input type="number" class="b-page-inp" value="${b.current||0}"
            min="0" max="${b.total||9999}"
            onchange="setPage('${b.id}',this.value,this)"
            placeholder="0">
          <span class="b-total-lbl">/ ${b.total||'?'} стр.</span>
          ${pct>=100?'<span style="color:var(--accent);font-weight:700;font-size:.8rem;">✓ Прочитано!</span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   TASK ACTIONS
═══════════════════════════════════════════ */
function togTask(tid,val,el){
  const wd=getWD(); const t=wd.tasks.find(x=>x.id===tid); if(!t) return;
  t.done=val;
  if(val) addXp(10,el); else subXp(10);
  sv(); rPlanner(); rDash();
}
function editTask(tid,val){
  const wd=getWD(); const t=wd.tasks.find(x=>x.id===tid); if(!t) return;
  t.text=val; sv();
}
function delTask(tid){
  const wd=getWD(); const t=wd.tasks.find(x=>x.id===tid);
  if(t&&t.done) subXp(10);
  wd.tasks=wd.tasks.filter(x=>x.id!==tid); sv(); rPlanner();
}

/* ═══════════════════════════════════════════
   HABIT ACTIONS
═══════════════════════════════════════════ */
function togHab(hid,di,val,el){
  if(!getWD(0).habits) getWD(0).habits={};
  if(!getWD(0).habits[hid]) getWD(0).habits[hid]={};
  getWD(0).habits[hid][di]=val;
  if(val) addXp(15,el); else subXp(15);
  sv(); rHabits(); rDash();
}
function togHabToday(hid,el){
  const di=todayIdx(); const val=el.checked;
  togHab(hid,di,val,el);
}
function delHab(hid){
  S.habits=S.habits.filter(h=>h.id!==hid); sv(); rHabits(); rDash();
}

/* ═══════════════════════════════════════════
   GOAL ACTIONS
═══════════════════════════════════════════ */
function togStep(gid,si,val,el){
  const g=S.goals.find(x=>x.id===gid); if(!g) return;
  g.steps[si].done=val;
  if(val) addXp(20,el); else subXp(20);
  sv(); rGoals();
}
function delGoal(gid){
  S.goals=S.goals.filter(g=>g.id!==gid); sv(); rGoals();
}
function addStepInline(gid){
  mCtx={type:'addstep', gid};
  showModal('Добавить шаг к цели',`<input class="finp" id="mIn" placeholder="Название шага">`);
}

/* ═══════════════════════════════════════════
   BOOK ACTIONS
═══════════════════════════════════════════ */
function setRating(id,r){
  const b=S.books.find(x=>x.id===id); if(!b) return;
  b.rating=r; sv(); rBooks();
}

function setPage(id,v,el){
  const b=S.books.find(x=>x.id===id); if(!b) return;
  const newVal=Math.max(0,Math.min(parseInt(v)||0, b.total||99999));
  const diff=newVal-b.current;
  if(diff>0) addXp(Math.floor(diff/10)||1, el);
  else if(diff<0) subXp(Math.floor(Math.abs(diff)/10)||0);
  b.current=newVal;
  if(newVal>=b.total&&b.total>0) b.status='done';
  else if(newVal>0) b.status='reading';
  sv(); rBooks(); checkAchs();
}

function openBookCoverUpload(bid){
  pendingBookId=bid;
  document.getElementById('bookCoverFile').click();
}

function handleBookCoverUpload(e){
  const file=e.target.files[0]; if(!file||!pendingBookId) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const b=S.books.find(x=>x.id===pendingBookId);
    if(b){ b.cover=ev.target.result; sv(); rBooks(); }
    pendingBookId=null;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function openNotes(id){
  curBookId=id;
  const b=S.books.find(x=>x.id===id); if(!b) return;
  document.getElementById('noTitle').textContent=b.title;
  // Book info block
  const pct=b.total>0?Math.min(100,Math.round(b.current/b.total*100)):0;
  const stLbl=STATUS_LABELS[b.status||'want'];
  document.getElementById('noBkInfo').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;">
      ${b.cover?`<img src="${b.cover}" style="width:40px;height:56px;object-fit:cover;border-radius:6px;">`:
        '<div style="width:40px;height:56px;background:var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;">📖</div>'}
      <div style="flex:1;">
        <div style="font-weight:700;font-size:.9rem;">${b.title}</div>
        ${b.author?`<div style="font-size:.75rem;color:var(--sub);">${b.author}</div>`:''}
        <div style="margin-top:4px;">
          <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--sub);margin-bottom:2px;">
            <span>${stLbl}</span><strong style="color:var(--primary);">${pct}%</strong>
          </div>
          <div style="height:5px;background:var(--border);border-radius:3px;">
            <div style="height:5px;width:${pct}%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;"></div>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('notesOver').classList.add('on');
  rNotes();
  if(tg) tg.BackButton.show();
}

function rNotes(){
  const b=S.books.find(x=>x.id===curBookId); if(!b) return;
  const el=document.getElementById('nList');
  if(!(b.notes||[]).length){
    el.innerHTML='<div style="text-align:center;color:var(--sub);padding:24px;font-size:.85rem;">Нет цитат. Добавь первую!</div>';
    return;
  }
  el.innerHTML=b.notes.map((n,i)=>`
    <div class="quote-item">
      <button class="quote-del" onclick="delQuote(${i})">×</button>
      ${n}
    </div>`).join('');
}

function addQuote(){
  const inp=document.getElementById('nInp'); if(!inp.value.trim()) return;
  const b=S.books.find(x=>x.id===curBookId); if(!b) return;
  if(!b.notes) b.notes=[];
  b.notes.push(inp.value.trim()); inp.value='';
  addXp(5, inp);
  sv(); rNotes();
}

function delQuote(i){
  const b=S.books.find(x=>x.id===curBookId); if(!b) return;
  b.notes.splice(i,1); sv(); rNotes();
}

function closeNotes(){
  document.getElementById('notesOver').classList.remove('on');
  curBookId=null;
  if(tg) tg.BackButton.hide();
}

function delCurBook(){
  if(!curBookId) return;
  if(tg){ tg.showConfirm('Удалить эту книгу?', ok=>{ if(ok){ S.books=S.books.filter(x=>x.id!==curBookId); sv(); closeNotes(); rBooks(); } }); }
  else if(confirm('Удалить книгу?')){ S.books=S.books.filter(x=>x.id!==curBookId); sv(); closeNotes(); rBooks(); }
}

/* ═══════════════════════════════════════════
   FAB
═══════════════════════════════════════════ */
function fabAct(){
  if(curPg==='plan')   return openTaskM(curDayIdx);
  if(curPg==='habits') return openHabM();
  if(curPg==='goals')  return openGoalM();
  if(curPg==='books')  return openBookM();
  // dashboard — show menu
  showModal('Добавить', `
    <button class="btn-main" style="margin-bottom:6px;" onclick="closeOv();go('habits',document.querySelectorAll('.nb')[2]);openHabM()">+ Привычка</button>
    <button class="btn-main" style="margin-bottom:6px;background:var(--c1);" onclick="closeOv();go('goals',document.querySelectorAll('.nb')[3]);openGoalM()">+ Цель</button>
    <button class="btn-main" style="background:var(--c2);" onclick="closeOv();go('books',document.querySelectorAll('.nb')[4]);openBookM()">+ Книга</button>
  `);
}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
function showModal(title, bodyHtml){
  document.getElementById('mTtl').textContent=title;
  document.getElementById('mBod').innerHTML=bodyHtml;
  document.getElementById('ov').classList.add('on');
  if(tg) tg.BackButton.show();
}
function closeOv(){
  document.getElementById('ov').classList.remove('on');
  mCtx=null;
  if(tg) tg.BackButton.hide();
}

/* Task modal */
function openTaskM(di){
  mCtx={type:'task', di};
  const col=COLORS[di];
  const goalOpts=(S.goals||[]).map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
  showModal(`Задача · ${DN_FULL[di]}`,`
    <input class="finp" id="mIn" placeholder="Название задачи">
    ${goalOpts?`<select class="finp" id="mGoal"><option value="">Без цели</option>${goalOpts}</select>`:''}
  `);
  setTimeout(()=>document.getElementById('mIn')?.focus(),200);
}

/* Habit modal */
function openHabM(){
  if(!checkPrem('habits')) return;
  mCtx={type:'habit'};
  showModal('Новая привычка',`
    <input class="finp" id="mIn" placeholder="Название привычки">
    <div style="font-size:.8rem;color:var(--sub);margin:8px 0 4px;">Дни выполнения:</div>
    <div class="day-sel" id="daySelWrap">
      ${DN.map((d,i)=>`<button class="day-chip sel" style="background:${COLORS[i]};border-color:${COLORS[i]};" data-di="${i}" onclick="togDayChip(this,${i})">${d}</button>`).join('')}
    </div>
  `);
}

function togDayChip(btn,i){
  btn.classList.toggle('sel');
  if(btn.classList.contains('sel')){ btn.style.background=COLORS[i]; btn.style.color='white'; btn.style.borderColor=COLORS[i]; }
  else { btn.style.background=''; btn.style.color=''; btn.style.borderColor=''; }
}

/* Goal modal */
function openGoalM(){
  if(!checkPrem('goals')) return;
  mCtx={type:'goal'};
  showModal('Новая цель',`
    <input class="finp" id="mIn" placeholder="Название цели">
    <input class="finp" type="date" id="mDl" placeholder="Дедлайн (необязательно)">
    <div style="font-size:.8rem;color:var(--sub);margin:8px 0 4px;">Шаги (по одному, нажимай +):</div>
    <div id="stepsList" style="margin-bottom:6px;"></div>
    <div style="display:flex;gap:6px;">
      <input class="finp" id="mStepIn" placeholder="Добавить шаг" style="margin:0;flex:1;">
      <button onclick="addStepToList()" style="padding:10px 14px;background:var(--primary);color:white;border:none;border-radius:12px;cursor:pointer;font-size:1rem;">+</button>
    </div>
  `);
}

let _tmpSteps=[];
function addStepToList(){
  const inp=document.getElementById('mStepIn'); if(!inp||!inp.value.trim()) return;
  _tmpSteps.push(inp.value.trim()); inp.value='';
  document.getElementById('stepsList').innerHTML=_tmpSteps.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:.85rem;flex:1;">${s}</span>
      <button onclick="_tmpSteps.splice(${i},1);addStepToList.call()" style="color:var(--red);background:none;border:none;cursor:pointer;">×</button>
    </div>`).join('');
  inp.focus();
}

/* Book modal */
function openBookM(){
  if(!checkPrem('books')) return;
  mCtx={type:'book'};
  _tmpBookCover=null;
  showModal('Новая книга',`
    <input class="finp" id="mIn" placeholder="Название книги *">
    <input class="finp" id="mAuthor" placeholder="Автор (необязательно)">
    <input class="finp" type="number" id="mTot" placeholder="Кол-во страниц *" min="1">
    <div style="font-size:.8rem;color:var(--sub);margin:8px 0 4px;">Статус:</div>
    <div class="status-sel">
      <button class="st-btn sel" data-st="want" style="background:var(--c4);color:#333;" onclick="selStatus(this,'want')">Хочу</button>
      <button class="st-btn" data-st="reading" onclick="selStatus(this,'reading')">Читаю</button>
      <button class="st-btn" data-st="done" onclick="selStatus(this,'done')">Прочитал</button>
    </div>
    <label class="file-lbl" for="bookCoverModalFile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span id="coverLbl">Загрузить обложку</span>
    </label>
    <input type="file" id="bookCoverModalFile" accept="image/*" style="display:none" onchange="previewBookCover(event)">
    <div id="coverPreview"></div>
  `);
}

let _tmpBookCover=null;
function selStatus(btn,st){
  document.querySelectorAll('.st-btn').forEach(b=>{ b.classList.remove('sel'); b.style.background=''; b.style.color=''; });
  btn.classList.add('sel');
  const map={want:'var(--c4)',reading:'var(--primary)',done:'var(--c2)'};
  btn.style.background=map[st]||'var(--primary)'; btn.style.color='white';
}
function previewBookCover(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    _tmpBookCover=ev.target.result;
    document.getElementById('coverLbl').textContent='Обложка выбрана ✓';
    document.getElementById('coverPreview').innerHTML=`<img src="${_tmpBookCover}" style="width:60px;height:85px;object-fit:cover;border-radius:8px;margin-top:6px;">`;
  };
  reader.readAsDataURL(file);
}

/* Confirm modal */
function confirmM(){
  const title=document.getElementById('mIn')?.value?.trim();
  if(mCtx?.type==='task'){
    if(!title) return;
    const wd=getWD(); if(!wd.tasks) wd.tasks=[];
    const gid=document.getElementById('mGoal')?.value||null;
    wd.tasks.push({id:uid(),dayIdx:mCtx.di,text:title,done:false,goalId:gid||null});
    sv(); closeOv(); rPlanner();
  }
  else if(mCtx?.type==='habit'){
    if(!title) return;
    const chips=[...document.querySelectorAll('.day-chip.sel')];
    const days=chips.map(c=>parseInt(c.dataset.di));
    S.habits.push({id:uid(),name:title,days:days.length?days:[0,1,2,3,4,5,6]});
    sv(); closeOv(); rHabits(); rDash();
  }
  else if(mCtx?.type==='goal'){
    if(!title) return;
    const dl=document.getElementById('mDl')?.value||null;
    S.goals.push({id:uid(),name:title,deadline:dl,steps:(_tmpSteps||[]).map(t=>({text:t,done:false}))});
    _tmpSteps=[];
    sv(); closeOv(); rGoals();
  }
  else if(mCtx?.type==='book'){
    const tot=parseInt(document.getElementById('mTot')?.value)||0;
    if(!title||!tot) return;
    const author=document.getElementById('mAuthor')?.value?.trim()||'';
    const stBtn=document.querySelector('.st-btn.sel');
    const status=stBtn?.dataset?.st||'want';
    S.books.push({id:uid(),title,author,total:tot,current:0,rating:0,status,cover:_tmpBookCover||null,notes:[]});
    _tmpBookCover=null;
    sv(); closeOv(); rBooks();
  }
  else if(mCtx?.type==='addstep'){
    if(!title) return;
    const g=S.goals.find(x=>x.id===mCtx.gid); if(!g) return;
    if(!g.steps) g.steps=[];
    g.steps.push({text:title,done:false});
    sv(); closeOv(); rGoals();
  }
}

/* Sub modal */
function openSubModal(){ document.getElementById('subOv').classList.add('on'); }
function buySub(){
  S.isSubscribed=true; sv();
  document.getElementById('subOv').classList.remove('on');
  document.getElementById('btnPrem').style.display='none';
  if(tg) tg.showAlert('🎉 Premium активирован!'); else alert('🎉 Premium активирован!');
}

/* Avatar modal */
function openAvatarModal(){
  const prevHtml=S.avatar
    ?`<img src="${S.avatar}" class="av-preview">`
    :`<div class="av-placeholder">👤</div>`;
  showModal('Аватар',`
    ${prevHtml}
    <input class="finp" id="mIn" placeholder="Ваше имя" value="${S.name||''}">
    <label class="file-lbl" for="avatarFile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Загрузить фото
    </label>
  `);
  mCtx={type:'avatar'};
}
function handleAvatarUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{ S.avatar=ev.target.result; sv(); rHeader(); const av=document.getElementById('hdrAv'); av.innerHTML=`<img src="${S.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`; };
  reader.readAsDataURL(file);
  e.target.value='';
}

/* Override confirmM for avatar */
const _origConfirm=confirmM;
window.confirmM=function(){
  if(mCtx?.type==='avatar'){
    const nm=document.getElementById('mIn')?.value?.trim();
    if(nm) S.name=nm;
    sv(); closeOv(); rHeader(); rDash(); return;
  }
  _origConfirm();
};

/* ═══════════════════════════════════════════
   TELEGRAM BACK BUTTON
═══════════════════════════════════════════ */
if(tg){
  tg.BackButton.onClick(()=>{
    if(document.getElementById('notesOver').classList.contains('on')){ closeNotes(); return; }
    if(document.getElementById('ov').classList.contains('on')){ closeOv(); return; }
    if(document.getElementById('subOv').classList.contains('on')){ document.getElementById('subOv').classList.remove('on'); return; }
    tg.BackButton.hide();
  });
}

/* ═══════════════════════════════════════════
   KEYBOARD (Enter / Escape)
═══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.getElementById('ov').classList.contains('on')) confirmM();
  if(e.key==='Escape') closeOv();
  if(e.key==='Enter' && document.getElementById('notesOver').classList.contains('on')) addQuote();
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function init(){
  checkAchs();
  if(tg&&IS_TG&&!S.name){ S.name=tg.initDataUnsafe?.user?.first_name||'Искатель'; sv(); }
  rAll();
  // auto-scroll planner to today
  if(curPg==='plan') setTimeout(()=>goToDay(todayIdx(),false),100);
}

init();
</script>
