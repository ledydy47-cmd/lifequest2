<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЛайфКвест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: #2e2e42;
  --text: #f0f0f8;
  --text2: #8888aa;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --blue: #60a5fa;
  --pink: #f472b6;
  --violet: #c084fc;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 64px;
  --header-h: 120px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

#shell { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

/* HEADER */
#hdr {
  flex-shrink: 0;
  padding: 12px 16px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.hdr-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.hdr-ava {
  width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid var(--accent); overflow: hidden;
  flex-shrink: 0; cursor: pointer; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.hdr-ava img { width: 100%; height: 100%; object-fit: cover; }
.hdr-info { flex: 1; min-width: 0; }
.hdr-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr-lvl { font-size: 12px; color: var(--accent2); }
.hdr-btns { display: flex; gap: 6px; flex-shrink: 0; }
.hdr-btn {
  padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 600;
}
.btn-prem { background: linear-gradient(135deg, var(--yellow), var(--orange)); color: #1a1a1a; }
.btn-out { background: var(--surface2); color: var(--text2); }
.xp-bar-wrap { position: relative; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .4s; }
.xp-label { font-size: 11px; color: var(--text2); margin-top: 4px; text-align: right; }

/* CONTENT */
#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
}

/* PAGES */
.page { display: none; min-height: 100%; padding: 16px 16px calc(var(--nav-h) + 24px); }
.page.active { display: block; }

/* NAV */
#nav {
  flex-shrink: 0;
  display: flex;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 10;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; color: var(--text2); cursor: pointer;
  font-size: 10px; transition: color .2s; padding: 6px 2px;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* CARDS */
.card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px; border: 1px solid var(--border);
}
.card-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

/* DASH */
.dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-tile {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; text-align: center;
}
.stat-tile .val { font-size: 26px; font-weight: 800; }
.stat-tile .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
.streak-row { display: flex; gap: 6px; margin-top: 8px; justify-content: center; }
.streak-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text2);
}
.streak-dot.done { background: var(--accent); border-color: var(--accent); color: #fff; }

/* TASKS */
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  position: relative;
}
.task-row:last-child { border-bottom: none; }
.task-cb {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all .2s;
}
.task-cb.done { background: var(--accent); border-color: var(--accent); }
.task-text { flex: 1; font-size: 14px; min-width: 0; }
.task-text.done { text-decoration: line-through; color: var(--text2); }
.task-goal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.task-del { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; flex-shrink: 0; }

/* HABITS */
.hab-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.hab-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.hab-icon { font-size: 24px; flex-shrink: 0; }
.hab-info { flex: 1; min-width: 0; }
.hab-name { font-weight: 600; font-size: 15px; }
.hab-goal-link { font-size: 11px; color: var(--accent2); margin-top: 2px; }
.hab-del { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; }
.hab-week { display: flex; gap: 5px; }
.hab-day {
  flex: 1; aspect-ratio: 1; border-radius: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; font-size: 9px; color: var(--text2); gap: 2px;
  transition: all .2s;
}
.hab-day.done { background: var(--accent); border-color: var(--accent); color: #fff; }
.hab-day.today { border-color: var(--accent2); }
.hab-day span { font-size: 11px; font-weight: 700; }

/* GOALS */
.goal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.goal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.goal-title { font-weight: 700; font-size: 15px; flex: 1; }
.goal-badge {
  font-size: 10px; padding: 3px 8px; border-radius: 10px; flex-shrink: 0; margin-left: 8px;
}
.badge-ok { background: rgba(74,222,128,.15); color: var(--green); }
.badge-over { background: rgba(248,113,113,.15); color: var(--red); }
.badge-soon { background: rgba(251,191,36,.15); color: var(--yellow); }
.badge-active { background: rgba(124,106,247,.15); color: var(--accent); }
.goal-meta { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.prog-wrap { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 6px; position: relative; }
.prog-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.prog-expected { position: absolute; top: 0; height: 100%; width: 2px; background: rgba(255,255,255,.4); }
.prog-label { font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; }
.goal-hab-grid { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.goal-hab-dot {
  width: 22px; height: 22px; border-radius: 6px; font-size: 9px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
}
.goal-hab-dot.done { background: var(--accent); border-color: var(--accent); color: #fff; }
.goal-del { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; }

/* BOOKS */
.books-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.books-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
.books-tab {
  padding: 7px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600;
  background: var(--surface2); color: var(--text2); cursor: pointer; white-space: nowrap;
}
.books-tab.active { background: var(--accent); color: #fff; }
.books-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.book-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer; position: relative;
  transition: transform .15s;
}
.book-card:active { transform: scale(.97); }
.book-cover {
  width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 40px;
  position: relative;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; }
.book-cover-placeholder { width: 100%; aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 40px; }
.book-circ {
  position: absolute; bottom: 6px; right: 6px;
  width: 42px; height: 42px;
}
.book-circ svg { width: 42px; height: 42px; transform: rotate(-90deg); }
.book-circ-text {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #fff;
}
.book-info { padding: 8px 10px 10px; }
.book-info-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-info-author { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-status-dot {
  position: absolute; top: 8px; left: 8px;
  width: 10px; height: 10px; border-radius: 50%;
}
.book-stars { display: flex; gap: 2px; margin-top: 4px; }
.book-star { font-size: 12px; }

/* VITAMINS */
.vit-hero {
  background: linear-gradient(135deg, #5b21b6, #7c3aed, #a855f7);
  border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 16px;
}
.vit-hero-circ { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.vit-hero-circ svg { width: 80px; height: 80px; transform: rotate(-90deg); }
.vit-hero-circ-text {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.vit-hero-circ-text .big { font-size: 20px; font-weight: 800; color: #fff; }
.vit-hero-circ-text .small { font-size: 10px; color: rgba(255,255,255,.7); }
.vit-hero-info { flex: 1; min-width: 0; }
.vit-hero-date { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 4px; }
.vit-hero-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.vit-hero-sub { font-size: 12px; color: rgba(255,255,255,.6); }
.vit-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.vit-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.vit-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.vit-emoji { font-size: 28px; flex-shrink: 0; }
.vit-info { flex: 1; min-width: 0; }
.vit-name { font-weight: 700; font-size: 15px; }
.vit-dose { font-size: 12px; color: var(--text2); margin-top: 2px; }
.vit-del { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; }
.vit-times { display: flex; gap: 6px; flex-wrap: wrap; }
.vit-time-badge {
  padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer;
  transition: all .2s;
}
.vit-time-badge.done { background: var(--violet); border-color: var(--violet); color: #fff; }
.vit-week-row { display: flex; gap: 5px; margin-top: 10px; }
.vit-week-day {
  flex: 1; height: 28px; border-radius: 6px; background: var(--surface2);
  border: 1.5px solid var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 9px; color: var(--text2);
  flex-direction: column; gap: 1px;
}
.vit-week-day.full { background: var(--violet); border-color: var(--violet); color: #fff; }
.vit-week-day.partial { background: rgba(192,132,252,.3); border-color: var(--violet); color: var(--violet); }
.vit-week-day span { font-size: 8px; }
.vit-history { margin-top: 14px; }
.vit-hist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.vit-hist-label { font-size: 11px; color: var(--text2); width: 28px; text-align: right; flex-shrink: 0; }
.vit-hist-bar-wrap { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.vit-hist-bar-fill { height: 100%; background: var(--violet); border-radius: 4px; }
.vit-hist-pct { font-size: 10px; color: var(--text2); width: 30px; flex-shrink: 0; }

/* FAB */
#fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: 20px;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; color: #fff; font-size: 26px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,106,247,.5);
  display: flex; align-items: center; justify-content: center; z-index: 20;
  transition: transform .15s;
}
#fab:active { transform: scale(.92); }

/* MODALS */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 100; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box {
  width: 100%; background: var(--surface); border-radius: 24px 24px 0 0;
  padding: 20px 20px 36px; max-height: 90vh; overflow-y: auto;
  transform: translateY(100%); transition: transform .3s;
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 18px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.modal-field input,
.modal-field select,
.modal-field textarea {
  width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text); font-size: 14px; outline: none;
  font-family: inherit;
}
.modal-field input:focus,
.modal-field select:focus,
.modal-field textarea:focus { border-color: var(--accent); }
.modal-field select option { background: var(--surface2); }

/* DATES ROW — две даты рядом */
.dates-row { display: flex; gap: 10px; }
.dates-row .modal-field { flex: 1; min-width: 0; }
.dates-row .modal-field input { width: 100%; }

.emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.emoji-btn {
  width: 38px; height: 38px; font-size: 20px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--surface2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: border-color .2s;
}
.emoji-btn.sel { border-color: var(--accent); background: rgba(124,106,247,.15); }
.times-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.time-toggle {
  padding: 7px 14px; border-radius: 14px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 13px;
}
.time-toggle.sel { background: var(--violet); border-color: var(--violet); color: #fff; }
.save-btn {
  width: 100%; padding: 14px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; margin-top: 6px; transition: opacity .2s;
}
.save-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* BOOK OVERLAY */
#book-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  overflow-y: auto; transform: translateX(100%); transition: transform .3s;
}
#book-overlay.open { transform: translateX(0); }
.bok-ov-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px; border-bottom: 1px solid var(--border);
}
.bok-ov-back {
  background: none; border: none; color: var(--text); cursor: pointer;
  font-size: 22px; padding: 4px; flex-shrink: 0;
}
.bok-ov-title { font-size: 17px; font-weight: 700; flex: 1; }
.bok-ov-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 20px; }
.bok-ov-body { padding: 16px; }
.bok-cover-wrap {
  width: 130px; margin: 0 auto 20px; aspect-ratio: 2/3;
  border-radius: var(--radius); overflow: hidden; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 50px;
  cursor: pointer; border: 2px dashed var(--border); position: relative;
}
.bok-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
.bok-cover-edit {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.6); font-size: 11px; text-align: center; padding: 5px; color: #fff;
}
.bok-status-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.bok-status-tab {
  flex: 1; padding: 8px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 12px;
  font-weight: 600; text-align: center;
}
.bok-status-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.bok-prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.bok-prog-input {
  width: 80px; padding: 10px; border-radius: 10px; background: var(--surface2);
  border: 1.5px solid var(--border); color: var(--text); font-size: 16px; text-align: center; outline: none;
}
.bok-prog-input:focus { border-color: var(--accent); }
.bok-prog-bar-wrap { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.bok-prog-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 5px; transition: width .3s; }
.bok-prog-pct { font-size: 13px; font-weight: 700; color: var(--accent2); min-width: 36px; text-align: right; }
.bok-stars { display: flex; gap: 8px; margin-bottom: 16px; font-size: 28px; cursor: pointer; }
.bok-notes {
  width: 100%; padding: 12px; border-radius: var(--radius-sm); background: var(--surface2);
  border: 1.5px solid var(--border); color: var(--text); font-size: 14px;
  font-family: inherit; resize: none; outline: none; margin-bottom: 16px; height: 100px;
}
.bok-notes:focus { border-color: var(--accent); }
.bok-save-btn {
  width: 100%; padding: 14px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
}

/* LANDING */
#landing {
  position: fixed; inset: 0; background: var(--bg); z-index: 300;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; padding: 32px;
}
.land-logo { font-size: 64px; }
.land-title { font-size: 28px; font-weight: 900; text-align: center; }
.land-sub { font-size: 15px; color: var(--text2); text-align: center; }
.land-input {
  width: 100%; padding: 14px 18px; border-radius: var(--radius); border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 16px; outline: none;
}
.land-btn {
  width: 100%; padding: 16px; border-radius: var(--radius); border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 18px; font-weight: 800; cursor: pointer;
}

/* AVATAR MODAL */
.ava-preview {
  width: 100px; height: 100px; border-radius: 50%; background: var(--surface2);
  margin: 0 auto 16px; overflow: hidden; display: flex; align-items: center; justify-content: center;
  font-size: 40px; border: 3px solid var(--accent);
}
.ava-preview img { width: 100%; height: 100%; object-fit: cover; }
.ava-upload-btn {
  width: 100%; padding: 12px; border-radius: var(--radius); border: 1.5px dashed var(--border);
  background: var(--surface2); color: var(--text2); font-size: 14px; cursor: pointer; text-align: center;
  margin-bottom: 10px;
}

/* MISC */
.section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-title { font-size: 17px; font-weight: 800; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }
.chip {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600; margin-right: 4px; margin-top: 4px;
}
</style>
</head>
<body>

<div id="landing" style="display:none">
  <div class="land-logo">🚀</div>
  <div class="land-title">ЛайфКвест</div>
  <div class="land-sub">Твой личный трекер роста</div>
  <input class="land-input" id="land-name" placeholder="Введи своё имя" maxlength="30">
  <button class="land-btn" onclick="startApp()">Начать путь ✨</button>
</div>

<div id="shell">
  <div id="hdr"></div>
  <div id="content">
    <div class="page active" id="p-dash"></div>

<script>
/* ── TELEGRAM ─────────────────────────────── */
const tg = window.Telegram?.WebApp || { initData:'', initDataUnsafe:{}, ready:()=>{}, expand:()=>{},
  setHeaderColor:()=>{}, setBackgroundColor:()=>{}, HapticFeedback:{impactOccurred:()=>{}},
  BackButton:{ show:()=>{}, hide:()=>{}, onClick:()=>{}, offClick:()=>{} } };
tg.ready(); tg.expand();
tg.setHeaderColor('#0f0f13'); tg.setBackgroundColor('#0f0f13');
const IS_TG = tg.initData.length > 0;

/* ── CONSTANTS ────────────────────────────── */
const LEVELS = [
  {n:'Новичок',xp:0},{n:'Ученик',xp:100},{n:'Искатель',xp:250},
  {n:'Воин',xp:500},{n:'Мастер',xp:900},{n:'Герой',xp:1400},
  {n:'Легенда',xp:2000},{n:'Бог',xp:3000}
];
const HAB_EMOJIS = ['💪','📚','🧘','🏃','🎯','✍️','🥗','💧','🎨','🎵','💤','🧹','🐕','🌿','🏋️','🚴','🤸','📝'];
const VIT_EMOJIS = ['💊','🌟','☀️','🫐','🍋','🥕','🍵','💧','🧴','🌿','🫧','⚡'];
const VIT_TIMES = ['Утро','День','Вечер','Ночь'];
const DAYS_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DAYS_FULL = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const BOOK_STATUSES = { reading:'Читаю', done:'Прочитал', want:'Хочу прочитать' };

/* ── STATE ────────────────────────────────── */
const SK = 'lq_v6';
const OLD_KEYS = ['lq5','lq_v4','lq_v5'];

function defaultState() {
  return { name:'', isLoggedIn:false, isSubscribed:false, xp:0,
    habits:[], weeks:{}, goals:[], avatar:'',
    books:[], vitamins:[], booksTab:'reading', vitDate:'' };
}

function loadState() {
  // Попытка загрузить текущую версию
  try {
    const raw = localStorage.getItem(SK);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Убедимся, что все поля есть
      const def = defaultState();
      return Object.assign({}, def, parsed);
    }
  } catch(e) {}

  // Миграция со старых ключей
  for (const ok of OLD_KEYS) {
    try {
      const raw = localStorage.getItem(ok);
      if (!raw) continue;
      const old = JSON.parse(raw);
      const def = defaultState();
      const merged = Object.assign({}, def, old);
      // Сохраняем под новым ключом
      localStorage.setItem(SK, JSON.stringify(merged));
      return merged;
    } catch(e) {}
  }

  return defaultState();
}

let S = loadState();

function sv() {
  try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {}
}

/* ── HELPERS ──────────────────────────────── */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const todayDate = () => new Date();
const haptic = (t='light') => { try { tg.HapticFeedback.impactOccurred(t); } catch(e) {} };

function getLevel(xp) {
  let lv = 0;
  for (let i = LEVELS.length-1; i >= 0; i--) { if (xp >= LEVELS[i].xp) { lv = i; break; } }
  return { idx: lv, ...LEVELS[lv], next: LEVELS[lv+1] || null };
}

function getLvlPct(xp) {
  const lv = getLevel(xp);
  if (!lv.next) return 100;
  const base = lv.xp, top = lv.next.xp;
  return Math.min(100, Math.round((xp - base) / (top - base) * 100));
}

function addXP(n) {
  S.xp = Math.max(0, S.xp + n);
  sv();
  rHeader();
}

function getWeekKey(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + offset * 7);
  return d.toISOString().slice(0,10);
}

function getCurrentWeekKey() { return getWeekKey(0); }

function ensureWeek(wk) {
  if (!S.weeks[wk]) S.weeks[wk] = { tasks:[], notes:'' };
  if (!S.weeks[wk].tasks) S.weeks[wk].tasks = [];
  if (S.weeks[wk].notes === undefined) S.weeks[wk].notes = '';
}

function getWeekDates(wk) {
  const sun = new Date(wk + 'T00:00:00');
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(sun); d.setDate(sun.getDate() + i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

function fmt(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

/* ── NAVIGATION ───────────────────────────── */
let curPage = 'dash';

function go(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('p-' + page);
  if (el) el.classList.add('active');
  const nb = document.querySelector(`.nav-btn[data-page="${page}"]`);
  if (nb) nb.classList.add('active');
  curPage = page;
  renderPage(page);
}

function renderPage(page) {
  if (page === 'dash') rDash();
  else if (page === 'plan') rPlanner();
  else if (page === 'hab') rHabits();
  else if (page === 'goals') rGoals();
  else if (page === 'books') rBooks();
  else if (page === 'vit') rVit();
}

function rAll() {
  rHeader();
  renderPage(curPage);
}

/* ── HEADER ───────────────────────────────── */
function rHeader() {
  const lv = getLevel(S.xp);
  const pct = getLvlPct(S.xp);
  const nextXp = lv.next ? lv.next.xp : S.xp;
  const avaHtml = S.avatar
    ? `<img src="${S.avatar}" alt="ava">`
    : '🧑';

  document.getElementById('hdr').innerHTML = `
    <div class="hdr-top">
      <div class="hdr-ava" onclick="openModal('m-ava')">${avaHtml}</div>
      <div class="hdr-info">
        <div class="hdr-name">${S.name || 'Игрок'}</div>
        <div class="hdr-lvl">Ур. ${lv.idx+1} · ${lv.n}</div>
      </div>
      <div class="hdr-btns">
        ${!S.isSubscribed ? `<button class="hdr-btn btn-prem" onclick="buyPrem()">⭐ Премиум</button>` : ''}
        ${!IS_TG ? `<button class="hdr-btn btn-out" onclick="logout()">Выйти</button>` : ''}
      </div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="xp-label">${S.xp} / ${nextXp} XP · ${lv.n}</div>
  `;

  // Синхронизируем превью аватара в модале
  const wrap = document.getElementById('ava-prev-wrap');
  if (wrap) wrap.innerHTML = S.avatar ? `<img src="${S.avatar}">` : '🧑';
}

/* ── DASHBOARD ────────────────────────────── */
function rDash() {
  const wk = getCurrentWeekKey();
  ensureWeek(wk);
  const tasks = S.weeks[wk].tasks;
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const habsDone = S.habits.filter(h => {
    if (!h.completions) return false;
    return h.completions.includes(today());
  }).length;

  // Стрик
  let streak = 0;
  const td = new Date();
  for (let i = 0; i < 30; i++) {
    const d = new Date(td); d.setDate(td.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const hasAny = S.habits.some(h => h.completions && h.completions.includes(ds))
      || Object.values(S.weeks).some(w => w.tasks && w.tasks.some(t => t.done && t.date === ds));
    if (hasAny) streak++; else break;
  }

  // Последние 7 дней для кружков
  const dots7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const active = S.habits.some(h => h.completions && h.completions.includes(ds));
    dots7.push({ label: DAYS_SHORT[d.getDay()], active });
  }

  // Недавние задачи (до 5)
  const recentTasks = tasks.slice(-5).reverse();

  document.getElementById('p-dash').innerHTML = `
    <div class="section-hdr"><div class="section-title">Дашборд</div></div>

    <div class="dash-stats">
      <div class="stat-tile">
        <div class="val" style="color:var(--green)">${done}/${total}</div>
        <div class="lbl">Задач сегодня</div>
      </div>
      <div class="stat-tile">
        <div class="val" style="color:var(--violet)">${habsDone}/${S.habits.length}</div>
        <div class="lbl">Привычек</div>
      </div>
      <div class="stat-tile">
        <div class="val" style="color:var(--yellow)">🔥${streak}</div>
        <div class="lbl">Дней стрика</div>
      </div>
      <div class="stat-tile">
        <div class="val" style="color:var(--accent)">${S.xp}</div>
        <div class="lbl">Очков опыта</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Активность за неделю</div>
      <div class="streak-row">${dots7.map(d=>`<div class="streak-dot${d.active?' done':''}">${d.label}</div>`).join('')}</div>
    </div>

    ${recentTasks.length ? `
    <div class="card">
      <div class="card-title">Задачи этой недели</div>
      ${recentTasks.map(t => `
        <div class="task-row">
          <div class="task-cb ${t.done?'done':''}" onclick="togTask('${t.id}')">
            ${t.done ? '✓' : ''}
          </div>
          <div class="task-text ${t.done?'done':''}">${t.text}</div>
        </div>
      `).join('')}
    </div>` : ''}

    ${S.goals.length ? `
    <div class="card">
      <div class="card-title">Цели</div>
      ${S.goals.slice(0,3).map(g => {
        const pct = calcGoalPct(g);
        return `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px;font-weight:600">${g.title}</span>
              <span style="font-size:12px;color:var(--accent2)">${pct}%</span>
            </div>
            <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:var(--accent)"></div></div>
          </div>
        `;
      }).join('')}
    </div>` : ''}
  `;
}

/* ── PLANNER ──────────────────────────────── */
let planWeekOffset = 0;

function rPlanner() {
  const wk = getWeekKey(planWeekOffset);
  ensureWeek(wk);
  const tasks = S.weeks[wk].tasks;
  const days = getWeekDates(wk);
  const todayStr = today();

  // Группируем задачи по дням (null = без даты)
  const byDay = {};
  days.forEach(d => byDay[d] = []);
  byDay['nodate'] = [];
  tasks.forEach(t => {
    if (t.date && byDay[t.date] !== undefined) byDay[t.date].push(t);
    else if (t.date && t.date >= days[0] && t.date <= days[6]) byDay[t.date] = byDay[t.date] || [];
    else byDay['nodate'].push(t);
  });

  const doneCount = tasks.filter(t=>t.done).length;

  let html = `
    <div class="section-hdr">
      <button onclick="planWeekOffset--;rPlanner()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">‹</button>
      <div class="section-title">${planWeekOffset===0?'Эта неделя':planWeekOffset===1?'Следующая неделя':planWeekOffset===-1?'Прошлая неделя':'Неделя'}</div>
      <button onclick="planWeekOffset++;rPlanner()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">›</button>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text2)">Выполнено ${doneCount} из ${tasks.length}</span>
        <span style="font-size:13px;color:var(--accent)">${tasks.length?Math.round(doneCount/tasks.length*100):0}%</span>
      </div>
      <div class="xp-bar-wrap" style="margin-top:8px">
        <div class="xp-bar-fill" style="width:${tasks.length?Math.round(doneCount/tasks.length*100):0}%"></div>
      </div>
    </div>
  `;

  days.forEach((d, i) => {
    const dtasks = byDay[d] || [];
    const isToday = d === todayStr;
    const dn = new Date(d + 'T00:00:00');
    html += `
      <div class="card" style="${isToday?'border-color:var(--accent)':''}">
        <div class="card-title" style="${isToday?'color:var(--accent)':''}">
          ${DAYS_SHORT[dn.getDay()]} · ${fmt(d)} ${isToday?'· Сегодня':''}
        </div>
        ${dtasks.map(t => taskRowHtml(t)).join('')}
        ${!dtasks.length ? `<div style="font-size:13px;color:var(--text2);padding:4px 0">Нет задач</div>` : ''}
      </div>
    `;
  });

  if (byDay['nodate'].length) {
    html += `
      <div class="card">
        <div class="card-title">Без даты</div>
        ${byDay['nodate'].map(t => taskRowHtml(t)).join('')}
      </div>
    `;
  }

  document.getElementById('p-plan').innerHTML = html;
}

function taskRowHtml(t) {
  const goal = S.goals.find(g => g.id === t.goalId);
  return `

function togTask(id) {
  const wk = getCurrentWeekKey();
  ensureWeek(wk);
  // Ищем задачу во всех неделях
  let found = null, foundWk = null;
  for (const [wKey, w] of Object.entries(S.weeks)) {
    const t = w.tasks && w.tasks.find(x => x.id === id);
    if (t) { found = t; foundWk = wKey; break; }
  }
  if (!found) return;
  found.done = !found.done;
  found.done ? addXP(10) : addXP(-10);
  haptic();
  sv();
  if (curPage === 'plan') rPlanner();
  else if (curPage === 'dash') rDash();
}

function delTask(id) {
  for (const wKey of Object.keys(S.weeks)) {
    const w = S.weeks[wKey];
    if (!w.tasks) continue;
    const idx = w.tasks.findIndex(t => t.id === id);
    if (idx !== -1) { w.tasks.splice(idx, 1); break; }
  }
  sv();
  rPlanner();
}

/* ── GOALS ────────────────────────────────── */

/**
 * Вычисляет процент выполнения цели на основе completions привычки
 * ИСПРАВЛЕННАЯ ЛОГИКА:
 * - Перебираем каждую неделю в периоде цели
 * - Считаем сколько раз привычка выполнена за эту неделю
 * - Капаем до targetPerWeek
 * - Суммируем и делим на totalTarget
 */
function calcGoalPct(g) {
  if (!g.habitId || !g.targetPerWeek) return 0;

  const habit = S.habits.find(h => h.id === g.habitId);
  if (!habit || !habit.completions) return 0;

  const startDate = new Date(g.startDate + 'T00:00:00');
  const endDate = new Date(g.endDate + 'T00:00:00');

  if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) return 0;

  const msPerDay = 86400000;
  const totalDays = Math.round((endDate - startDate) / msPerDay) + 1;
  if (totalDays <= 0) return 0;

  const totalWeeks = Math.ceil(totalDays / 7);
  const totalTarget = g.targetPerWeek * totalWeeks;

  if (totalTarget <= 0) return 0;

  // Считаем все completions в рамках периода цели
  let completedInPeriod = 0;

  // Идём по неделям
  for (let weekIdx = 0; weekIdx < totalWeeks; weekIdx++) {
    const weekStart = new Date(startDate.getTime() + weekIdx * 7 * msPerDay);
    const weekEnd = new Date(Math.min(
      weekStart.getTime() + 6 * msPerDay,
      endDate.getTime()
    ));

    const weekStartStr = weekStart.toISOString().slice(0,10);
    const weekEndStr = weekEnd.toISOString().slice(0,10);

    // Считаем completions за эту неделю
    let weekCount = habit.completions.filter(d => d >= weekStartStr && d <= weekEndStr).length;
    // Капируем до targetPerWeek
    weekCount = Math.min(weekCount, g.targetPerWeek);
    completedInPeriod += weekCount;
  }

  return Math.min(100, Math.round(completedInPeriod / totalTarget * 100));
}

function calcExpectedPct(g) {
  if (!g.startDate || !g.endDate) return 0;
  const now = new Date();
  const start = new Date(g.startDate + 'T00:00:00');
  const end = new Date(g.endDate + 'T00:00:00');
  if (now <= start) return 0;
  if (now >= end) return 100;
  const elapsed = now - start;
  const total = end - start;
  return Math.round(elapsed / total * 100);
}

function rGoals() {
  let html = `
    <div class="section-hdr">
      <div class="section-title">Цели</div>
    </div>
  `;

  if (!S.goals.length) {
    html += `<div class="empty-state">Нет целей. Нажми + чтобы добавить!</div>`;
  } else {
    const now = new Date();
    S.goals.forEach(g => {
      const pct = calcGoalPct(g);
      const expPct = calcExpectedPct(g);
      const habit = g.habitId ? S.habits.find(h => h.id === g.habitId) : null;
      const endDate = g.endDate ? new Date(g.endDate + 'T00:00:00') : null;
      const daysLeft = endDate ? Math.ceil((endDate - now) / 86400000) : null;

      let badge = '';
      if (pct >= 100) badge = `<span class="goal-badge badge-ok">✅ Выполнено</span>`;
      else if (endDate && daysLeft < 0) badge = `<span class="goal-badge badge-over">❌ Просрочено</span>`;
      else if (endDate && daysLeft <= 7) badge = `<span class="goal-badge badge-soon">⚠️ Скоро: ${daysLeft}д</span>`;
      else badge = `<span class="goal-badge badge-active">🎯 В процессе</span>`;

      // Мини-сетка последних дней привычки
      let habGrid = '';
      if (habit && habit.completions) {
        const last7 = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const ds = d.toISOString().slice(0,10);
          last7.push({ d: ds, label: DAYS_SHORT[d.getDay()], done: habit.completions.includes(ds) });
        }
        habGrid = `
          <div style="margin-top:8px">
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px">${habit.icon||'💪'} ${habit.name} — последние 7 дней</div>
            <div class="goal-hab-grid">
              ${last7.map(x => `<div class="goal-hab-dot${x.done?' done':''}" title="${x.d}">${x.label}</div>`).join('')}
            </div>
          </div>
        `;
      }

      const totalWeeks = g.endDate && g.startDate
        ? Math.ceil((new Date(g.endDate+'T00:00:00') - new Date(g.startDate+'T00:00:00')) / 86400000 / 7)
        : 0;
      const totalTarget = g.targetPerWeek * totalWeeks;

      html += `
        <div class="goal-card">
          <div class="goal-top">
            <div class="goal-title">${g.title}</div>
            ${badge}
          </div>
          <div class="goal-meta">
            ${g.startDate ? fmt(g.startDate) : ''} — ${g.endDate ? fmt(g.endDate) : ''}
            ${g.targetPerWeek ? ` · ${g.targetPerWeek}×/нед · Цель: ${totalTarget} раз` : ''}
          </div>
          <div class="prog-wrap">
            <div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div>
            ${expPct > 0 && pct < 100 ? `<div class="prog-expected" style="left:${expPct}%"></div>` : ''}
          </div>
          <div class="prog-label">
            <span>${pct}% выполнено</span>
            ${expPct > 0 && pct < 100 ? `<span style="color:var(--yellow)">Ожидаемый прогресс: ${expPct}%</span>` : ''}
          </div>
          ${habGrid}
          <button class="goal-del" onclick="delGoal('${g.id}')" style="margin-top:8px;width:100%;border-radius:10px;padding:6px;background:var(--surface2);color:var(--red);font-size:13px">Удалить</button>
        </div>
      `;
    });
  }

  document.getElementById('p-goals').innerHTML = html;
}

/* ── VITAMINS ─────────────────────────────── */
function rVit() {
  if (!S.vitamins) S.vitamins = [];
  const todayStr = today();
  const td = new Date();

  // Прогресс сегодня
  let totalToday = 0, doneToday = 0;
  S.vitamins.forEach(v => {
    if (v.endDate && todayStr > v.endDate) return;
    const times = v.times || ['Утро'];
    totalToday += times.length;
    const taken = v.taken || {};
    doneToday += times.filter(t => taken[todayStr] && taken[todayStr].includes(t)).length;
  });
  const heroPct = totalToday > 0 ? Math.round(doneToday/totalToday*100) : 0;
  const heroR = 35; const heroCirc = 2*Math.PI*heroR;
  const heroDash = heroCirc * heroPct / 100;

  const dn = td.getDay();
  const dateStr2 = `${td.getDate()} ${MONTHS[td.getMonth()]}, ${DAYS_FULL[dn]}`;

  // Статистика
  let streakDays = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(td); d.setDate(td.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const anyDone = S.vitamins.some(v => {
      const taken = v.taken || {};
      return taken[ds] && taken[ds].length > 0;
    });
    if (anyDone) streakDays++; else break;
  }

  let totalPills = 0;
  S.vitamins.forEach(v => {
    const taken = v.taken || {};
    Object.values(taken).forEach(arr => totalPills += (arr||[]).length);
  });

  let daysWithAny = 0;
  const daySet = new Set();
  S.vitamins.forEach(v => {
    Object.entries(v.taken||{}).forEach(([d, arr]) => { if(arr && arr.length) daySet.add(d); });
  });
  daysWithAny = daySet.size;

  // 7-дневная история
  const hist7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(td); d.setDate(td.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    let tot = 0, dn2 = 0;
    S.vitamins.forEach(v => {
      const times = v.times||['Утро'];
      tot += times.length;
      const taken = v.taken||{};
      dn2 += times.filter(t => taken[ds] && taken[ds].includes(t)).length;
    });
    hist7.push({ label: DAYS_SHORT[d.getDay()], pct: tot > 0 ? Math.round(dn2/tot*100) : 0 });
  }

  let html = `
    <div class="vit-hero">
      <div class="vit-hero-circ">
        <svg viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="${heroR}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="7"/>
          <circle cx="40" cy="40" r="${heroR}" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="7"
            stroke-dasharray="${heroDash} ${heroCirc}" stroke-linecap="round"/>
        </svg>
        <div class="vit-hero-circ-text">
          <div class="big">${heroPct}%</div>
          <div class="small">${doneToday}/${totalToday}</div>
        </div>
      </div>
      <div class="vit-hero-info">
        <div class="vit-hero-date">${dateStr2}</div>
        <div class="vit-hero-title">Витамины</div>
        <div class="vit-hero-sub">Сегодня выпито ${doneToday} из ${totalToday}</div>
      </div>
    </div>

    <div class="vit-stats">
      <div class="stat-tile"><div class="val" style="color:var(--violet)">🔥${streakDays}</div><div class="lbl">Дней стрика</div></div>
      <div class="stat-tile"><div class="val" style="color:var(--green)">${daysWithAny}</div><div class="lbl">Активных дней</div></div>
      <div class="stat-tile"><div class="val" style="color:var(--blue)">${totalPills}</div><div class="lbl">Всего принято</div></div>
    </div>

    <div class="section-hdr"><div class="section-title">Сегодня</div></div>
  `;

  if (!S.vitamins.length) {
    html += `<div class="empty-state">Нет витаминов.<br>Нажми + чтобы добавить!</div>`;
  } else {
    S.vitamins.forEach(v => {
      if (v.endDate && todayStr > v.endDate) return;
      const taken = v.taken || {};
      const times = v.times || ['Утро'];
      const allDone = times.every(t => taken[todayStr] && taken[todayStr].includes(t));

      // Дни недели
      const weekDates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(td); const sun = new Date(td); sun.setDate(td.getDate()-td.getDay());
        const day = new Date(sun); day.setDate(sun.getDate()+i);
        const ds = day.toISOString().slice(0,10);
        const dayTimes = times;
        const fullDone = dayTimes.every(t => taken[ds] && taken[ds].includes(t));
        const partDone = dayTimes.some(t => taken[ds] && taken[ds].includes(t));
        weekDates.push({ label: DAYS_SHORT[day.getDay()], full: fullDone, part: partDone && !fullDone });
      }

      html += `
        <div class="vit-card">
          <div class="vit-top">
            <div class="vit-emoji" onclick="vitToggleAll('${v.id}')">${v.emoji||'💊'}</div>
            <div class="vit-info">
              <div class="vit-name">${v.name}</div>
              <div class="vit-dose">${v.dose||''} ${v.endDate?'· до '+fmt(v.endDate):''}</div>
            </div>
            <button class="vit-del" onclick="delVit('${v.id}')">🗑</button>
          </div>
          <div class="vit-times">
            ${times.map(t => {
              const done = taken[todayStr] && taken[todayStr].includes(t);
              return `<div class="vit-time-badge${done?' done':''}" onclick="vitToggle('${v.id}','${t}')">${t}</div>`;
            }).join('')}
          </div>
          <div class="vit-week-row">
            ${weekDates.map(d => `<div class="vit-week-day${d.full?' full':d.part?' partial':''}"><span>${d.label}</span>${d.full?'✓':''}</div>`).join('')}
          </div>
        </div>
      `;
    });
  }

  // История 7 дней
  html += `
    <div class="vit-history">
      <div class="section-hdr" style="margin-bottom:8px"><div class="section-title">История 7 дней</div></div>
      ${hist7.map(h => `
        <div class="vit-hist-row">
          <div class="vit-hist-label">${h.label}</div>
          <div class="vit-hist-bar-wrap"><div class="vit-hist-bar-fill" style="width:${h.pct}%"></div></div>
          <div class="vit-hist-pct">${h.pct}%</div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('p-vit').innerHTML = html;
}

function vitToggle(vitId, time) {
  const v = S.vitamins.find(x => x.id === vitId);
  if (!v) return;
  if (!v.taken) v.taken = {};
  const ds = today();
  if (!v.taken[ds]) v.taken[ds] = [];
  const idx = v.taken[ds].indexOf(time);
  if (idx === -1) { v.taken[ds].push(time); addXP(5); haptic(); }
  else { v.taken[ds].splice(idx, 1); addXP(-5); }
  sv(); rVit();
}

function vitToggleAll(vitId) {
  const v = S.vitamins.find(x => x.id === vitId);
  if (!v) return;
  if (!v.taken) v.taken = {};
  const ds = today();
  const times = v.times || ['Утро'];
  const allDone = times.every(t => v.taken[ds] && v.taken[ds].includes(t));
  if (allDone) { v.taken[ds] = []; addXP(-times.length*5); }
  else { v.taken[ds] = [...times]; addXP(times.length*5); haptic('medium'); }
  sv(); rVit();
}

function delVit(vitId) {
  S.vitamins = S.vitamins.filter(v => v.id !== vitId);
  sv(); rVit();
}

/* ── FAB & MODALS ─────────────────────────── */
function openFab() {
  haptic();
  if (curPage === 'plan') openModal('m-task');
  else if (curPage === 'hab') openModal('m-hab');
  else if (curPage === 'goals') openModal('m-goal');
  else if (curPage === 'books') openModal('m-book');
  else if (curPage === 'vit') openModal('m-vit');
  else openModal('m-task');
}

function openModal(id) {
  // Заполняем дропдауны
  if (id === 'm-task') {
    fillGoalSelect('t-goal');
    document.getElementById('t-text').value = '';
    document.getElementById('t-date').value = today();
    validateModal(id);
  }
  if (id === 'm-hab') {
    fillGoalSelect('h-goal');
    document.getElementById('h-name').value = '';
    buildEmojiPicker('h-emoji-pick', HAB_EMOJIS, 'hab');
    validateModal(id);
  }
  if (id === 'm-goal') {
    fillHabSelect('g-hab');
    document.getElementById('g-title').value = '';
    document.getElementById('g-start').value = today();
    document.getElementById('g-end').value = '';
    document.getElementById('g-tpw').value = '3';
    validateModal(id);
  }
  if (id === 'm-book') {
    document.getElementById('b-title').value = '';
    document.getElementById('b-author').value = '';
    document.getElementById('b-total').value = '';
    document.getElementById('b-cover-preview').style.display = 'none';
    newBookCoverB64 = '';
    validateModal(id);
  }
  if (id === 'm-vit') {
    document.getElementById('v-name').value = '';
    document.getElementById('v-dose').value = '';
    document.getElementById('v-end').value = '';
    buildEmojiPicker('v-emoji-pick', VIT_EMOJIS, 'vit');
    buildTimesPicker();
    validateModal(id);
  }
  if (id === 'm-ava') {
    const wrap = document.getElementById('ava-prev-wrap');
    if (wrap) wrap.innerHTML = S.avatar ? `<img src="${S.avatar}">` : '🧑';
  }

  document.getElementById(id).classList.add('open');
  tg.BackButton.show();
  tg.BackButton.onClick(() => closeModal(id));
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  tg.BackButton.hide();
}

function fillGoalSelect(selId) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  sel.innerHTML = `<option value="">— Без цели —</option>` +
    S.goals.map(g => `<option value="${g.id}">${g.title}</option>`).join('');
}

function fillHabSelect(selId) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  sel.innerHTML = `<option value="">— Без привычки —</option>` +
    S.habits.map(h => `<option value="${h.id}">${h.icon||'💪'} ${h.name}</option>`).join('');
}

let selEmoji = { hab: '💪', vit: '💊' };

function buildEmojiPicker(containerId, emojis, type) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = emojis.map(e => `
    <button class="emoji-btn${selEmoji[type]===e?' sel':''}" onclick="selEmojiClick('${type}','${e}','${containerId}')">${e}</button>
  `).join('');
}

function selEmojiClick(type, emoji, containerId) {
  selEmoji[type] = emoji;
  buildEmojiPicker(containerId, type === 'hab' ? HAB_EMOJIS : VIT_EMOJIS, type);
}

let selTimes = new Set(['Утро']);
function buildTimesPicker() {
  const c = document.getElementById('v-times-pick');
  if (!c) return;
  c.innerHTML = VIT_TIMES.map(t => `
    <div class="time-toggle${selTimes.has(t)?' sel':''}" onclick="toggleTime('${t}')">${t}</div>
  `).join('');
}
function toggleTime(t) {
  if (selTimes.has(t)) selTimes.delete(t); else selTimes.add(t);
  buildTimesPicker();
}

/* ── VALIDATION ───────────────────────────── */
function validateModal(modalId) {
  let valid = false;
  if (modalId === 'm-task') {
    valid = !!document.getElementById('t-text')?.value.trim();
    setBtn('save-task', valid);
  } else if (modalId === 'm-hab') {
    valid = !!document.getElementById('h-name')?.value.trim();
    setBtn('save-hab', valid);
  } else if (modalId === 'm-goal') {
    const title = document.getElementById('g-title')?.value.trim();
    const end = document.getElementById('g-end')?.value;
    valid = !!(title && end);
    setBtn('save-goal', valid);
  } else if (modalId === 'm-book') {
    const title = document.getElementById('b-title')?.value.trim();
    const total = parseInt(document.getElementById('b-total')?.value);
    valid = !!(title && total > 0);
    setBtn('save-book', valid);
  } else if (modalId === 'm-vit') {
    valid = !!document.getElementById('v-name')?.value.trim();
    setBtn('save-vit', valid);
  }
}

function setBtn(id, enabled) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = !enabled;
}

/* ── SAVE ACTIONS ─────────────────────────── */
function saveTask() {
  const text = document.getElementById('t-text').value.trim();
  if (!text) return;
  const date = document.getElementById('t-date').value || today();
  const goalId = document.getElementById('t-goal').value || null;

  const wk = getCurrentWeekKey();
  ensureWeek(wk);
  S.weeks[wk].tasks.push({ id: uid(), text, date, done: false, goalId });
  sv();
  closeModal('m-task');
  if (curPage === 'plan') rPlanner();
  else if (curPage === 'dash') rDash();
  haptic();
}

function saveHab() {
  const name = document.getElementById('h-name').value.trim();
  if (!name) return;
  const goalId = document.getElementById('h-goal').value || null;

  S.habits.push({ id: uid(), name, icon: selEmoji.hab, goalId, completions: [] });
  sv();
  closeModal('m-hab');
  rHabits();
  haptic();
}

function saveGoal() {
  const title = document.getElementById('g-title').value.trim();
  const start = document.getElementById('g-start').value || today();
  const end = document.getElementById('g-end').value;
  const habitId = document.getElementById('g-hab').value || null;
  const tpw = parseInt(document.getElementById('g-tpw').value) || 3;
  if (!title || !end) return;

  S.goals.push({
    id: uid(), title,
    startDate: start, endDate: end,
    habitId, targetPerWeek: tpw
  });
  sv();
  closeModal('m-goal');
  rGoals();
  haptic();
}

function saveBook() {
  const title = document.getElementById('b-title').value.trim();
  const author = document.getElementById('b-author').value.trim();
  const total = parseInt(document.getElementById('b-total').value);
  if (!title || !total) return;

  S.books.push({
    id: uid(), title, author, total,
    current: 0, status: 'reading',
    rating: 0, notes: '', cover: newBookCoverB64 || ''
  });
  S.booksTab = 'reading';
  sv();
  closeModal('m-book');
  rBooks();
  haptic();
}

function previewBookCover() {
  const inp = document.getElementById('b-cover-input');
  if (!inp.files[0]) return;
  const fr = new FileReader();
  fr.onload = e => {
    newBookCoverB64 = e.target.result;
    document.getElementById('b-cover-preview').style.display = 'block';
    document.getElementById('b-cover-img').src = e.target.result;
  };
  fr.readAsDataURL(inp.files[0]);
}

function saveVit() {
  const name = document.getElementById('v-name').value.trim();
  if (!name) return;
  const dose = document.getElementById('v-dose').value.trim();
  const endDate = document.getElementById('v-end').value || null;
  const times = [...selTimes];

  S.vitamins.push({
    id: uid(), name, dose, emoji: selEmoji.vit,
    times: times.length ? times : ['Утро'],
    endDate, taken: {}
  });
  sv();
  closeModal('m-vit');
  rVit();
  haptic();
}

/* ── AVATAR ───────────────────────────────── */
function avaFileChange() {
  const inp = document.getElementById('ava-input');
  if (!inp.files[0]) return;
  const fr = new FileReader();
  fr.onload = e => {
    S.avatar = e.target.result;
    sv();
    rHeader();
    const wrap = document.getElementById('ava-prev-wrap');
    if (wrap) wrap.innerHTML = `<img src="${e.target.result}">`;
  };
  fr.readAsDataURL(inp.files[0]);
}

/* ── AUTH ─────────────────────────────────── */
function startApp() {
  const name = document.getElementById('land-name').value.trim() || 'Игрок';
  S.name = name;
  S.isLoggedIn = true;
  sv();
  document.getElementById('landing').style.display = 'none';
  rAll();
}

function logout() {
  S.isLoggedIn = false;
  sv();
  document.getElementById('landing').style.display = 'flex';
}

function buyPrem() {
  S.isSubscribed = true;
  sv();
  rHeader();
  haptic('medium');
}

/* ── INIT ─────────────────────────────────── */
function init() {
  // Закрытие модалов по клику на оверлей
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target === el) closeModal(el.id);
    });
  });

  if (IS_TG) {
    const tgUser = tg.initDataUnsafe?.user;
    if (tgUser) {
      S.name = tgUser.first_name || S.name || 'Игрок';
      S.isLoggedIn = true;
      sv();
    }
  }

  if (!S.isLoggedIn) {
    document.getElementById('landing').style.display = 'flex';
    document.getElementById('shell').style.display = 'none';
  } else {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    rAll();
  }
}

// Переопределяем startApp для корректного показа shell
const _origStartApp = startApp;
window.startApp = function() {
  _origStartApp();
  document.getElementById('shell').style.display = 'flex';
};

init();
</script>
