<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fff; color: #000; }
        .card { background: #f4f4f5; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:none; padding:20px; box-sizing:border-box; z-index:100; }
        .active { display:block; }
        .hidden { display:none; }
        button { width:100%; padding:12px; border:none; border-radius:8px; background:#3390ec; color:white; font-weight:bold; margin-top:10px; }
        input { width:100%; padding:12px; margin:5px 0; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; }
    </style>
</head>
<body>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="showTab('main')">Игры</button>
        <button onclick="showTab('me')">Профиль</button>
        <button id="adm-btn" class="hidden" onclick="showTab('admin')">Админ</button>
    </div>

    <div id="tab-main"><div id="list" class="grid">Загрузка...</div></div>
    
    <div id="tab-me" class="hidden">
        <h3>Профиль</h3>
        <input id="u-name" placeholder="Имя">
        <button onclick="savePr()">Сохранить</button>
        <div id="my-list"></div>
    </div>

    <div id="tab-admin" class="hidden">
        <h3>Новая игра</h3>
        <input id="g-title" placeholder="Название">
        <input id="g-date" placeholder="Дата">
        <input id="g-loc" placeholder="Место">
        <input id="g-slots" type="number" placeholder="Мест">
        <button onclick="saveGame()">Создать</button>
    </div>

    <div id="modal" class="modal"><button onclick="closeM()">⬅ Назад</button><div id="m-cont"></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://mafia-k0kq.onrender.com";
        const ADMIN_ID = 2111239214;
        const MY_ID = tg.initDataUnsafe.user?.id || 0;
        let games = [];

        if(MY_ID === ADMIN_ID) document.getElementById('adm-btn').classList.remove('hidden');

        async function load() {
            const r = await fetch(API + "/games");
            games = await r.json();
            document.getElementById('list').innerHTML = games.map(g => `
                <div class="card" onclick="openG(${g.id})">
                    <b>${g.title}</b><br><small>${g.date_time}</small>
                </div>
            `).join('') || "Игр пока нет";
        }

        function openG(id) {
            const g = games.find(x => x.id === id);
            const signed = g.players.some(p => p.user_id === MY_ID);
            document.getElementById('m-cont').innerHTML = `
                <h2>${g.title}</h2><p>${g.date_time}</p><p>Место: ${g.location}</p>
                <hr>
                <b>Участники (${g.players.length}/${g.max_slots}):</b>
                <div style="margin:10px 0;">${g.players.map(p => `<div>- ${p.name}</div>`).join('')}</div>
                ${!signed ? `<button onclick="reg(${g.id})">Записаться</button>` : `<button style="background:red" onclick="canc(${g.id})">Отменить</button>`}
            `;
            document.getElementById('modal').classList.add('active');
        }

        async function saveGame() {
            const data = {
                title: document.getElementById('g-title').value,
                date_time: document.getElementById('g-date').value,
                location: document.getElementById('g-loc').value,
                max_slots: parseInt(document.getElementById('g-slots').value),
                master: "Ведущий", cost: "Бесплатно", duration: "1 час", players: [], reserve: []
            };
            await fetch(API + "/add_game", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            location.reload();
        }

        async function reg(id) {
            const n = localStorage.getItem('m_n');
            if(!n) return alert("Заполните профиль!");
            await fetch(API+`/register/${id}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:n, tg_profile:tg.initDataUnsafe.user?.username || "no", user_id:MY_ID})});
            location.reload();
        }

        async function canc(id) {
            await fetch(API+`/cancel/${id}?user_id=${MY_ID}`, {method:'POST'});
            location.reload();
        }

        function savePr() { localStorage.setItem('m_n', document.getElementById('u-name').value); alert("ОК"); }
        function showTab(t) { ['main','me','admin'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); }
        function closeM() { document.getElementById('modal').classList.remove('active'); }

        load();
    </script>
</body>
</html>
