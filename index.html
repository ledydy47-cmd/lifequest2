<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ЛайфКвест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#FAFBFF;--surface:#ffffff;--surface2:#f4f5fb;--border:#e8eaf4;--track:#ECECF3;
  --text:#1A1D2E;--text2:#6B7280;--text3:#9CA3AF;
  --accent:#7b68ee;--accent2:#9d8ff5;
  --green:#36C98A;--red:#FF3B30;
  --grad-hdr:linear-gradient(90deg,#BB62FF 0%,#5B8CFF 50%,#2FA6FF 100%);
  --grad-green:linear-gradient(135deg,#19C6A9 0%,#32D17B 100%);
  --grad-purple:linear-gradient(135deg,#8D2BFF 0%,#4766FF 100%);
  --grad-fab:radial-gradient(circle,#FFB32A 0%,#FF8A3D 40%,#E74AF0 100%);
  --grad-btn:linear-gradient(135deg,#5AA7FF 0%,#7E4DFF 100%);
  --grad-main:linear-gradient(135deg,#7b68ee,#9d8ff5);
  --shadow:0 4px 20px rgba(0,0,0,0.06);--shadow-sm:0 2px 8px rgba(0,0,0,0.04);
  --r:18px;--r-sm:12px;--nav-h:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;}
#shell{display:flex;flex-direction:column;height:100%;overflow:hidden;}
#hdr{flex-shrink:0;padding:14px 18px 12px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;}
.page{display:none;min-height:100%;padding-bottom:calc(var(--nav-h) + 24px);}
.page.active{display:block;}
.page-pad{padding:16px;}

/* HEADER */
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.hdr-ava{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--accent);overflow:hidden;flex-shrink:0;cursor:pointer;background:var(--surface2);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(123,104,238,0.12);}
.hdr-ava img{width:100%;height:100%;object-fit:cover;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-weight:800;font-size:17px;color:var(--text);}
.hdr-lvl{font-size:12px;color:var(--text2);margin-top:1px;}
.hdr-btns{display:flex;gap:8px;flex-shrink:0;}
.btn-prem{padding:8px 14px;border-radius:22px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:linear-gradient(135deg,#ffd55a,#ff8c42);color:#fff;box-shadow:0 4px 14px rgba(255,140,66,0.35);}
.btn-out{padding:8px 14px;border-radius:22px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:var(--surface2);color:var(--text2);}
.xp-row{display:flex;align-items:center;gap:10px;}
.xp-bar-wrap{flex:1;height:8px;background:var(--track);border-radius:4px;overflow:hidden;}
.xp-bar-fill{height:100%;background:var(--grad-main);border-radius:4px;transition:width .4s;}
.xp-label{font-size:12px;color:var(--accent);font-weight:700;white-space:nowrap;}

/* NAV */
#nav{flex-shrink:0;display:flex;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -4px 24px rgba(0,0,0,0.08);z-index:10;border-radius:28px 28px 0 0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;transition:color .2s;padding:8px 2px;position:relative;}
.nav-btn.active{color:var(--accent);}
.nav-btn.active::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--grad-main);border-radius:2px;}
.nav-ico{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}

/* FAB */
#fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:20px;width:56px;height:56px;border-radius:50%;background:var(--grad-fab);border:none;color:#fff;font-size:30px;cursor:pointer;box-shadow:0 8px 24px rgba(255,140,61,0.4);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s;}
#fab:active{transform:scale(.92);}

/* PLANNER */
#p-plan{padding:0;}
.plan-hdr{background:var(--grad-hdr);padding:20px 20px 60px;position:relative;}
.plan-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.plan-hdr-greeting{font-size:26px;font-weight:700;color:#fff;line-height:1.2;}
.plan-hdr-sub{font-size:15px;font-weight:500;color:rgba(255,255,255,.85);margin-top:4px;}
.plan-hdr-icons{display:flex;gap:8px;}
.plan-hdr-ico{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.18);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.plan-week-strip{display:flex;gap:6px;overflow-x:auto;padding:0 20px;scrollbar-width:none;margin-top:8px;}
.plan-week-strip::-webkit-scrollbar{display:none;}
.plan-day-btn{flex-shrink:0;width:46px;padding:8px 6px;border-radius:14px;border:none;background:rgba(255,255,255,.18);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;}
.plan-day-btn.active{background:#fff;}
.plan-day-btn .wd{font-size:11px;font-weight:600;color:rgba(255,255,255,.8);}
.plan-day-btn.active .wd{color:var(--accent);}
.plan-day-btn .dd{font-size:17px;font-weight:700;color:#fff;}
.plan-day-btn.active .dd{color:var(--text);}
.plan-day-btn .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);}
.plan-day-btn.active .dot{background:var(--accent);}
.plan-day-btn.has-tasks .dot{background:rgba(255,255,255,.9);}
.plan-rings-card{margin:0 16px;margin-top:-44px;background:var(--surface);border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,0.10);padding:20px 16px 18px;display:flex;align-items:center;justify-content:space-around;position:relative;z-index:2;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ring-item.main{transform:scale(1.08);}
.ring-wrap{position:relative;}
.ring-wrap svg{display:block;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-size:18px;font-weight:700;color:var(--text);line-height:1;}
.ring-num.big{font-size:22px;}
.ring-lbl{font-size:10px;font-weight:600;color:var(--text2);text-align:center;}
.ring-pct{font-size:13px;font-weight:600;}
.plan-quote{margin:16px 20px;background:linear-gradient(135deg,rgba(50,209,123,.08),rgba(25,198,169,.05));border-radius:16px;padding:14px 18px;border-left:3px solid var(--green);display:flex;align-items:center;gap:10px;}
.plan-quote-mark{font-size:22px;color:var(--green);flex-shrink:0;}
.plan-quote-txt{font-size:13px;color:var(--text2);font-style:italic;line-height:1.5;}
.plan-schedule-card{margin:8px 16px 16px;background:var(--surface);border-radius:24px;box-shadow:var(--shadow);padding:20px;}
.plan-sch-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.plan-sch-title{font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.plan-sch-link{font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;background:none;border:none;}
.timeline{display:flex;flex-direction:column;gap:12px;}
.tl-item{display:flex;gap:12px;align-items:flex-start;}
.tl-time{width:46px;flex-shrink:0;font-size:12px;font-weight:500;color:var(--text2);padding-top:14px;text-align:right;}
.tl-line-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:14px;position:relative;z-index:1;}
.tl-vline{flex:1;width:2px;background:#E5E7EB;margin-top:4px;min-height:20px;}
.tl-card{flex:1;padding:12px;border-radius:16px;background:var(--surface);box-shadow:var(--shadow-sm);border:1px solid var(--border);border-left-width:3px;cursor:pointer;}
.tl-card-top{display:flex;align-items:flex-start;gap:8px;}
.tl-card-ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.tl-card-info{flex:1;min-width:0;}
.tl-card-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-card-dur{font-size:12px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:4px;}
.tl-card-cb{width:24px;height:24px;border-radius:8px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;min-width:24px;}
.tl-card-cb.done::after{content:'✓';color:#fff;font-size:13px;font-weight:800;}
.tl-card.done-card .tl-card-title{text-decoration:line-through;color:var(--text3);}
.plan-quick-card{margin:0 16px 20px;background:var(--surface);border-radius:24px;box-shadow:var(--shadow);padding:20px;}
.plan-quick-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.plan-quick-title{font-size:17px;font-weight:700;color:var(--text);}
.plan-quick-plus{width:32px;height:32px;border-radius:50%;background:var(--grad-btn);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.plan-inp-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.plan-inp{flex:1;height:48px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);padding:0 14px;font-size:14px;font-weight:500;color:var(--text);outline:none;font-family:inherit;}
.plan-inp:focus{border-color:var(--accent);}
.plan-add-btn{width:48px;height:48px;border-radius:50%;background:var(--grad-btn);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.plan-chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.plan-chip{height:36px;padding:0 14px;border-radius:18px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .2s;}
.plan-chip.active{border-color:transparent;color:#fff;}
.plan-chip.pri-hi.active{background:linear-gradient(135deg,#FF6B6B,#EE5A6F);}
.plan-chip.pri-md.active{background:linear-gradient(135deg,#F9CA24,#F0932B);}
.plan-chip.pri-lo.active{background:linear-gradient(135deg,#11998E,#38EF7D);}
.plan-dur-row{display:flex;gap:8px;flex-wrap:wrap;}
.plan-dur-chip{height:36px;padding:0 16px;border-radius:18px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.plan-dur-chip.active{background:var(--grad-btn);border-color:transparent;color:#fff;}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.card-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.sec-title{font-size:20px;font-weight:800;color:var(--text);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px;}
.empty-ico{font-size:64px;}
.empty-title{font-size:18px;font-weight:800;color:var(--text);}
.empty-sub{font-size:14px;color:var(--text2);text-align:center;}
.tiles2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tiles3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.tile{background:var(--surface);border-radius:var(--r-sm);padding:14px 10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:6px;}
.tile-val{font-size:22px;font-weight:900;}
.tile-lbl{font-size:11px;color:var(--text2);text-align:center;line-height:1.3;}
.qtiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.qtile{border-radius:var(--r);padding:16px;position:relative;overflow:hidden;}
.qtile-val{font-size:30px;font-weight:900;}
.qtile-lbl{font-size:12px;font-weight:600;margin-top:2px;opacity:.8;}
.qtile-bg-ico{position:absolute;right:10px;top:10px;font-size:32px;opacity:.25;}
.prog-wrap{height:8px;background:var(--track);border-radius:4px;overflow:hidden;position:relative;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s;}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.task-row:last-child{border-bottom:none;}
.task-cb{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;background:var(--surface2);}
.task-cb.done{background:var(--accent);border-color:var(--accent);}
.task-cb.done::after{content:'✓';color:#fff;font-size:13px;font-weight:800;}
.task-txt{flex:1;font-size:14px;font-weight:500;}
.task-txt.done{text-decoration:line-through;color:var(--text2);}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:16px;}
.st-row{display:flex;gap:6px;justify-content:center;}
.st-dot{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);font-weight:700;}
.st-dot.on{background:var(--grad-main);border-color:transparent;color:#fff;}
.st-dot.cur{border-color:var(--accent);}

/* HABITS */
.hab-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.hab-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.hab-ico-wrap{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.hab-info{flex:1;min-width:0;}
.hab-name{font-weight:700;font-size:16px;}
.hab-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.hab-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:18px;}
.hab-days{display:flex;gap:5px;margin-bottom:10px;}
.hab-day{flex:1;aspect-ratio:1;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:8px;font-weight:700;color:var(--text2);gap:2px;transition:all .2s;}
.hab-day .dn{font-size:11px;font-weight:800;}
.hab-day.done{background:var(--grad-main);border-color:transparent;color:#fff;}
.hab-day.today{border-color:var(--accent);color:var(--accent);}
.hab-day.done.today{color:#fff;}
.hab-day.off{opacity:.3;pointer-events:none;}
.hab-prog-row{display:flex;align-items:center;gap:8px;}
.hab-prog-pct{font-size:12px;font-weight:800;margin-left:auto;}

/* GOALS */
.goal-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.goal-title{font-weight:800;font-size:16px;flex:1;}
.goal-badge{font-size:10px;padding:4px 10px;border-radius:20px;flex-shrink:0;margin-left:8px;font-weight:700;}
.b-ok{background:rgba(67,217,162,.15);color:#1a9e75;}
.b-over{background:rgba(239,68,68,.12);color:#dc2626;}
.b-soon{background:rgba(255,213,90,.2);color:#d97706;}
.b-act{background:rgba(123,104,238,.12);color:var(--accent);}
.goal-meta{font-size:12px;color:var(--text2);margin-bottom:12px;}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:5px;}
.hab-mini-grid{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;}
.hab-mini-dot{width:24px;height:24px;border-radius:7px;font-size:9px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-weight:700;}
.hab-mini-dot.ok{background:var(--grad-main);border-color:transparent;color:#fff;}
.goal-del-btn{width:100%;margin-top:12px;padding:9px;border-radius:10px;background:rgba(239,68,68,.08);color:#dc2626;border:none;cursor:pointer;font-size:13px;font-weight:700;}

/* BOOKS */
.books-tabs{display:flex;gap:8px;margin-bottom:16px;}
.bk-tab{flex:1;padding:11px 6px;border-radius:22px;border:1.5px solid var(--border);font-size:13px;font-weight:700;background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.bk-tab.active{background:var(--grad-main);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(123,104,238,.3);}
.books-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.book-card{background:var(--surface);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:transform .15s;}
.book-card:active{transform:scale(.97);}
.book-cover{width:100%;aspect-ratio:2/3;overflow:hidden;position:relative;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.book-cover img{width:100%;height:100%;object-fit:cover;}
.book-status-dot{position:absolute;top:8px;left:8px;width:10px;height:10px;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.book-circ{position:absolute;bottom:6px;right:6px;width:44px;height:44px;}
.book-circ-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;}
.book-info{padding:10px 10px 12px;}
.book-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-author{font-size:11px;color:var(--text2);margin-top:2px;}
.book-stars{display:flex;gap:1px;margin-top:4px;font-size:12px;}

/* BOOK OVERLAY */
#book-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .3s;}
#book-overlay.open{transform:translateX(0);}
.bok-hdr{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);background:var(--surface);}
.bok-back{background:none;border:none;color:var(--text);cursor:pointer;font-size:22px;padding:4px;flex-shrink:0;}
.bok-t{font-size:17px;font-weight:800;flex:1;}
.bok-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:20px;}
.bok-body{padding:20px;}
.bok-cover-wrap{width:130px;margin:0 auto 20px;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:50px;cursor:pointer;border:2px dashed var(--border);position:relative;}
.bok-cover-wrap img{width:100%;height:100%;object-fit:cover;}
.bok-cover-edit{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);font-size:11px;text-align:center;padding:6px;color:#fff;font-weight:600;}
.bok-status-tabs{display:flex;gap:6px;margin-bottom:18px;}
.bok-st-tab{flex:1;padding:9px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;text-align:center;}
.bok-st-tab.active{background:var(--grad-main);border-color:transparent;color:#fff;}
.bok-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.bok-prog-inp{width:78px;padding:10px;border-radius:12px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:16px;text-align:center;outline:none;font-weight:700;}
.bok-prog-inp:focus{border-color:var(--accent);}
.bok-prog-bar-wrap{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.bok-prog-bar{height:100%;background:var(--grad-main);border-radius:5px;transition:width .3s;}
.bok-prog-pct{font-size:14px;font-weight:800;color:var(--accent);min-width:38px;text-align:right;}
.bok-stars{display:flex;gap:8px;margin-bottom:18px;font-size:30px;cursor:pointer;}
.bok-notes{width:100%;padding:12px;border-radius:var(--r-sm);background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;margin-bottom:18px;height:100px;}
.bok-notes:focus{border-color:var(--accent);}

/* VITAMINS */

.vit-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}

.vit-name{font-weight:700;font-size:16px;}

.vit-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;font-size:18px;}

/* MODALS */

.every-btn.on{background:rgba(123,104,238,.1);border-color:var(--accent);color:var(--accent);}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.em-btn{width:40px;height:40px;font-size:22px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.em-btn.on{border-color:var(--accent);background:rgba(123,104,238,.1);}
.times-pick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.tt{padding:8px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.tt.on{background:linear-gradient(135deg,#a78bfa,#c4b5fd);border-color:transparent;color:#fff;}
.save-btn{width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--grad-main);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;transition:opacity .2s;box-shadow:0 4px 16px rgba(123,104,238,.3);}
.save-btn:disabled{opacity:.35;cursor:not-allowed;}
.upload-btn{width:100%;padding:13px;border-radius:var(--r);border:1.5px dashed var(--border);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;text-align:center;font-weight:600;}

#landing{position:fixed;inset:0;background:linear-gradient(160deg,#ede9fe,#fff);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 32px;}

</head>

<script>
(function(){
'use strict';

/* ── TELEGRAM ──────────────────────────── */
var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : {
  initData:'', initDataUnsafe:{}, ready:function(){}, expand:function(){},
  setHeaderColor:function(){}, setBackgroundColor:function(){},
  HapticFeedback:{impactOccurred:function(){}},
  BackButton:{show:function(){},hide:function(){},onClick:function(){},offClick:function(){}}
};
tg.ready(); tg.expand();
tg.setHeaderColor('#ffffff');
tg.setBackgroundColor('#FAFBFF');
var IS_TG = tg.initData.length > 0;

/* ── CONSTANTS ─────────────────────────── */
var LEVELS = [
  {n:'Новичок',xp:0},{n:'Ученик',xp:100},{n:'Искатель',xp:250},
  {n:'Воин',xp:500},{n:'Мастер',xp:900},{n:'Герой',xp:1400},
  {n:'Легенда',xp:2000},{n:'Бог',xp:3000}
];
var HAB_EMOJIS = ['💪','📚','🧘','🏃','🎯','✍️','🥗','💧','🎨','🎵','💤','🧹','🐕','🌿','🏋️','🚴','🤸','📝'];
var VIT_EMOJIS = ['💊','🌟','☀️','🫐','🍋','🥕','🍵','💧','🧴','🌿','🫧','⚡'];
var VIT_TIMES = ['Утро','День','Вечер','Ночь'];
var DS = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
var MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
var ALL7 = [0,1,2,3,4,5,6];
var HAB_COLORS = ['#7b68ee','#19C6A9','#f59e0b','#5b9cf6','#ec4899','#14b8a6','#f97316','#a78bfa'];
var TASK_ICONS = {hi:'🔴',md:'🟡',lo:'🟢'};
var TASK_COLORS = {
  hi:{bg:'rgba(255,107,107,.08)',border:'#FF6B6B',dot:'#FF6B6B',ico:'rgba(255,107,107,.15)'},
  md:{bg:'rgba(249,202,36,.08)',border:'#F9CA24',dot:'#F0932B',ico:'rgba(249,202,36,.15)'},
  lo:{bg:'rgba(17,153,142,.08)',border:'#38EF7D',dot:'#11998E',ico:'rgba(17,153,142,.15)'}
};
var QUOTES = [
  'Маленькие шаги каждый день ведут к большим результатам.',
  'Начни сейчас — завтра будешь благодарен себе.',
  'Дисциплина — это мост между целями и достижениями.',
  'Каждое утро — новый шанс стать лучше.',
  'Победа над собой важнее победы над другими.'
];

/* ── STATE ─────────────────────────────── */
var SK = 'lq_v9';
var OLD_KEYS = ['lq5','lq_v4','lq_v5','lq_v6','lq_v7','lq_v8'];

function defS() {
  return {name:'',isLoggedIn:false,isSubscribed:false,xp:0,
    habits:[],weeks:{},goals:[],avatar:'',books:[],vitamins:[],booksTab:'reading'};
}

function loadS() {
  try {
    var r = localStorage.getItem(SK);
    if (r) return Object.assign({}, defS(), JSON.parse(r));
  } catch(e) {}
  for (var i = 0; i < OLD_KEYS.length; i++) {
    try {
      var r2 = localStorage.getItem(OLD_KEYS[i]);
      if (!r2) continue;
      var m = Object.assign({}, defS(), JSON.parse(r2));
      localStorage.setItem(SK, JSON.stringify(m));
      return m;
    } catch(e) {}
  }
  return defS();
}

var S = loadS();

function sv() {
  try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {}
}

/* ── HELPERS ───────────────────────────── */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function hp(t) { try { tg.HapticFeedback.impactOccurred(t||'light'); } catch(e) {} }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getLv(xp) {
  var l = 0;
  for (var i = LEVELS.length-1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) { l = i; break; }
  }
  return {idx:l, n:LEVELS[l].n, xp:LEVELS[l].xp, next:LEVELS[l+1]||null};
}

function lvPct(xp) {
  var l = getLv(xp);
  if (!l.next) return 100;
  return Math.min(100, Math.round((xp - l.xp) / (l.next.xp - l.xp) * 100));
}

function addXP(n) { S.xp = Math.max(0, S.xp + n); sv(); rHdr(); }

function curWK() {
  var d = new Date();
  d.setDate(d.getDate() - d.getDay());
  return d.toISOString().slice(0,10);
}

function ensW(wk) {
  if (!S.weeks[wk]) S.weeks[wk] = {tasks:[],notes:''};
  if (!S.weeks[wk].tasks) S.weeks[wk].tasks = [];
}

function wkDates(wk) {
  var s = new Date(wk + 'T00:00:00');
  var arr = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(s);
    d.setDate(s.getDate() + i);
    arr.push(d.toISOString().slice(0,10));
  }
  return arr;
}

function fmt(ds) {
  var d = new Date(ds + 'T00:00:00');
  return d.getDate() + ' ' + MONTHS[d.getMonth()];
}

function getGreet() {
  var h = new Date().getHours();
  if (h < 12) return 'Доброе утро';
  if (h < 17) return 'Добрый день';
  return 'Добрый вечер';
}

function ringsvg(pct, size, stroke, c1, c2) {
  var r = (size - stroke) / 2;
  var circ = 2 * Math.PI * r;
  var dash = circ * pct / 100;
  var gid = 'g' + Math.random().toString(36).slice(2,8);
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" style="transform:rotate(-90deg)">' +
    '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="1" y2="1">' +
    '<stop offset="0%" stop-color="' + c1 + '"/>' +
    '<stop offset="100%" stop-color="' + c2 + '"/>' +
    '</linearGradient></defs>' +
    '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + r + '" fill="none" stroke="#ECECF3" stroke-width="' + stroke + '"/>' +
    '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + r + '" fill="none" stroke="url(#' + gid + ')" stroke-width="' + stroke + '"' +
    ' stroke-dasharray="' + dash + ' ' + circ + '" stroke-linecap="round"/>' +
    '</svg>';
}

function habPct(h) {
  var wd = wkDates(curWK());
  var td = today();
  var tgt = h.days || ALL7;
  var pass = [];
  for (var i = 0; i < wd.length; i++) {
    var dow = new Date(wd[i] + 'T00:00:00').getDay();
    if (tgt.indexOf(dow) !== -1 && wd[i] <= td) pass.push(wd[i]);
  }
  if (!pass.length) return 0;
  var done = 0;
  for (var j = 0; j < pass.length; j++) {
    if (h.completions && h.completions.indexOf(pass[j]) !== -1) done++;
  }
  return Math.round(done / pass.length * 100);
}

function goalPct(g) {
  if (!g.habitId || !g.targetPerWeek) return 0;
  var hab = null;
  for (var i = 0; i < S.habits.length; i++) {
    if (S.habits[i].id === g.habitId) { hab = S.habits[i]; break; }
  }
  if (!hab || !hab.completions || !hab.completions.length) return 0;
  var s = new Date(g.startDate + 'T00:00:00');
  var e = new Date(g.endDate + 'T00:00:00');
  if (isNaN(s.getTime()) || isNaN(e.getTime())) return 0;
  var MS = 86400000;
  var tD = Math.round((e - s) / MS) + 1;
  if (tD <= 0) return 0;
  var tW = Math.ceil(tD / 7);
  var tT = g.targetPerWeek * tW;
  if (!tT) return 0;
  var tot = 0;
  for (var w = 0; w < tW; w++) {
    var ws = new Date(s.getTime() + w * 7 * MS);
    var we = new Date(Math.min(ws.getTime() + 6 * MS, e.getTime()));
    var wss = ws.toISOString().slice(0,10);
    var wes = we.toISOString().slice(0,10);
    var cnt = 0;
    for (var c = 0; c < hab.completions.length; c++) {
      if (hab.completions[c] >= wss && hab.completions[c] <= wes) cnt++;
    }
    tot += Math.min(cnt, g.targetPerWeek);
  }
  return Math.min(100, Math.round(tot / tT * 100));
}

function expPct(g) {
  if (!g.startDate || !g.endDate) return 0;
  var n = new Date();
  var s = new Date(g.startDate + 'T00:00:00');
  var e = new Date(g.endDate + 'T00:00:00');
  if (n <= s) return 0;
  if (n >= e) return 100;
  return Math.round((n - s) / (e - s) * 100);
}

        '<div class="plan-chip pri-lo' + (planNewPri==='lo'?' active':'') + '" data-pri="lo">🟢 Низкий</div>' +
      '</div>' +
      '<div class="plan-dur-row">' + durChips + '</div>' +
    '</div>';

  var container = document.getElementById('p-plan');
  container.innerHTML = html;

  // Обработчики через делегирование — никаких inline onclick
  container.addEventListener('click', function(e){
    var el = e.target;

    // Кнопка добавить в шапке
    if (el.id === 'plan-add-ico' || el.closest('#plan-add-ico')) { openModal('m-task'); return; }
    // Ссылка на главную
    if (el.id === 'plan-sch-link') { go('dash'); return; }
    // Кнопка плюс быстрого добавления
    if (el.id === 'plan-quick-plus' || el.closest('#plan-quick-plus')) { openModal('m-task'); return; }
    // Кнопка добавить задачу
    if (el.id === 'quick-add-btn' || el.closest('#quick-add-btn')) { quickAddTask(); return; }
    // Чекбокс таска
    if (el.dataset.action === 'tog') { togTask(el.dataset.tid); return; }
    var togP = el.closest ? el.closest('[data-action="tog"]') : null;
    if (togP) { togTask(togP.dataset.tid); return; }
    // Выбор дня
    var dayBtn = el.closest ? el.closest('.plan-day-btn') : null;
    if (dayBtn && dayBtn.dataset.day) { selectPlanDay(dayBtn.dataset.day); return; }
    // Приоритет
    var chip = el.closest ? el.closest('.plan-chip') : null;
    if (chip && chip.dataset.pri) { setPri(chip.dataset.pri); return; }
    // Длительность
    var dur = el.closest ? el.closest('.plan-dur-chip') : null;
    if (dur && dur.dataset.dur !== undefined) { setDur(dur.dataset.dur); return; }
  });

  // Скролл к активному дню
  setTimeout(function(){
    var strip = document.getElementById('plan-strip');
    if (!strip) return;
    var active = strip.querySelector('.plan-day-btn.active');
    if (active) active.scrollIntoView({inline:'center',behavior:'smooth'});
  }, 80);
}

function selectPlanDay(ds) { planSel = ds; rPlan(); }
function setPri(p) { planNewPri = p; rPlan(); }
function setDur(d) { planNewDur = planNewDur === d ? '' : d; rPlan(); }

function quickAddTask() {
  var inp = document.getElementById('quick-inp');
  var txt = inp ? inp.value.trim() : '';
  if (!txt) return;
  var wk = curWK(); ensW(wk);
  S.weeks[wk].tasks.push({id:uid(), text:txt, date:planSel, done:false, priority:planNewPri, dur:planNewDur||'', time:''});
  planNewDur = '';
  sv(); hp(); rPlan();
}

/* ── HABITS ────────────────────────────── */
function rHab() {
  var wd = wkDates(curWK());
  var td = today();
  var html = '<div class="sec-hdr"><div class="sec-title">Привычки</div></div>';

  if (!S.habits.length) {
    html += '<div class="empty-wrap"><div class="empty-ico">🌟</div><div class="empty-title">Нет привычек</div><div class="empty-sub">Нажми + чтобы добавить</div></div>';
  } else {
    S.habits.forEach(function(hb, i){
      if (!hb.completions) hb.completions = [];
      var tgt = hb.days || ALL7;
      var g = null;
      for (var gi = 0; gi < S.goals.length; gi++) {
        if (S.goals[gi].id === hb.goalId) { g = S.goals[gi]; break; }
      }
      var col = HAB_COLORS[i % HAB_COLORS.length];
      var pct = habPct(hb);
      var daysHtml = wd.map(function(d){
        var dow = new Date(d + 'T00:00:00').getDay();
        var isT = tgt.indexOf(dow) !== -1;
        var done2 = hb.completions.indexOf(d) !== -1;
        var isTd = d === td;
        return '<div class="hab-day' + (done2?' done':'') + (isTd?' today':'') + (!isT?' off':'') + '"' +
          (isT ? ' data-hid="' + hb.id + '" data-ds="' + d + '" data-action="hab-tog"' : '') + '>' +
          '<span class="dn">' + DS[new Date(d+'T00:00:00').getDay()] + '</span>' +
          (done2?'✓':'') +
        '</div>';
      }).join('');

      html += '<div class="hab-card">' +
        '<div class="hab-top">' +
          '<div class="hab-ico-wrap" style="background:' + col + '18">' + (hb.icon||'💪') + '</div>' +
          '<div class="hab-info">' +
            '<div class="hab-name">' + esc(hb.name) + '</div>' +
            '<div class="hab-sub">' + (tgt.length===7?'Каждый день':tgt.map(function(d){ return DS[d]; }).join(', ')) + (g?' · 🎯 '+esc(g.title):'') + '</div>' +
          '</div>' +
          '<button class="hab-del" data-hid="' + hb.id + '" data-action="hab-del">🗑</button>' +
        '</div>' +
        '<div class="hab-days">' + daysHtml + '</div>' +
        '<div class="hab-prog-row">' +
          '<div class="prog-wrap" style="flex:1;height:6px"><div class="prog-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
          '<div class="hab-prog-pct" style="color:' + col + '">' + pct + '%</div>' +
        '</div>' +
      '</div>';
    });
  }

  var container = document.getElementById('p-hab');
  container.innerHTML = html;

  container.addEventListener('click', function(e){
    var el = e.target;
    var tog = el.closest ? el.closest('[data-action="hab-tog"]') : null;
    if (tog) { togHab(tog.dataset.hid, tog.dataset.ds); return; }
    var del = el.closest ? el.closest('[data-action="hab-del"]') : null;
    if (del) { delHab(del.dataset.hid); return; }
  });
}

function togHab(id, ds) {
  var h = null;
  for (var i = 0; i < S.habits.length; i++) { if (S.habits[i].id === id) { h = S.habits[i]; break; } }
  if (!h) return;
  if (!h.completions) h.completions = [];
  var idx = h.completions.indexOf(ds);
  if (idx === -1) { h.completions.push(ds); addXP(15); }
  else { h.completions.splice(idx,1); addXP(-15); }
  hp(); sv(); rHab();
  if (curP === 'goals') rGoals();
}

function delHab(id) {
  S.habits = S.habits.filter(function(h){ return h.id !== id; });
  S.goals.forEach(function(g){ if (g.habitId === id) g.habitId = null; });
  sv(); rHab();
}

/* ── GOALS ─────────────────────────────── */
function rGoals() {
  var html = '<div class="sec-hdr"><div class="sec-title">Цели</div></div>';
  var now = new Date();

  if (!S.goals.length) {
    html += '<div class="empty-wrap"><div class="empty-ico">🎯</div><div class="empty-title">Нет целей</div><div class="empty-sub">Нажми + чтобы добавить</div></div>';
  } else {
    S.goals.forEach(function(g){
      var p = goalPct(g);
      var ep = expPct(g);
      var hab = null;
      for (var i = 0; i < S.habits.length; i++) { if (S.habits[i].id === g.habitId) { hab = S.habits[i]; break; } }
      var ed = g.endDate ? new Date(g.endDate + 'T00:00:00') : null;
      var dl = ed ? Math.ceil((ed - now) / 86400000) : null;
      var tw = g.endDate && g.startDate ? Math.ceil((new Date(g.endDate+'T00:00:00') - new Date(g.startDate+'T00:00:00')) / 86400000 / 7) : 0;

      var badge = p >= 100 ?
        '<span class="goal-badge b-ok">✅ Готово</span>' :
        (ed && dl < 0 ? '<span class="goal-badge b-over">❌ Просрочено</span>' :
        (ed && dl <= 7 ? '<span class="goal-badge b-soon">⚠️ ' + dl + 'д</span>' :
        '<span class="goal-badge b-act">🎯 В процессе</span>'));

      var mg = '';
      if (hab && hab.completions) {
        var l7 = [];
        for (var j = 0; j < 7; j++) {
          var dj = new Date(); dj.setDate(dj.getDate()-(6-j));
          var dsj = dj.toISOString().slice(0,10);
          l7.push({ds:dsj, l:DS[dj.getDay()], ok:hab.completions.indexOf(dsj)!==-1});
        }
        mg = '<div style="margin-top:10px"><div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600">' + (hab.icon||'💪') + ' ' + esc(hab.name) + ' — 7 дней</div>' +
          '<div class="hab-mini-grid">' + l7.map(function(x){ return '<div class="hab-mini-dot' + (x.ok?' ok':'') + '">' + x.l + '</div>'; }).join('') + '</div></div>';
      }

      html += '<div class="goal-card">' +
        '<div class="goal-top"><div class="goal-title">' + esc(g.title) + '</div>' + badge + '</div>' +
        '<div class="goal-meta">' + (g.startDate?fmt(g.startDate):'') + ' — ' + (g.endDate?fmt(g.endDate):'') +
          (g.targetPerWeek ? ' · ' + g.targetPerWeek + '×/нед · Цель: ' + (g.targetPerWeek*tw) + ' раз' : '') + '</div>' +
        '<div class="prog-wrap">' +
          '<div class="prog-fill" style="width:' + p + '%;background:linear-gradient(90deg,#7b68ee,#9d8ff5)"></div>' +
          (ep>0&&p<100 ? '<div style="position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,.15);left:' + ep + '%"></div>' : '') +
        '</div>' +
        '<div class="prog-lbl"><span>' + p + '% выполнено</span>' +
          (ep>0&&p<100 ? '<span style="color:#d97706;font-weight:600">Ожидаемо: ' + ep + '%</span>' : '') +
        '</div>' +
        mg +
        '<button class="goal-del-btn" data-gid="' + g.id + '" data-action="goal-del">🗑 Удалить</button>' +
      '</div>';
    });
  }

  var container = document.getElementById('p-goals');
  container.innerHTML = html;

  container.addEventListener('click', function(e){
    var del = e.target.closest ? e.target.closest('[data-action="goal-del"]') : null;
    if (del) { delGoal(del.dataset.gid); }
  });
}

function delGoal(id) {
  S.goals = S.goals.filter(function(g){ return g.id !== id; });
  sv(); rGoals();
}

function setBTab(t) { S.booksTab = t; sv(); rBooks(); }

function openBook(id) {

    '<div class="bok-cover-wrap" id="bok-cov-wrap">' +

      '<div class="bok-cover-edit">Изменить обложку</div>' +
    '</div>' +
    '<input type="file" id="bok-file-inp" accept="image/*" style="display:none">' +
    '<div class="bok-status-tabs">' +
      '<button class="bok-st-tab' + ((b.status||'reading')==='reading'?' active':'') + '" data-bst="reading">📖 Читаю</button>' +
      '<button class="bok-st-tab' + ((b.status||'reading')==='done'?' active':'') + '" data-bst="done">✅ Прочитал</button>' +
      '<button class="bok-st-tab' + ((b.status||'reading')==='want'?' active':'') + '" data-bst="want">💜 Хочу</button>' +
    '</div>' +
    '<div style="margin-bottom:18px">' +

        '<input class="bok-prog-inp" id="bok-cur" type="number" min="0" max="' + b.total + '" value="' + (b.current||0) + '">' +
        '<span style="font-size:13px;color:var(--text2);font-weight:600">/ ' + b.total + ' стр</span>' +
        '<div class="bok-prog-bar-wrap"><div class="bok-prog-bar" id="bok-pb" style="width:' + pct + '%"></div></div>' +
        '<div class="bok-prog-pct" id="bok-pp">' + pct + '%</div>' +
      '</div>' +

    '<div style="margin-bottom:18px">' +
      '<div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px">Рейтинг</div>' +
      '<div class="bok-stars" id="bok-stars">' + [1,2,3,4,5].map(function(i){ return '<span data-rate="' + i + '">' + (i<=(b.rating||0)?'⭐':'☆') + '</span>'; }).join('') + '</div>' +
    '</div>' +
    '<div style="margin-bottom:18px">' +
      '<div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px">Заметки</div>' +

function closeBO() {

  tg.BackButton.hide();
  curBId = null;
  rBooks();
}

function bokCC() {
  var inp = document.getElementById('bok-file-inp');
  if (!inp || !inp.files[0]) return;
  var fr = new FileReader();
  fr.onload = function(e){
    var b = null;
    for (var i = 0; i < S.books.length; i++) { if (S.books[i].id === curBId) { b = S.books[i]; break; } }
    if (b) { b.cover = e.target.result; sv(); }
    var w = document.getElementById('bok-cov-wrap');
    if (w) w.innerHTML = '<img src="' + e.target.result + '"><div class="bok-cover-edit">Изменить обложку</div>';
  };
  fr.readAsDataURL(inp.files[0]);
}

function bokStat(s, el) {
  var b = null;
  for (var i = 0; i < S.books.length; i++) { if (S.books[i].id === curBId) { b = S.books[i]; break; } }
  if (!b) return;
  b.status = s;
  if (s === 'done' && !b.finishedDate) b.finishedDate = today();
  document.querySelectorAll('.bok-st-tab').forEach(function(t){ t.classList.remove('active'); });
  if (el) el.classList.add('active');
}

function bokRate(r) {
  var b = null;
  for (var i = 0; i < S.books.length; i++) { if (S.books[i].id === curBId) { b = S.books[i]; break; } }
  if (!b) return;
  b.rating = r;
  var s = document.getElementById('bok-stars');
  if (s) s.innerHTML = [1,2,3,4,5].map(function(i){ return '<span data-rate="' + i + '">' + (i<=r?'⭐':'☆') + '</span>'; }).join('');
}

function bokUP() {
  var b = null;
  for (var i = 0; i < S.books.length; i++) { if (S.books[i].id === curBId) { b = S.books[i]; break; } }
  if (!b) return;
  var v = Math.min(b.total, Math.max(0, parseInt(document.getElementById('bok-cur').value)||0));
  var p = b.total > 0 ? Math.round(v/b.total*100) : 0;
  var pb = document.getElementById('bok-pb'); if (pb) pb.style.width = p + '%';
  var pp = document.getElementById('bok-pp'); if (pp) pp.textContent = p + '%';
}

function bokSave() {
  var b = null;
  for (var i = 0; i < S.books.length; i++) { if (S.books[i].id === curBId) { b = S.books[i]; break; } }
  if (!b) return;
  var cur = parseInt(document.getElementById('bok-cur').value)||0;
  var old = b.current || 0;
  b.current = Math.min(b.total, Math.max(0, cur));
  var ne = document.getElementById('bok-notes'); if (ne) b.notes = ne.value;
  if (b.current > old) addXP(Math.floor((b.current-old)/10));
  if (b.current >= b.total) { b.status = 'done'; if (!b.finishedDate) b.finishedDate = today(); }
  sv(); closeBO(); hp('medium');
}

function delBook() {
  if (!curBId) return;
  S.books = S.books.filter(function(b){ return b.id !== curBId; });
  sv(); closeBO();
}

/* ── VITAMINS ──────────────────────────── */
function rVit() {
  if (!S.vitamins) S.vitamins = [];
  var td = today(); var now = new Date();
  var tT = 0, tD = 0;
  S.vitamins.forEach(function(v){
    if (v.endDate && td > v.endDate) return;
    var tm = v.times || ['Утро'];
    tT += tm.length;
    tD += tm.filter(function(t){ return v.taken && v.taken[td] && v.taken[td].indexOf(t) !== -1; }).length;
  });
  var hP = tT > 0 ? Math.round(tD/tT*100) : 0;
  var hR = 35; var hC = 2*Math.PI*hR; var hD = hC*hP/100;

  var str = 0;
  for (var i = 0; i < 30; i++) {
    var dstr = new Date(now); dstr.setDate(now.getDate()-i);
    var dsstr = dstr.toISOString().slice(0,10);
    var any = S.vitamins.some(function(v){ return v.taken && v.taken[dsstr] && v.taken[dsstr].length; });
    if (any) str++; else break;
  }

  var tPills = 0;
  S.vitamins.forEach(function(v){ Object.values(v.taken||{}).forEach(function(a){ tPills += (a||[]).length; }); });
  var dSet = new Set();
  S.vitamins.forEach(function(v){ Object.entries(v.taken||{}).forEach(function(kv){ if (kv[1]&&kv[1].length) dSet.add(kv[0]); }); });

  var h7 = [];
  for (var j = 0; j < 7; j++) {
    var dj = new Date(now); dj.setDate(now.getDate()-(6-j));
    var dsj = dj.toISOString().slice(0,10);
    var t7=0, d7=0;
    S.vitamins.forEach(function(v){ var tm=v.times||['Утро']; t7+=tm.length; d7+=tm.filter(function(x){ return v.taken&&v.taken[dsj]&&v.taken[dsj].indexOf(x)!==-1; }).length; });
    h7.push({l:DS[dj.getDay()], p:t7>0?Math.round(d7/t7*100):0});
  }

  var html = '<div class="vit-hero">' +
    '<div class="vit-hero-circ"><svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="' + hR + '" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="7"/><circle cx="40" cy="40" r="' + hR + '" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="7" stroke-dasharray="' + hD + ' ' + hC + '" stroke-linecap="round"/></svg><div class="vhct"><div class="vhct-big">' + hP + '%</div><div class="vhct-sm">' + tD + '/' + tT + '</div></div></div>' +
    '<div class="vit-hero-info"><div class="vit-hero-date">' + now.getDate() + ' ' + MONTHS[now.getMonth()] + '</div><div class="vit-hero-ttl">Витамины</div><div class="vit-hero-sub">Сегодня ' + tD + ' из ' + tT + '</div></div>' +
  '</div>' +
  '<div class="tiles3">' +
    '<div class="tile"><div style="font-size:26px">🔥</div><div class="tile-val" style="color:#8b5cf6">' + str + '</div><div class="tile-lbl">Дней стрика</div></div>' +
    '<div class="tile"><div style="font-size:26px">📅</div><div class="tile-val" style="color:#43d9a2">' + dSet.size + '</div><div class="tile-lbl">Активных дней</div></div>' +
    '<div class="tile"><div style="font-size:26px">💊</div><div class="tile-val" style="color:#5b9cf6">' + tPills + '</div><div class="tile-lbl">Принято всего</div></div>' +
  '</div>' +
  '<div class="sec-hdr"><div class="sec-title">Сегодня</div></div>';

  if (!S.vitamins.length) {
    html += '<div class="empty-wrap"><div class="empty-ico">💊</div><div class="empty-title">Нет витаминов</div><div class="empty-sub">Нажми + чтобы добавить</div></div>';
  } else {
    S.vitamins.forEach(function(v){
      if (v.endDate && td > v.endDate) return;
      var tk = v.taken || {}; var tm = v.times || ['Утро'];
      var sun = new Date(now); sun.setDate(now.getDate()-now.getDay());
      var wk7 = [];
      for (var k = 0; k < 7; k++) {
        var dk = new Date(sun); dk.setDate(sun.getDate()+k);
        var dsk = dk.toISOString().slice(0,10);
        var full = tm.every(function(t){ return tk[dsk]&&tk[dsk].indexOf(t)!==-1; });
        var part = tm.some(function(t){ return tk[dsk]&&tk[dsk].indexOf(t)!==-1; });
        wk7.push({l:DS[dk.getDay()], full:full, part:part&&!full});
      }
      html += '<div class="vit-card">' +
        '<div class="vit-top">' +
          '<div class="vit-ico-wrap">' + (v.emoji||'💊') + '</div>' +
          '<div class="vit-info"><div class="vit-name">' + esc(v.name) + '</div><div class="vit-dose">' + esc(v.dose||'') + (v.endDate?' · до '+fmt(v.endDate):'') + '</div></div>' +
          '<button class="vit-del" data-vid="' + v.id + '" data-action="vit-del">🗑</button>' +
        '</div>' +
        '<div class="vit-times">' + tm.map(function(t){ var done=tk[td]&&tk[td].indexOf(t)!==-1; return '<div class="vit-badge' + (done?' done':'') + '" data-vid="' + v.id + '" data-vt="' + t + '" data-action="vit-tog">' + t + '</div>'; }).join('') + '</div>' +
        '<div class="vit-wk">' + wk7.map(function(d){ return '<div class="vit-wk-d' + (d.full?' full':d.part?' part':'') + '"><span>' + d.l + '</span>' + (d.full?'✓':'') + '</div>'; }).join('') + '</div>' +
      '</div>';
    });
  }

  html += '<div class="card" style="margin-top:14px"><div class="card-label">История 7 дней</div>' +
    h7.map(function(x){ return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="font-size:11px;color:var(--text2);font-weight:700;width:22px;text-align:right">' + x.l + '</div><div class="prog-wrap" style="flex:1;height:8px"><div class="prog-fill" style="width:' + x.p + '%;background:linear-gradient(90deg,#a78bfa,#c4b5fd)"></div></div><div style="font-size:10px;color:var(--text2);font-weight:700;width:30px;text-align:right">' + x.p + '%</div></div>'; }).join('') +
  '</div>';

  var container = document.getElementById('p-vit');
  container.innerHTML = html;

  container.addEventListener('click', function(e){
    var tog = e.target.closest ? e.target.closest('[data-action="vit-tog"]') : null;
    if (tog) { vitTog(tog.dataset.vid, tog.dataset.vt); return; }
    var del2 = e.target.closest ? e.target.closest('[data-action="vit-del"]') : null;
    if (del2) { delVit(del2.dataset.vid); return; }
  });
}

function vitTog(id, t) {
  var v = null;
  for (var i = 0; i < S.vitamins.length; i++) { if (S.vitamins[i].id === id) { v = S.vitamins[i]; break; } }
  if (!v) return;
  if (!v.taken) v.taken = {};
  var ds = today();
  if (!v.taken[ds]) v.taken[ds] = [];
  var idx = v.taken[ds].indexOf(t);
  if (idx === -1) { v.taken[ds].push(t); addXP(5); hp(); }
  else { v.taken[ds].splice(idx,1); addXP(-5); }
  sv(); rVit();
}

function delVit(id) {
  S.vitamins = S.vitamins.filter(function(v){ return v.id !== id; });
  sv(); rVit();
}

/* ── FAB & MODALS ──────────────────────── */
function openFab() {
  hp();
  var map = {dash:'m-task', plan:'m-task', hab:'m-hab', goals:'m-goal', books:'m-book', vit:'m-vit'};
  openModal(map[curP] || 'm-task');
}

var selEm = {hab:'💪', vit:'💊'};
var selDays = new Set(ALL7);
var selTimes = new Set(['Утро']);

function openModal(id) {
  if (id === 'm-task') {
    document.getElementById('t-text').value = '';
    document.getElementById('t-date').value = (curP === 'plan') ? planSel : today();
    document.getElementById('t-time').value = '';
    document.getElementById('t-pri').value = 'md';
    fillGoalSel('t-goal');
  }
  if (id === 'm-hab') {
    document.getElementById('h-name').value = '';
    fillGoalSel('h-goal');
    selEm.hab = '💪';
    selDays = new Set(ALL7);
    buildEP('h-ep', HAB_EMOJIS, 'hab');
    buildDP();
  }
  if (id === 'm-goal') {
    document.getElementById('g-title').value = '';
    document.getElementById('g-start').value = today();
    document.getElementById('g-end').value = '';
    document.getElementById('g-tpw').value = '3';
    fillHabSel('g-hab');
  }
  if (id === 'm-book') {
    document.getElementById('b-title').value = '';
    document.getElementById('b-author').value = '';
    document.getElementById('b-total').value = '';
    document.getElementById('b-cover-prev').style.display = 'none';
    newCoverB64 = '';
  }
  if (id === 'm-vit') {
    document.getElementById('v-name').value = '';
    document.getElementById('v-dose').value = '';
    document.getElementById('v-end').value = '';
    selEm.vit = '💊';
    selTimes = new Set(['Утро']);
    buildEP('v-ep', VIT_EMOJIS, 'vit');
    buildTP();
  }
  if (id === 'm-ava') {
    var p = document.getElementById('ava-prev');
    if (p) p.innerHTML = S.avatar ? '<img src="' + S.avatar + '">' : '🧑';
  }
  vld(id);
  document.getElementById(id).classList.add('open');
  tg.BackButton.show();
  tg.BackButton.onClick(function(){ closeModal(id); });
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  tg.BackButton.hide();
}

function fillGoalSel(sid) {
  var s = document.getElementById(sid);
  if (!s) return;
  s.innerHTML = '<option value="">— Без цели —</option>' +
    S.goals.map(function(g){ return '<option value="' + g.id + '">' + esc(g.title) + '</option>'; }).join('');
}

function fillHabSel(sid) {
  var s = document.getElementById(sid);
  if (!s) return;
  s.innerHTML = '<option value="">— Без привычки —</option>' +
    S.habits.map(function(h){ return '<option value="' + h.id + '">' + (h.icon||'💪') + ' ' + esc(h.name) + '</option>'; }).join('');
}

function buildEP(cid, emojis, type) {
  var c = document.getElementById(cid);
  if (!c) return;
  c.innerHTML = emojis.map(function(e){
    return '<button class="em-btn' + (selEm[type]===e?' on':'') + '" data-em="' + e + '" data-type="' + type + '" data-cid="' + cid + '">' + e + '</button>';
  }).join('');
}

function pickEm(type, e, cid) {
  selEm[type] = e;
  buildEP(cid, type==='hab'?HAB_EMOJIS:VIT_EMOJIS, type);
}

function buildDP() {
  var c = document.getElementById('h-dp');
  if (!c) return;
  var all = selDays.size === 7;
  var eb = document.getElementById('every-btn');
  if (eb) {
    eb.textContent = all ? '✓ Каждый день' : 'Каждый день';
    eb.className = 'every-btn' + (all?' on':'');
  }
  c.innerHTML = DS.map(function(d,i){
    return '<div class="ds-btn' + (selDays.has(i)?' on':'') + '" data-di="' + i + '">' + d + '</div>';
  }).join('');
}

function buildTP() {
  var c = document.getElementById('v-tp');
  if (!c) return;
  c.innerHTML = VIT_TIMES.map(function(t){
    return '<div class="tt' + (selTimes.has(t)?' on':'') + '" data-vtime="' + t + '">' + t + '</div>';
  }).join('');
}

function toggleEvery() {
  if (selDays.size === 7) { selDays = new Set([new Date().getDay()]); }
  else { selDays = new Set(ALL7); }
  buildDP();
  vld('m-hab');
}

function vld(id) {
  var checks = {
    'm-task': function(){ var v = document.getElementById('t-text'); return v && !!v.value.trim(); },
    'm-hab':  function(){ var v = document.getElementById('h-name'); return v && !!v.value.trim(); },
    'm-goal': function(){ var t = document.getElementById('g-title'); var e2 = document.getElementById('g-end'); return t && e2 && !!t.value.trim() && !!e2.value; },
    'm-book': function(){ var t = document.getElementById('b-title'); var n = document.getElementById('b-total'); return t && n && !!t.value.trim() && parseInt(n.value)>0; },
    'm-vit':  function(){ var v = document.getElementById('v-name'); return v && !!v.value.trim(); }
  };
  var ids = {'m-task':'sb-task','m-hab':'sb-hab','m-goal':'sb-goal','m-book':'sb-book','m-vit':'sb-vit'};
  var ok = checks[id] ? checks[id]() : false;
  var btn = document.getElementById(ids[id]);
  if (btn) btn.disabled = !ok;
}

function saveTask() {
  var txt = document.getElementById('t-text').value.trim(); if (!txt) return;
  var date = document.getElementById('t-date').value || today();
  var time = document.getElementById('t-time').value || '';
  var pri = document.getElementById('t-pri').value || 'md';
  var gid = document.getElementById('t-goal').value || null;
  var wk = curWK(); ensW(wk);
  S.weeks[wk].tasks.push({id:uid(), text:txt, date:date, time:time, priority:pri, done:false, goalId:gid, dur:''});
  sv(); closeModal('m-task'); hp();
  if (curP === 'plan') rPlan(); else rDash();
}

function saveHab() {
  var name = document.getElementById('h-name').value.trim(); if (!name) return;
  var gid = document.getElementById('h-goal').value || null;
  S.habits.push({id:uid(), name:name, icon:selEm.hab, goalId:gid, days:[...selDays], completions:[]});
  sv(); closeModal('m-hab'); rHab(); hp();
}

function saveGoal() {
  var title = document.getElementById('g-title').value.trim();
  var start = document.getElementById('g-start').value || today();
  var end = document.getElementById('g-end').value;
  var habId = document.getElementById('g-hab').value || null;
  var tpw = parseInt(document.getElementById('g-tpw').value) || 3;
  if (!title || !end) return;
  S.goals.push({id:uid(), title:title, startDate:start, endDate:end, habitId:habId, targetPerWeek:tpw});
  sv(); closeModal('m-goal'); rGoals(); hp();
}

function saveBook() {
  var title = document.getElementById('b-title').value.trim();
  var author = document.getElementById('b-author').value.trim();
  var total = parseInt(document.getElementById('b-total').value);
  if (!title || !total) return;
  S.books.push({id:uid(), title:title, author:author, total:total, current:0, status:'reading', rating:0, notes:'', cover:newCoverB64||''});
  S.booksTab = 'reading';
  sv(); closeModal('m-book'); rBooks(); hp();
}

function prevCover() {
  var inp = document.getElementById('b-cover-inp');
  if (!inp || !inp.files[0]) return;
  var fr = new FileReader();
  fr.onload = function(e){
    newCoverB64 = e.target.result;
    document.getElementById('b-cover-prev').style.display = 'block';
    document.getElementById('b-cover-img').src = e.target.result;
  };
  fr.readAsDataURL(inp.files[0]);
}

function saveVit() {
  var name = document.getElementById('v-name').value.trim(); if (!name) return;
  var dose = document.getElementById('v-dose').value.trim();
  var end = document.getElementById('v-end').value || null;
  var times = [...selTimes];
  S.vitamins.push({id:uid(), name:name, dose:dose, emoji:selEm.vit, times:times.length?times:['Утро'], endDate:end, taken:{}});
  sv(); closeModal('m-vit'); rVit(); hp();
}

function togTask(id) {
  var found = false;
  Object.keys(S.weeks).forEach(function(k){
    if (found) return;
    var w = S.weeks[k];
    if (!w.tasks) return;
    for (var i = 0; i < w.tasks.length; i++) {
      if (w.tasks[i].id === id) {
        w.tasks[i].done = !w.tasks[i].done;
        w.tasks[i].done ? addXP(10) : addXP(-10);
        hp(); sv(); found = true; break;
      }
    }
  });
  if (curP === 'plan') rPlan(); else rDash();
}

function delTask(id) {
  Object.keys(S.weeks).forEach(function(k){
    var w = S.weeks[k];
    if (!w.tasks) return;
    var idx = -1;
    for (var i = 0; i < w.tasks.length; i++) { if (w.tasks[i].id === id) { idx = i; break; } }
    if (idx !== -1) w.tasks.splice(idx, 1);
  });
  sv();
  if (curP === 'plan') rPlan(); else rDash();
}

function avaChange() {
  var inp = document.getElementById('ava-inp');
  if (!inp || !inp.files[0]) return;
  var fr = new FileReader();
  fr.onload = function(e){
    S.avatar = e.target.result; sv(); rHdr();
    var p = document.getElementById('ava-prev');
    if (p) p.innerHTML = '<img src="' + e.target.result + '">';
  };
  fr.readAsDataURL(inp.files[0]);
}

function buyPrem() { S.isSubscribed = true; sv(); rHdr(); hp('medium'); }
function logout() { S.isLoggedIn = false; sv(); document.getElementById('landing').style.display='flex'; document.getElementById('shell').style.display='none'; }

/* ── INIT ──────────────────────────────── */
function init() {
  // Модалы — закрытие по клику на фон
  document.querySelectorAll('.mo').forEach(function(el){
    el.addEventListener('click', function(e){
      if (e.target === el) closeModal(el.id);
    });
  });

  // Модал: ввод задачи
  document.getElementById('t-text').addEventListener('input', function(){ vld('m-task'); });
  document.getElementById('t-date').addEventListener('input', function(){ vld('m-task'); });
  document.getElementById('sb-task').addEventListener('click', saveTask);

  // Модал: привычка
  document.getElementById('h-name').addEventListener('input', function(){ vld('m-hab'); });
  document.getElementById('sb-hab').addEventListener('click', saveHab);
  document.getElementById('every-btn').addEventListener('click', toggleEvery);

  // Делегирование эмодзи и дней привычки
  document.getElementById('h-ep').addEventListener('click', function(e){
    var btn = e.target.closest('.em-btn');
    if (btn) pickEm(btn.dataset.type, btn.dataset.em, btn.dataset.cid);
  });
  document.getElementById('h-dp').addEventListener('click', function(e){
    var btn = e.target.closest('.ds-btn');
    if (btn) {
      var i = parseInt(btn.dataset.di);
      if (selDays.has(i)) { if (selDays.size > 1) selDays.delete(i); }
      else selDays.add(i);
      buildDP(); vld('m-hab');
    }
  });

  // Модал: цель
  document.getElementById('g-title').addEventListener('input', function(){ vld('m-goal'); });
  document.getElementById('g-end').addEventListener('input', function(){ vld('m-goal'); });
  document.getElementById('sb-goal').addEventListener('click', saveGoal);

  // Модал: книга
  document.getElementById('b-title').addEventListener('input', function(){ vld('m-book'); });
  document.getElementById('b-total').addEventListener('input', function(){ vld('m-book'); });
  document.getElementById('sb-book').addEventListener('click', saveBook);
  document.getElementById('b-cover-btn').addEventListener('click', function(){ document.getElementById('b-cover-inp').click(); });
  document.getElementById('b-cover-inp').addEventListener('change', prevCover);

  // Модал: витамин
  document.getElementById('v-name').addEventListener('input', function(){ vld('m-vit'); });
  document.getElementById('sb-vit').addEventListener('click', saveVit);
  document.getElementById('v-ep').addEventListener('click', function(e){
    var btn = e.target.closest('.em-btn');
    if (btn) pickEm(btn.dataset.type, btn.dataset.em, btn.dataset.cid);
  });
  document.getElementById('v-tp').addEventListener('click', function(e){
    var tt = e.target.closest('.tt');
    if (tt && tt.dataset.vtime) {
      var t = tt.dataset.vtime;
      if (selTimes.has(t)) selTimes.delete(t); else selTimes.add(t);
      buildTP();
    }
  });

  // Модал: аватар
  document.getElementById('ava-upload-btn').addEventListener('click', function(){ document.getElementById('ava-inp').click(); });
  document.getElementById('ava-inp').addEventListener('change', avaChange);
  document.getElementById('ava-done-btn').addEventListener('click', function(){ closeModal('m-ava'); });

  // Книга — кнопки оверлея
  document.getElementById('bok-back-btn').addEventListener('click', closeBO);
  document.getElementById('bok-del-btn').addEventListener('click', delBook);

  // FAB
  document.getElementById('fab').addEventListener('click', openFab);

  // Навигация
  document.querySelectorAll('.nav-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ go(btn.dataset.p); });
  });

  // Лэндинг
  document.getElementById('land-btn').addEventListener('click', startApp);
  document.getElementById('land-name').addEventListener('keydown', function(e){ if (e.key === 'Enter') startApp(); });

  // Telegram
  if (IS_TG) {
    var u = tg.initDataUnsafe && tg.initDataUnsafe.user;
    if (u) { S.name = u.first_name || S.name || 'Игрок'; S.isLoggedIn = true; sv(); }
  }

  if (!S.isLoggedIn) {
    document.getElementById('landing').style.display = 'flex';
    document.getElementById('shell').style.display = 'none';
  } else {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    rAll();
  }
}

function startApp() {
  var name = document.getElementById('land-name').value.trim() || 'Игрок';
  S.name = name; S.isLoggedIn = true; sv();
  document.getElementById('landing').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  rAll();
}

init();
})();
</script>
</body>
